// ── Generate plain-English behavioural commentary for a location ──
// ── Best conditions + best time window for a location, derived from actual sighting history ──
function bestConditions(loc, sightings){
  const locS=sightings.filter(s=>
    s.recordType==="sighting"&&
    (s.locationId===loc.id||s.vantagePointId===loc.id)&&
    s.windDir&&s.windDir!=="SSE"&&s.windSpeed>0&&s.temp&&s.temp!==20
  );
  if(locS.length<3) return null;

  // ── Best time window ──
  // Count sightings per 2-hour window
  const WINDOWS=[{s:6,e:8,l:"6–8am"},{s:8,e:10,l:"8–10am"},{s:10,e:12,l:"10am–12pm"},
    {s:12,e:14,l:"12–2pm"},{s:14,e:16,l:"2–4pm"},{s:16,e:18,l:"4–6pm"},{s:18,e:20,l:"6–8pm"}];
  const winCounts=WINDOWS.map(w=>{
    const n=locS.filter(s=>{const h=getHourDec(s.timestamp);return h>=w.s&&h<w.e;}).length;
    return{...w,n};
  });
  const bestWin=winCounts.reduce((a,b)=>b.n>a.n?b:a,winCounts[0]);

  // ── Best wind direction ──
  const windDirCounts={};
  locS.forEach(s=>{if(s.windDir)windDirCounts[s.windDir]=(windDirCounts[s.windDir]||0)+1;});
  const bestWindDir=Object.entries(windDirCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]||null;

  // ── Median wind speed (avoid outliers) ──
  const speeds=locS.map(s=>s.windSpeed||0).filter(v=>v>0).sort((a,b)=>a-b);
  const medianSpeed=speeds.length?speeds[Math.floor(speeds.length/2)]:null;

  // ── Median temp ──
  const temps=locS.map(s=>s.temp||0).filter(v=>v>0).sort((a,b)=>a-b);
  const medianTemp=temps.length?temps[Math.floor(temps.length/2)]:null;

  // ── Most common cloud class ──
  const cloudCounts={};
  locS.forEach(s=>{if(s.cloudClass&&s.cloudClass!=="Unknown")cloudCounts[s.cloudClass]=(cloudCounts[s.cloudClass]||0)+1;});
  const bestCloud=Object.entries(cloudCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]||null;

  const cloudEmoji={Clear:"☀️",Thin:"🌤",Broken:"⛅",Thick:"🌥",Overcast:"☁️"};

  return{
    timeWindow:bestWin.n>0?bestWin:null,
    windDir:bestWindDir,
    windSpeed:medianSpeed?Math.round(medianSpeed):null,
    temp:medianTemp?Math.round(medianTemp):null,
    cloudClass:bestCloud,
    cloudEmoji:bestCloud?cloudEmoji[bestCloud]||"🌤":"🌤",
    sampleSize:locS.length,
  };
}

function locationCommentary(loc, pred, weather, sightings){
  const lines=[];
  const hour=getMelbNow().getUTCHours();
  const season=getSeason(getMelbNow().toISOString());
  const seaBreeze=["SSW","SW","SSE","SE","S"].includes(weather.windDir||"");
  const hotDay=weather.temp>28;
  const coldDay=weather.temp<14;
  const strongWind=weather.windSpeed>25;
  const goodWind=weather.windSpeed>=10&&weather.windSpeed<=30;
  const isBreeding=season==="Spring";
  const isWinter=season==="Winter";
  const deg=WIND_MAP[weather.windDir]||0;

  // Sighting history context
  const locSightings=sightings.filter(s=>s.recordType!=="absence"&&(s.locationId===loc.id||s.vantagePointId===loc.id));
  const recentSightings=locSightings.filter(s=>(Date.now()-tsToMs(s.timestamp))/864e5<30);
  const absences=sightings.filter(s=>s.recordType==="absence"&&(s.locationId===loc.id||s.vantagePointId===loc.id)).length;

  if(recentSightings.length>0){
    const bhvs=recentSightings.map(s=>s.behavior).filter(b=>b&&b!=="unknown");
    const topBhv=bhvs.length?Object.entries(bhvs.reduce((a,b)=>{a[b]=(a[b]||0)+1;return a;},{})).sort((a,b)=>b[1]-a[1])[0][0].replace(/_/g," "):"activity";
    lines.push(`${recentSightings.length} sighting${recentSightings.length!==1?"s":""} here in the last 30 days, mostly ${topBhv}.`);
  } else if(locSightings.length>0){
    lines.push(`${locSightings.length} historical sighting${locSightings.length!==1?"s":""} on record — none in the last month.`);
  } else {
    lines.push("No sightings recorded here yet — likelihood assessed from behavioural science and live conditions.");
  }
  if(absences>0&&absences>=locSightings.length)lines.push(`${absences} absence record${absences!==1?"s":""} logged here, which lowers confidence.`);

  // Type-specific weather + behavioural commentary
  if(loc.type==="ridge"){
    const aMap={N:0,NNE:22.5,NE:45,ENE:67.5,E:90,ESE:112.5,SE:135,SSE:157.5,S:180,SSW:202.5,SW:225,WSW:247.5,W:270,WNW:292.5,NW:315,NNW:337.5};
    const faces=(loc.aspect||"").split("/").map(a=>aMap[a.trim()]).filter(v=>v!==undefined);
    const best=faces.length?Math.min(...faces.map(f=>{const d=Math.abs(deg-f);return d>180?360-d:d;})):90;
    if(best<45&&weather.windSpeed>=12)lines.push(`${weather.windDir} @ ${weather.windSpeed}km/h is well-aligned to the ${loc.aspect||"ridge"} face — expect strong ridge lift and sustained Wedge-tail soaring.`);
    else if(best<70&&goodWind)lines.push(`Wind is workable for this face. Ridge lift likely but not at peak — birds may mix thermal and ridge soaring.`);
    else if(best>=90)lines.push(`${weather.windDir} wind puts this face in the lee today — ridge lift unlikely. Eagles may use thermals instead.`);
    else lines.push(`Marginal wind alignment to this face. Soaring possible if thermals compensate.`);
    if(seaBreeze&&hour>=12)lines.push("Afternoon sea breeze is established — a known lift driver on S/SE-facing Mornington Peninsula escarpments.");
    if(strongWind)lines.push("Strong winds today. Wedge-tails handle high winds well on ridge — watch for lower-altitude face soaring.");
    if(isBreeding)lines.push("Spring: pairs perform display flights along ridge faces, often calling.");
    if(hour<9||hour>18)lines.push("Ridge lift is a daylight phenomenon — limited activity outside 9am–6pm.");
  }

  if(loc.type==="thermal"){
    if(hotDay)lines.push(`${weather.temp}°C today — cleared ground here heats fast, producing strong convective lift by mid-morning. Prime thermal site conditions.`);
    else if(coldDay)lines.push(`Cool day at ${weather.temp}°C — thermals will be weak and slow to form. Eagle activity here likely lower than average.`);
    else lines.push(`Moderate temperatures — thermals should develop by 10–11am. Best window is 11am–2pm overhead.`);
    if(weather.windSpeed<10)lines.push("Light winds keep thermal columns tight — easier for eagles to work and stay visible.");
    else if(strongWind)lines.push("Strong wind may shear thermals today. Ridge sites could be more productive.");
    if(hour<10||hour>16)lines.push("Thermals build from ~10am and collapse by 4–5pm — outside this window, activity here drops sharply.");
  }

  if(loc.type==="carrion"){
    if(coldDay||isWinter)lines.push(`Cold or winter conditions suppress thermals — Wedge-tails spend more time foraging on the ground. Carrion sites are most productive right now.`);
    else if(hotDay&&hour>=10&&hour<=15)lines.push("Peak soaring hours — eagles are likely airborne elsewhere right now. Best times here are dawn (6–9am) and late afternoon (5pm+).");
    else lines.push("Dawn (6–9am) and dusk windows are peak feeding times at carrion sites — before thermals build and after they collapse.");
    if(isBreeding)lines.push("Breeding adults reduce carrion visits in Spring. Juveniles and non-breeders remain active at these sites.");
  }

  if(loc.type==="perch"){
    if(hour>=6&&hour<=9)lines.push("Right now is prime roost observation time — eagles spread wings to warm up and preen before departing for first thermals.");
    else if(hour>=17&&hour<=20)lines.push("Evening return window open — birds glide back to roost now, pair calling common at dusk.");
    else if(hour>=10&&hour<=15)lines.push("Birds are likely airborne during peak thermal hours. Redirect to ridge or thermal sites; return late afternoon.");
    if(strongWind)lines.push("High winds today — birds may shelter in canopy longer and be easier to spot from below.");
    if(isBreeding)lines.push("Breeding season: pair likely roosting together with regular display flights from perch trees.");
  }

  if(loc.type==="transit"){
    if(hour>=11&&hour<=14)lines.push("Prime transit window right now — thermals are mature and birds gain height to glide long distances overhead.");
    else if(hour>=9&&hour<11)lines.push("Early transit — first birds leaving roost, crossing relatively low and direct.");
    else if(hour>14&&hour<=16)lines.push("Return transits as thermals weaken — birds cross lower and slower than midday.");
    else lines.push("Main transit hours are 9:30am–4:30pm. Watch for low early passes before thermals build.");
    if(["NNW","NW","N","NNE"].includes(weather.windDir||""))lines.push("NW/N wind pushes birds along the peninsula axis — expect increased transit rate overhead today.");
    if(seaBreeze&&hour>=13)lines.push("Sea breeze driving birds inland off the bay — afternoon transits over this corridor elevated.");
  }

  if(isBreeding&&loc.type!=="perch")lines.push("Spring breeding season increases aerial activity across all sites as juveniles disperse and adults display.");
  else if(isWinter&&loc.type!=="carrion")lines.push("Winter: reduced thermal energy means less soaring. Effort better spent at carrion and perch sites today.");

  // ── Behavioural record notes: prey, carrion, perched ──
  const preyRecs=locSightings.filter(s=>s.carryingPrey||(s.behavior||"").includes("feeding_carrion")||
    (s.notes||"").toLowerCase().match(/carr|carcas|rabbit|prey|lamb|snake|lizard/));
  const perchedRecs=locSightings.filter(s=>(s.behavior||"").includes("roosting")||
    (s.notes||"").toLowerCase().match(/perch|sat on|sitting|roosting|landed/));
  if(preyRecs.length>0){
    const pct=Math.round(preyRecs.length/locSightings.length*100);
    lines.push(`Notable: ${preyRecs.length} record${preyRecs.length!==1?"s":""} of eagles carrying prey or feeding on carrion here (${pct}% of sightings) — active foraging site.`);
  }
  if(perchedRecs.length>0&&loc.type!=="perch"){
    lines.push(`${perchedRecs.length} perching record${perchedRecs.length!==1?"s":""} at this location — check elevated trees and posts, especially in early morning.`);
  }

  // ── Behaviour notes summary from sighting records ──
  // Pull useful info from notes text: unique meaningful phrases
  const notesTexts=locSightings
    .filter(s=>s.notes&&s.notes.trim().length>10)
    .sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))
    .slice(0,10)
    .map(s=>s.notes.trim());

  if(notesTexts.length>0){
    // Look for notable behaviour patterns mentioned in notes
    const allNotes=notesTexts.join(" ").toLowerCase();
    const behaviourHints=[];
    if(allNotes.match(/low.?pass|passed low|flying low|skimmed/)) behaviourHints.push("low passes recorded");
    if(allNotes.match(/carry|carrying|prey|rabbit|hare|lamb|carcas/)) behaviourHints.push("prey-carrying observed");
    if(allNotes.match(/circl|kettle|thermal|soar/)) behaviourHints.push("thermal soaring noted");
    if(allNotes.match(/crow|raven|magpie|miner|mobbed|harass/)) behaviourHints.push("alarm species present");
    if(allNotes.match(/nest|breed|egg|chick|juven|fledg/)) behaviourHints.push("breeding activity recorded");
    if(allNotes.match(/pair|two|both|together|mate/)) behaviourHints.push("pair sightings");
    if(behaviourHints.length>0){
      lines.push("Field notes mention: "+behaviourHints.join(", ")+".");
    }
    // Add most recent meaningful note verbatim if it's concise
    const recent=notesTexts.find(n=>n.length>15&&n.length<120);
    if(recent) lines.push("Recent note: \""+recent+"\"");
  }

  return lines.slice(0,5).join(" ");
}

// ── Locations tab: All Hotspot Rankings — expandable cards with behavioural commentary ──
// ── Eagle Locator: AI-powered current position estimator ──
// Uses predictions, weather, time-of-day, sighting history + Claude AI to estimate
// where the eagles are RIGHT NOW and where they're heading next.
function EagleLocator({predictions, sightings, weather}){
  const[estimate,setEstimate]=useState(null);
  const[loading,setLoading]=useState(false);
  const[lastUpdated,setLastUpdated]=useState(null);
  const mapRef=React.useRef(null);
  const leafletRef=React.useRef(null);
  const layersRef=React.useRef([]);

  // ── Build context for AI ──
  const buildContext=()=>{
    const now=getMelbNow();
    const h=now.getUTCHours();const m=now.getUTCMinutes();
    const timeStr=`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
    const season=getSeason(now.toISOString());
    const thermalWindow=getTW(now.toISOString());
    const top5=predictions.slice(0,5).map(p=>`${p.name} (${p.probability}%, ${p.type})`).join("; ");
    const recent24h=sightings.filter(s=>s.recordType==="sighting"&&(Date.now()-tsToMs(s.timestamp))<24*3600*1000)
      .slice(0,5).map(s=>`${s.timestamp?.split("T")[1]?.slice(0,5)||"?"} at ${s.location||s.locationId}: ${s.behavior||"?"} alt=${s.altitude||"?"}`).join("; ");
    const recent7d=sightings.filter(s=>s.recordType==="sighting"&&(Date.now()-tsToMs(s.timestamp))<7*24*3600*1000).length;
    return{now,timeStr,season,thermalWindow,top5,recent24h,recent7d,h,m};
  };

  const fetchEstimate=async()=>{
    setLoading(true);
    const{timeStr,season,thermalWindow,top5,recent24h,recent7d,h}=buildContext();
    const prompt=`You are an expert Wedge-tailed Eagle tracker for Dromana, Mornington Peninsula, Victoria Australia.

Current time: ${timeStr} Melbourne time | Season: ${season} | Thermal window: ${thermalWindow}
Weather: ${weather.temp}°C, ${weather.windDir} @ ${weather.windSpeed}km/h${weather.windGust?` G${weather.windGust}km/h`:""}, ${weather.cloudClass}, ${weather.conditions||""}
Top 5 predicted locations right now: ${top5}
Recent 24h sightings: ${recent24h||"none"}
Sightings last 7 days: ${recent7d}

Known territory: This is a resident pair based near Arthurs Seat ridge (305m) at -38.3538,144.955. Their home range covers ~40km² from Safety Beach in the north to Cape Schanck in the south, with the Arthurs Seat escarpment as the core territory. The observer is at 317 Boundary Rd Dromana (-38.342222,144.963722).

Based on the time of day, season, weather conditions, and sighting history, estimate:
1. Most likely CURRENT POSITION of the eagles (lat/lng + location name + behaviour right now)
2. 2nd most likely position (with probability weighting vs #1)
3. Likely NEXT MOVEMENT in next 30-60 minutes (direction, destination, reason)
4. A brief plain-English summary (2-3 sentences) of what they're probably doing right now

Respond ONLY as JSON, no markdown, no explanation:
{
  "position1": {"lat": -38.xxx, "lng": 144.xxx, "name": "location name", "behavior": "what they're doing", "confidence": 75, "reason": "why here"},
  "position2": {"lat": -38.xxx, "lng": 144.xxx, "name": "location name", "behavior": "what they're doing", "confidence": 45, "reason": "why here"},
  "nextMove": {"direction": "NW", "destination": "Arthurs Seat Ridge", "destLat": -38.3538, "destLng": 144.955, "timeframe": "30-45 min", "reason": "thermals building on ridge face"},
  "summary": "Plain English 2-3 sentence summary of current eagle activity"
}`;
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        model:"claude-sonnet-4-5-20251001",max_tokens:600,
        tools:[{type:"web_search_20250305",name:"web_search"}],
        messages:[{role:"user",content:prompt}]
      })});
      const data=await res.json();
      const text=data.content?.filter(b=>b.type==="text").map(b=>b.text||"").join("")||"";
      const clean=text.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      setEstimate(parsed);
      setLastUpdated(getMelbNow());
    }catch(e){
      setEstimate({error:"Could not estimate position. Check connection.",summary:"Unable to connect to AI estimator."});
    }finally{setLoading(false);}
  };

  // Auto-fetch on mount and every 10 minutes
  React.useEffect(()=>{
    fetchEstimate();
    const iv=setInterval(fetchEstimate,10*60*1000);
    return()=>clearInterval(iv);
  },[]);

  // Re-fetch when weather changes meaningfully
  const prevWeatherRef=React.useRef(null);
  React.useEffect(()=>{
    if(!prevWeatherRef.current)return;
    const prev=prevWeatherRef.current;
    if(Math.abs((weather.windSpeed||0)-(prev.windSpeed||0))>=5||weather.windDir!==prev.windDir){
      fetchEstimate();
    }
    prevWeatherRef.current=weather;
  },[weather]);
  React.useEffect(()=>{prevWeatherRef.current=weather;},[]);

  // ── Init the locator map ──
  React.useEffect(()=>{
    if(!mapRef.current||leafletRef.current||typeof L==="undefined")return;
    const map=L.map(mapRef.current,{center:[-38.355,144.960],zoom:13,zoomControl:false,attributionControl:false,minZoom:10,maxZoom:18});
    L.tileLayer("https://mt{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}",{maxZoom:20,subdomains:"0123",attribution:""}).addTo(map);
    leafletRef.current=map;
    // Home marker
    const homeIcon=L.divIcon({className:"",iconSize:[0,0],iconAnchor:[0,0],html:`<div style="transform:translate(-50%,-50%);width:22px;height:22px;border-radius:50%;border:2px solid rgba(167,139,250,0.8);display:flex;align-items:center;justify-content:center;background:rgba(20,10,40,0.85);font-size:11px">🏠</div>`});
    L.marker([BASE.lat,BASE.lng],{icon:homeIcon,interactive:false,zIndexOffset:500}).addTo(map);
    return()=>{map.remove();leafletRef.current=null;};
  },[]);

  // ── Draw eagle positions + arrows when estimate changes ──
  React.useEffect(()=>{
    const map=leafletRef.current;
    if(!map||typeof L==="undefined")return;
    layersRef.current.forEach(l=>{try{map.removeLayer(l);}catch(e){}});
    layersRef.current=[];
    if(!estimate||estimate.error)return;

    const addEagle=(pos,isPrimary)=>{
      if(!pos||!pos.lat||!pos.lng)return;
      const size=isPrimary?44:32;
      const glow=isPrimary?"rgba(251,191,36,0.6)":"rgba(167,139,250,0.4)";
      const pulse=isPrimary?"0 0 18px rgba(251,191,36,0.7)":"0 0 10px rgba(167,139,250,0.5)";
      // Glow ring
      const ring=L.circleMarker([pos.lat,pos.lng],{radius:isPrimary?28:20,color:isPrimary?"#fbbf24":"#a78bfa",weight:1.5,fillOpacity:0,opacity:isPrimary?0.35:0.2,interactive:false}).addTo(map);
      layersRef.current.push(ring);
      // Eagle icon
      const icon=L.divIcon({className:"",iconSize:[0,0],iconAnchor:[0,0],
        html:`<div style="transform:translate(-50%,-50%);width:${size}px;height:${size}px;border-radius:50%;background:rgba(15,8,32,0.92);border:2px solid ${isPrimary?"#fbbf24":"#a78bfa"};box-shadow:${pulse};display:flex;align-items:center;justify-content:center;font-size:${isPrimary?22:16}px;z-index:${isPrimary?1000:800}">🦅</div>`
      });
      const marker=L.marker([pos.lat,pos.lng],{icon,zIndexOffset:isPrimary?1000:800,interactive:true}).addTo(map);
      // Confidence label
      const lbl=L.marker([pos.lat,pos.lng],{icon:L.divIcon({className:"",iconSize:[0,0],iconAnchor:[0,0],
        html:`<div style="transform:translate(${isPrimary?26:20}px,${isPrimary?-28:-20}px);white-space:nowrap;pointer-events:none"><div style="background:rgba(0,0,0,0.9);border:1px solid ${isPrimary?"#fbbf24":"#a78bfa"};border-radius:6px;padding:2px 7px"><div style="font-size:${isPrimary?11:9}px;font-weight:800;color:${isPrimary?"#fbbf24":"#c4b5fd"};font-family:system-ui">${pos.confidence}% · ${(pos.name||"").split(",")[0].split("—")[0].trim().slice(0,22)}</div><div style="font-size:8px;color:rgba(220,210,255,0.8);font-family:system-ui">${(pos.behavior||"").slice(0,28)}</div></div></div>`
      }),interactive:false,zIndexOffset:isPrimary?900:700}).addTo(map);
      layersRef.current.push(marker,lbl);
      marker.bindPopup(`<div style="font-family:system-ui;min-width:160px"><b style="color:${isPrimary?"#fbbf24":"#a78bfa"}">${isPrimary?"PRIMARY":"ALTERNATE"} — ${pos.confidence}%</b><br><b>${pos.name||""}</b><br><i>${pos.behavior||""}</i><br><small>${pos.reason||""}</small></div>`);
    };

    addEagle(estimate.position1,true);
    addEagle(estimate.position2,false);

    // ── Direction arrow from primary position toward next destination ──
    if(estimate.nextMove&&estimate.position1?.lat&&estimate.nextMove.destLat){
      const from=[estimate.position1.lat,estimate.position1.lng];
      const to=[estimate.nextMove.destLat,estimate.nextMove.destLng];
      // Draw dashed arrow line
      const arrow=L.polyline([from,to],{color:"#2dd4bf",weight:2,dashArray:"6 5",opacity:0.7,interactive:false}).addTo(map);
      // Arrowhead at destination
      const R=6371000;
      const lat1=from[0]*Math.PI/180,lng1=from[1]*Math.PI/180;
      const lat2=to[0]*Math.PI/180,lng2=to[1]*Math.PI/180;
      const dLng=lng2-lng1;
      const bearing=Math.atan2(Math.sin(dLng)*Math.cos(lat2),Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLng))*180/Math.PI;
      const arrowHead=L.marker(to,{icon:L.divIcon({className:"",iconSize:[0,0],iconAnchor:[0,0],
        html:`<div style="transform:translate(-50%,-50%) rotate(${bearing}deg);width:16px;height:16px;border-left:3px solid #2dd4bf;border-top:3px solid #2dd4bf;transform-origin:50% 50%;opacity:0.85;transform:translate(-50%,-50%) rotate(${bearing+45}deg)"></div>`
      }),interactive:false,zIndexOffset:600}).addTo(map);
      // Next move label near midpoint
      const midLat=(from[0]+to[0])/2;const midLng=(from[1]+to[1])/2;
      const moveLbl=L.marker([midLat,midLng],{icon:L.divIcon({className:"",iconSize:[0,0],iconAnchor:[0,0],
        html:`<div style="transform:translate(-50%,-120%);pointer-events:none;white-space:nowrap"><div style="background:rgba(0,0,0,0.88);border:1px solid rgba(248,113,113,0.5);border-radius:5px;padding:2px 7px"><div style="font-size:9px;font-weight:700;color:#2dd4bf;font-family:system-ui">→ ${estimate.nextMove.destination||""} · ${estimate.nextMove.timeframe||""}</div></div></div>`
      }),interactive:false,zIndexOffset:500}).addTo(map);
      layersRef.current.push(arrow,arrowHead,moveLbl);
    }

    // Fit map to show both positions
    const pts=[[estimate.position1?.lat,estimate.position1?.lng],[estimate.position2?.lat,estimate.position2?.lng],[BASE.lat,BASE.lng]].filter(p=>p[0]&&p[1]);
    if(pts.length>1)map.fitBounds(pts,{padding:[40,40],maxZoom:14});
  },[estimate]);

  const now=getMelbNow();
  const timeStr=`${String(now.getUTCHours()).padStart(2,"0")}:${String(now.getUTCMinutes()).padStart(2,"0")}`;

  return(
    <Card glow="#fbbf24">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div>
          <div style={{fontSize:15,fontWeight:800}}>🦅 Eagle Locator</div>
          <div style={{fontSize:15,color:DS.muted,marginTop:1}}>AI-estimated current position · {timeStr}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {lastUpdated&&<span style={{fontSize:15,color:DS.muted}}>Updated {String(lastUpdated.getUTCHours()).padStart(2,"0")}:{String(lastUpdated.getMinutes()).padStart(2,"0")}</span>}
          <button onClick={fetchEstimate} disabled={loading} style={{padding:"5px 11px",background:"rgba(251,191,36,0.12)",border:"1px solid rgba(251,191,36,0.3)",borderRadius:10,color:"#fbbf24",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",opacity:loading?0.5:1}}>
            {loading?"...":" Refresh"}
          </button>
        </div>
      </div>

      {/* Map */}
      <div style={{width:"100%",height:260,borderRadius:12,overflow:"hidden",border:"1px solid rgba(251,191,36,0.2)",marginBottom:12,position:"relative"}}>
        <div ref={mapRef} style={{width:"100%",height:"100%"}}/>
        <div style={{position:"absolute",top:8,left:10,zIndex:900,fontSize:14,fontWeight:700,color:"rgba(251,191,36,0.8)",letterSpacing:1,background:"rgba(6,24,32,0.75)",padding:"2px 6px",borderRadius:4}}>EAGLE LOCATOR</div>
        {loading&&<div style={{position:"absolute",inset:0,background:"rgba(6,24,32,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}}><div style={{color:"#fbbf24",fontSize:15,fontWeight:700}}>🦅 Calculating...</div></div>}
        {/* Zoom */}
        <div style={{position:"absolute",bottom:8,left:8,zIndex:900,display:"flex",flexDirection:"column",gap:3}}>
          {[["+",1],["−",-1]].map(([l,d])=>(
            <button key={l} onClick={()=>leafletRef.current?.setZoom(leafletRef.current.getZoom()+d)}
              style={{width:26,height:26,borderRadius:6,border:"1px solid rgba(251,191,36,0.3)",background:"rgba(6,24,32,0.88)",color:"#fbbf24",fontSize:15,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{l}</button>
          ))}
        </div>
      </div>

      {/* Summary + positions */}
      {estimate&&!estimate.error&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {/* AI Summary */}
          <div style={{padding:"9px 12px",background:"rgba(251,191,36,0.06)",border:"1px solid rgba(251,191,36,0.18)",borderRadius:11}}>
            <div style={{fontSize:15,fontWeight:700,color:"#fbbf24",letterSpacing:1,marginBottom:4}}>AI ASSESSMENT</div>
            <div style={{fontSize:14,color:"#e8dff7",lineHeight:1.6}}>{estimate.summary}</div>
          </div>
          {/* Two positions */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {[{pos:estimate.position1,label:"PRIMARY",col:"#fbbf24"},{pos:estimate.position2,label:"ALTERNATE",col:"#a78bfa"}].map(({pos,label,col})=>pos&&(
              <div key={label} style={{padding:"9px 11px",background:"rgba(255,255,255,0.04)",border:`1px solid ${col}30`,borderRadius:11}}>
                <div style={{fontSize:14,fontWeight:700,color:col,letterSpacing:1,marginBottom:3}}>{label} · {pos.confidence}%</div>
                <div style={{fontSize:15,fontWeight:700,color:DS.text,marginBottom:2}}>{(pos.name||"").split(",")[0].split("—")[0].trim()}</div>
                <div style={{fontSize:14,color:DS.sub,marginBottom:3}}>{pos.behavior}</div>
                <div style={{height:3,background:"rgba(255,255,255,0.06)",borderRadius:3}}><div style={{height:"100%",width:`${pos.confidence}%`,background:col,borderRadius:3}}/></div>
                <div style={{fontSize:15,color:DS.muted,marginTop:4,lineHeight:1.4}}>{pos.reason}</div>
              </div>
            ))}
          </div>
          {/* Next move */}
          {estimate.nextMove&&(
            <div style={{padding:"9px 12px",background:"rgba(45,212,191,0.06)",border:"1px solid rgba(45,212,191,0.2)",borderRadius:11,display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:18,flexShrink:0}}>→</div>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:"#2dd4bf",letterSpacing:1,marginBottom:2}}>NEXT MOVE · {estimate.nextMove.timeframe}</div>
                <div style={{fontSize:15,color:DS.text}}>{estimate.nextMove.direction} toward <strong>{estimate.nextMove.destination}</strong></div>
                <div style={{fontSize:14,color:DS.muted}}>{estimate.nextMove.reason}</div>
              </div>
            </div>
          )}
        </div>
      )}
      {estimate?.error&&<div style={{padding:"12px",color:"#f87171",fontSize:15,textAlign:"center"}}>{estimate.error}</div>}
      {!estimate&&!loading&&<div style={{padding:"12px",color:DS.muted,fontSize:15,textAlign:"center"}}>Tap Refresh to estimate current eagle positions</div>}
    </Card>
  );
}

function LocationsHotspotPanel({predictions, sightings, weather, customLocs=[], setCustomLocs=null, onLocsChanged=null}){
  const[expanded,setExpanded]=useState(null); // id of expanded location
  const[editingId,setEditingId]=useState(null);
  const[editForm,setEditForm]=useState({});
  const[,forceUpdate]=useState(0);
  const[sortBy,setSortBy]=useState("probability");
  const[bhvFilter,setBhvFilter]=useState(null); // null=all, or behavior key
  const[mergingId,setMergingId]=useState(null); // id of loc being merged away
  const[mergeTargetId,setMergeTargetId]=useState("");
  const[mergeConfirm,setMergeConfirm]=useState(false);
  const now=getMelbNow();
  const dayLabel=now.toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"});
  const TYPE_OPTS=["thermal","ridge","perch","carrion","transit","hunting"];
  const ASPECT_OPTS=["N","NE","E","SE","S","SW","W","NW"];

  function exportCustomLocs(){
    let locs=[];
    try{locs=JSON.parse(localStorage.getItem("eagleCustomLocs")||"[]");}catch(e){}
    if(!locs.length){alert("No custom locations saved yet.");return;}
    const txt=JSON.stringify(locs,null,2);
    try{
      navigator.clipboard.writeText(txt);
      alert("Copied! " + locs.length + " custom location(s) copied to clipboard. Paste to your developer.");
    }catch(e){
      alert("Custom locations JSON:\n\n" + txt);
    }
  }

  function startEdit(loc){
    const parts=loc.name.split(", ");
    const suburb=parts.length>1?parts[parts.length-1]:"";
    const baseName=parts.length>1?parts.slice(0,-1).join(", "):loc.name;
    setEditForm({name:baseName,suburb,type:loc.type||"thermal",aspect:loc.aspect||"N"});
    setEditingId(loc.id);
  }
  async function saveEdit(loc){
    const fullName=editForm.suburb.trim()?`${editForm.name.trim()}, ${editForm.suburb.trim()}`:editForm.name.trim();
    loc.name=fullName; loc.type=editForm.type; loc.aspect=editForm.aspect;
    const updated=customLocs.map(l=>l.id===loc.id?{...l,name:fullName,type:editForm.type,aspect:editForm.aspect}:l);
    if(setCustomLocs) setCustomLocs(updated);
    try{localStorage.setItem("eagleCustomLocs",JSON.stringify(updated));}catch(e){}
    setEditingId(null); forceUpdate(n=>n+1);
  }
  async function deleteLoc(loc){
    if(!confirm(`Delete "${loc.name}"?\n\nThis removes it from all dropdowns and the map.`))return;
    const idx=LOCS.findIndex(l=>l.id===loc.id);
    if(idx>-1)LOCS.splice(idx,1);
    const updated=customLocs.filter(l=>l.id!==loc.id);
    if(setCustomLocs) setCustomLocs(updated);
    if(onLocsChanged) onLocsChanged();
    try{localStorage.setItem("eagleCustomLocs",JSON.stringify(updated));}catch(e){}
    setEditingId(null); forceUpdate(n=>n+1);
  }

  const inp={width:"100%",boxSizing:"border-box",background:"rgba(255,255,255,0.06)",
    border:"1px solid rgba(167,139,250,0.25)",borderRadius:6,padding:"4px 7px",
    color:"#f1f0f7",fontSize:15,outline:"none"};
  const lb={fontSize:15,fontWeight:700,color:"rgba(167,139,250,0.6)",display:"block",marginBottom:3};

  return(
    <Card>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <div style={{fontSize:15,fontWeight:700}}>All Hotspot Rankings</div>
        <div style={{display:"flex",gap:5}}>
          <button onClick={()=>{
            if(!setSightings)return;
            const seen=new Set();
            const deduped=sightings.filter(s=>{
              const key=(s.timestamp||'').slice(0,16)+'|'+(s.locationId||s.location||'')+'|'+(s.recordType||'sighting');
              if(seen.has(key))return false;
              seen.add(key);return true;
            });
            const removed=sightings.length-deduped.length;
            if(removed===0){alert('No duplicates found.');return;}
            if(!window.confirm(`Remove ${removed} duplicate record${removed!==1?'s':''}?`))return;
            setSightings(deduped);
            try{localStorage.setItem('eagle-sightings-v2',JSON.stringify(deduped));}catch(e){}
            if(supaSave)Promise.all(deduped.map(s=>supaSave(s))).catch(()=>{});
            alert(`✓ Removed ${removed} duplicate${removed!==1?'s':''}.`);
          }} style={{padding:"4px 9px",borderRadius:7,border:"1px solid rgba(248,113,113,0.35)",
            background:"rgba(248,113,113,0.08)",color:"#f87171",fontSize:12,fontWeight:700,cursor:"pointer"}}>
            🗑 Dedup
          </button>
          <button onClick={exportCustomLocs}
            style={{padding:"4px 9px",borderRadius:7,border:"1px solid rgba(74,222,128,0.35)",
            background:"rgba(74,222,128,0.08)",color:"#4ade80",fontSize:12,fontWeight:700,cursor:"pointer"}}>
            ⬆ Export
          </button>
        </div>
      </div>
      {/* Sort controls */}
      <div style={{display:"flex",gap:5,marginBottom:10}}>
        {[{id:"probability",label:"% Chance"},{id:"sightings",label:"# Sightings"},{id:"percent",label:"Sight %"}].map(s=>(
          <button key={s.id} onClick={()=>setSortBy(s.id)}
            style={{flex:1,padding:"5px 0",borderRadius:8,fontSize:13,fontWeight:sortBy===s.id?700:500,cursor:"pointer",fontFamily:"inherit",
              border:`1px solid ${sortBy===s.id?"rgba(167,139,250,0.5)":"rgba(255,255,255,0.1)"}`,
              background:sortBy===s.id?"rgba(167,139,250,0.12)":"transparent",
              color:sortBy===s.id?"#a78bfa":DS.muted}}>
            {s.label}
          </button>
        ))}
      </div>
      {/* Behaviour filter chips */}
      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
        {[
          {k:null,       label:"All"},
          {k:"feeding_carrion", label:"🦴 Carrion"},
          {k:"roosting",        label:"🌲 Perching"},
          {k:"low_pass",        label:"📸 Low Pass"},
          {k:"nesting",         label:"🥚 Nesting"},
          {k:"hunting",         label:"⚡ Hunting"},
          {k:"soaring_thermal", label:"🌀 Soaring"},
        ].map(f=>(
          <button key={String(f.k)} onClick={()=>setBhvFilter(bhvFilter===f.k?null:f.k)}
            style={{padding:"4px 10px",borderRadius:20,fontSize:12,cursor:"pointer",fontFamily:"inherit",
              border:`1px solid ${bhvFilter===f.k?"rgba(74,222,128,0.5)":"rgba(255,255,255,0.1)"}`,
              background:bhvFilter===f.k?"rgba(74,222,128,0.10)":"transparent",
              color:bhvFilter===f.k?"#4ade80":DS.muted,fontWeight:bhvFilter===f.k?700:400}}>
            {f.label}
          </button>
        ))}
      </div>
      <div style={{fontSize:14,color:DS.muted,marginBottom:10}}>
        Tap to expand · ✏️ to edit · 🔀 to merge · {dayLabel}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:11}}>
        {(()=>{
          // Filter by behaviour if set
          const bhvLocs=bhvFilter?new Set(sightings.filter(s=>{
            const b=s.behavior||s.behaviour||"";
            if(bhvFilter==="nesting") return b.includes("nesting")||b.includes("breed")||(s.notes||"").toLowerCase().includes("nest");
            return b===bhvFilter||b.includes(bhvFilter);
          }).map(s=>s.locationId||s.vantagePointId)):null;
          const sorted=[...predictions].filter(p=>!bhvLocs||bhvLocs.has(p.id)).sort((a,b)=>{
            if(sortBy==="sightings"){
              const aS=sightings.filter(s=>s.recordType!=="absence"&&(s.locationId===a.id||s.vantagePointId===a.id)).length;
              const bS=sightings.filter(s=>s.recordType!=="absence"&&(s.locationId===b.id||s.vantagePointId===b.id)).length;
              return bS-aS;
            }
            if(sortBy==="percent"){
              const visits=(id)=>sightings.filter(s=>(s.locationId===id||s.vantagePointId===id)).length||1;
              const sight=(id)=>sightings.filter(s=>s.recordType!=="absence"&&(s.locationId===id||s.vantagePointId===id)).length;
              return (sight(b.id)/visits(b.id))-(sight(a.id)/visits(a.id));
            }
            return b.probability-a.probability;
          });
          return sorted;
        })().map((p,i)=>{
          const c=p.probability>=80?"#f87171":p.probability>=60?"#fb923c":p.probability>=40?"#facc15":p.probability>=20?"#4ade80":"#6366f1";
          const isOpen=expanded===p.id;
          const isEditing=editingId===p.id;
          const typeInfo=HTYPES[p.type]||{label:p.type,color:"#a78bfa",bg:"rgba(167,139,250,0.12)"};
          const locSightings=sightings.filter(s=>s.recordType!=="absence"&&(s.locationId===p.id||s.vantagePointId===p.id));
          const fullLoc=LOCS.find(l=>l.id===p.id)||p;
          const isCustom=!!fullLoc.custom;
          return(
            <div key={p.id} style={{borderBottom:"1px solid rgba(255,255,255,0.05)",paddingBottom:11}}>

              {/* Row header */}
              <div onClick={()=>{if(!isEditing)setExpanded(isOpen?null:p.id);}}
                style={{cursor:isEditing?"default":"pointer",userSelect:"none"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flex:1,minWidth:0}}>
                    <span style={{fontSize:15,fontWeight:700,color:p.color||c,background:`${p.color||c}20`,padding:"2px 8px",borderRadius:20,flexShrink:0}}>#{i+1}</span>
                    <span style={{color:DS.text,fontSize:14,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fullLoc.name||p.name}</span>
                    {isCustom&&<span style={{fontSize:14,color:"#4ade80",background:"rgba(74,222,128,0.12)",padding:"1px 5px",borderRadius:8,flexShrink:0}}>custom</span>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                    <span style={{color:c,fontSize:15,fontWeight:700}}>{p.probability}%</span>
                    <button onClick={e=>{e.stopPropagation();isEditing?setEditingId(null):startEdit(fullLoc);}}
                      title={isEditing?"Cancel edit":"Edit location"}
                      style={{padding:"2px 7px",borderRadius:6,
                        border:`1px solid ${isEditing?"rgba(251,191,36,0.5)":"rgba(167,139,250,0.25)"}`,
                        background:isEditing?"rgba(251,191,36,0.1)":"rgba(255,255,255,0.04)",
                        color:isEditing?"#fbbf24":"rgba(167,139,250,0.7)",
                        fontSize:15,cursor:"pointer",flexShrink:0}}>
                      {isEditing?"✕":"✏️"}
                    </button>
                    {!isEditing&&(
                      <button onClick={e=>{e.stopPropagation();setMergingId(mergingId===p.id?null:p.id);setMergeTargetId("");setMergeConfirm(false);}}
                        title="Merge into another location"
                        style={{padding:"2px 7px",borderRadius:6,border:"1px solid rgba(251,146,60,0.3)",
                          background:mergingId===p.id?"rgba(251,146,60,0.12)":"rgba(255,255,255,0.03)",
                          color:mergingId===p.id?"#fb923c":"rgba(251,146,60,0.5)",
                          fontSize:13,cursor:"pointer",flexShrink:0}}>
                        🔀
                      </button>
                    )}
                    {!isEditing&&<span style={{fontSize:15,color:DS.muted}}>{isOpen?"▲":"▼"}</span>}
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                  <span style={{fontSize:15,color:typeInfo.color,fontWeight:600,background:typeInfo.bg||`${typeInfo.color}15`,padding:"1px 6px",borderRadius:10}}>
                    {typeInfo.label}
                  </span>
                  {locSightings.length>0&&<span style={{fontSize:15,color:DS.muted}}>{locSightings.length} sighting{locSightings.length!==1?"s":""}</span>}
                </div>
                <div style={{height:4,background:"rgba(255,255,255,0.06)",borderRadius:4,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${p.probability}%`,borderRadius:4,background:`linear-gradient(90deg,${c}99,${c})`}}/>
                </div>
              </div>

              {/* ── Inline Edit Form ── */}
              {isEditing&&(
                <div style={{marginTop:10,padding:"13px 14px",background:"rgba(251,191,36,0.04)",
                  border:"1px solid rgba(251,191,36,0.18)",borderRadius:11}}>
                  <div style={{fontSize:14,fontWeight:800,color:"#fbbf24",marginBottom:10,letterSpacing:0.3}}>✏️ Edit Location</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                    <div>
                      <span style={lb}>Location name</span>
                      <input value={editForm.name} onChange={e=>setEditForm(f=>({...f,name:e.target.value}))}
                        placeholder="Location name" style={inp}/>
                    </div>
                    <div>
                      <span style={lb}>Suburb</span>
                      <input value={editForm.suburb} onChange={e=>setEditForm(f=>({...f,suburb:e.target.value}))}
                        placeholder="Suburb" style={inp}/>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                    <div>
                      <span style={lb}>Type</span>
                      <select value={editForm.type} onChange={e=>setEditForm(f=>({...f,type:e.target.value}))}
                        style={{...inp,cursor:"pointer"}}>
                        {TYPE_OPTS.map(t=><option key={t} value={t}>{t.charAt(0).toUpperCase()+t.slice(1)}</option>)}
                      </select>
                    </div>
                    <div>
                      <span style={lb}>Aspect</span>
                      <select value={editForm.aspect} onChange={e=>setEditForm(f=>({...f,aspect:e.target.value}))}
                        style={{...inp,cursor:"pointer"}}>
                        {ASPECT_OPTS.map(a=><option key={a} value={a}>{a}</option>)}
                      </select>
                    </div>
                  </div>
                  <div style={{fontSize:15,color:"rgba(167,139,250,0.4)",fontFamily:"monospace",marginBottom:11}}>
                    📍 {fullLoc.lat?.toFixed(6)}, {fullLoc.lng?.toFixed(6)}
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <button onClick={()=>saveEdit(fullLoc)}
                      style={{flex:1,minWidth:80,padding:"7px",borderRadius:8,
                        border:"1px solid rgba(74,222,128,0.4)",background:"rgba(74,222,128,0.12)",
                        color:"#4ade80",fontSize:15,fontWeight:700,cursor:"pointer"}}>
                      ✓ Save
                    </button>
                    {isCustom&&(
                      <button onClick={()=>deleteLoc(fullLoc)}
                        style={{padding:"7px 12px",borderRadius:8,
                          border:"1px solid rgba(248,113,113,0.35)",background:"rgba(248,113,113,0.07)",
                          color:"#f87171",fontSize:15,fontWeight:700,cursor:"pointer"}}>
                        🗑 Delete
                      </button>
                    )}
                    <button onClick={()=>setEditingId(null)}
                      style={{padding:"7px 10px",borderRadius:8,
                        border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.03)",
                        color:"rgba(255,255,255,0.35)",fontSize:15,cursor:"pointer"}}>
                      Cancel
                    </button>
                  </div>
                  {!isCustom&&(
                    <div style={{marginTop:8,fontSize:14,color:"rgba(248,113,113,0.45)",lineHeight:1.4}}>
                      Built-in location — edits apply this session only. Share updated details with your developer to hardcode permanently.
                    </div>
                  )}
                </div>
              )}

              {/* Field assessment */}
              {isOpen&&!isEditing&&(
                <div style={{marginTop:10,padding:"12px 13px",background:"rgba(255,255,255,0.04)",borderRadius:12,border:"1px solid rgba(255,255,255,0.06)"}}>
                  <div style={{fontSize:15,fontWeight:700,color:DS.muted,letterSpacing:1,marginBottom:7}}>FIELD ASSESSMENT</div>
                  {p.recentNote&&<div style={{fontSize:15,color:"#f87171",fontWeight:700,marginBottom:6}}>{p.recentNote}</div>}
                  {p.alarmNote&&<div style={{fontSize:15,color:"#fb923c",fontWeight:700,marginBottom:6}}>{p.alarmNote}</div>}
                  <div style={{fontSize:15,color:DS.sub,lineHeight:1.7}}>{locationCommentary(fullLoc, p, weather, sightings)}</div>
                  {/* Latest notes from sightings */}
                  {(()=>{
                    const recentWithNotes=sightings.filter(s=>(s.locationId===fullLoc.id||s.vantagePointId===fullLoc.id)&&s.notes&&s.notes.trim().length>10).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).slice(0,3);
                    if(!recentWithNotes.length) return null;
                    return(
                      <div style={{marginTop:8,borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:8}}>
                        <div style={{fontSize:11,fontWeight:700,color:DS.muted,letterSpacing:0.5,marginBottom:5}}>RECENT FIELD NOTES</div>
                        {recentWithNotes.map(s=>(
                          <div key={s.id} style={{fontSize:13,color:"#c4b8e8",fontStyle:"italic",lineHeight:1.5,marginBottom:4}}>
                            <span style={{fontSize:11,color:DS.muted,fontStyle:"normal"}}>{s.timestamp?.slice(0,10)} </span>
                            &ldquo;{s.notes}&rdquo;
                          </div>
                        ))}
                      </div>
                    );
                  })()}

                  {/* ── Best Conditions + Best Window from sighting history ── */}
                  {(()=>{
                    const bc=bestConditions(fullLoc, sightings);
                    if(!bc) return(
                      <div style={{marginTop:10,fontSize:13,color:DS.muted,fontStyle:"italic"}}>
                        Not enough sighting data to derive best conditions yet (need 3+ with weather).
                      </div>
                    );
                    return(
                      <div style={{marginTop:10,padding:"10px 12px",background:"rgba(74,222,128,0.05)",
                        border:"1px solid rgba(74,222,128,0.15)",borderRadius:10}}>
                        <div style={{fontSize:12,fontWeight:700,color:"#4ade80",letterSpacing:0.5,marginBottom:7}}>
                          BEST CONDITIONS FOR A SIGHTING <span style={{color:DS.muted,fontWeight:400}}>({bc.sampleSize} sightings)</span>
                        </div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                          {bc.cloudClass&&(
                            <span style={{padding:"3px 9px",borderRadius:20,background:"rgba(255,255,255,0.07)",
                              border:"1px solid rgba(255,255,255,0.12)",fontSize:13,color:DS.text}}>
                              {bc.cloudEmoji} {bc.cloudClass}
                            </span>
                          )}
                          {bc.windDir&&(
                            <span style={{padding:"3px 9px",borderRadius:20,background:"rgba(255,255,255,0.07)",
                              border:"1px solid rgba(255,255,255,0.12)",fontSize:13,color:DS.text}}>
                              🧭 {bc.windDir} wind
                            </span>
                          )}
                          {bc.windSpeed&&(
                            <span style={{padding:"3px 9px",borderRadius:20,background:"rgba(255,255,255,0.07)",
                              border:"1px solid rgba(255,255,255,0.12)",fontSize:13,color:DS.text}}>
                              💨 ~{bc.windSpeed} km/h
                            </span>
                          )}
                          {bc.temp&&(
                            <span style={{padding:"3px 9px",borderRadius:20,background:"rgba(255,255,255,0.07)",
                              border:"1px solid rgba(255,255,255,0.12)",fontSize:13,color:DS.text}}>
                              🌡 ~{bc.temp}°C
                            </span>
                          )}
                        </div>
                        {bc.timeWindow&&bc.timeWindow.n>0&&(
                          <div style={{display:"flex",alignItems:"center",gap:7}}>
                            <span style={{fontSize:12,color:DS.muted}}>Best window:</span>
                            <span style={{padding:"3px 10px",borderRadius:20,background:"rgba(167,139,250,0.12)",
                              border:"1px solid rgba(167,139,250,0.25)",fontSize:13,fontWeight:700,color:"#a78bfa"}}>
                              ⏰ {bc.timeWindow.l}
                            </span>
                            <span style={{fontSize:12,color:DS.muted}}>{bc.timeWindow.n} sighting{bc.timeWindow.n!==1?"s":""}</span>
                          </div>
                        )}
                      </div>
                    );
                  })()}

                  <div style={{marginTop:9,fontSize:14,color:DS.muted,fontStyle:"italic",borderTop:"1px solid rgba(255,255,255,0.05)",paddingTop:8}}>
                    Coords: {fullLoc.lat?.toFixed(5)}, {fullLoc.lng?.toFixed(5)} · Aspect: {fullLoc.aspect||"—"}
                  </div>
                </div>
              )}

              {/* ── Merge Panel ── */}
              {mergingId===p.id&&!isEditing&&(
                <div style={{marginTop:8,padding:"12px 14px",background:"rgba(251,146,60,0.05)",
                  border:"1px solid rgba(251,146,60,0.25)",borderRadius:11}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#fb923c",marginBottom:8}}>
                    🔀 Merge <strong>{p.name}</strong> into another location
                  </div>
                  <div style={{fontSize:12,color:DS.muted,marginBottom:8}}>
                    All sightings logged under this location will be reassigned to the target. This location will be removed.
                  </div>
                  <select value={mergeTargetId} onChange={e=>{setMergeTargetId(e.target.value);setMergeConfirm(false);}}
                    style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.15)",
                      borderRadius:8,padding:"7px 9px",color:DS.text,fontSize:13,fontFamily:"inherit",marginBottom:8}}>
                    <option value="">— select target location —</option>
                    {[...LOCS].filter(l=>l.id!==p.id).sort((a,b)=>a.name.localeCompare(b.name)).map(l=>(
                      <option key={l.id} value={l.id}>{l.name}</option>
                    ))}
                  </select>
                  {mergeTargetId&&!mergeConfirm&&(
                    <button onClick={()=>setMergeConfirm(true)}
                      style={{width:"100%",padding:"7px",borderRadius:8,border:"1px solid rgba(251,146,60,0.4)",
                        background:"rgba(251,146,60,0.08)",color:"#fb923c",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                      Preview merge → {LOCS.find(l=>l.id===mergeTargetId)?.name}
                    </button>
                  )}
                  {mergeTargetId&&mergeConfirm&&(()=>{
                    const targetLoc=LOCS.find(l=>l.id===mergeTargetId);
                    const affectedCount=sightings.filter(s=>s.locationId===p.id||s.vantagePointId===p.id).length;
                    return(
                      <div>
                        <div style={{fontSize:12,color:"#fb923c",marginBottom:8,padding:"7px 10px",
                          background:"rgba(251,146,60,0.08)",borderRadius:7}}>
                          ⚠ Will reassign {affectedCount} sighting{affectedCount!==1?"s":""} from <strong>{p.name}</strong> → <strong>{targetLoc?.name}</strong>
                        </div>
                        <div style={{display:"flex",gap:6}}>
                          <button onClick={()=>{
                            const target=LOCS.find(l=>l.id===mergeTargetId);
                            if(!target) return;
                            // Reassign all sightings
                            const updated=sightings.map(s=>{
                              if(s.locationId!==p.id&&s.vantagePointId!==p.id) return s;
                              return{...s,
                                locationId:target.id, location:target.name,
                                vantagePointId:s.vantagePointId===p.id?target.id:s.vantagePointId,
                                vantagePoint:s.vantagePointId===p.id?target.name:s.vantagePoint,
                              };
                            });
                            // Update sightings state + persist
                            if(typeof setSightings==="function"){
                              setSightings(updated);
                              try{localStorage.setItem("eagle-sightings-v2",JSON.stringify(updated));}catch(e){}
                              Promise.all(updated.filter(s=>s.locationId===target.id||s.vantagePointId===target.id)
                                .map(s=>supaSave(s))).catch(()=>{});
                            }
                            // Remove merged location from LOCS if custom
                            const locIdx=LOCS.findIndex(l=>l.id===p.id);
                            if(locIdx>=0&&LOCS[locIdx].custom){
                              LOCS.splice(locIdx,1);
                              try{
                                const saved=JSON.parse(localStorage.getItem("eagleCustomLocs")||"[]");
                                localStorage.setItem("eagleCustomLocs",JSON.stringify(saved.filter(l=>l.id!==p.id)));
                              }catch(e){}
                            }
                            setMergingId(null);setMergeTargetId("");setMergeConfirm(false);
                            if(onLocsChanged)onLocsChanged();
                            forceUpdate(n=>n+1);
                          }} style={{flex:2,padding:"7px",borderRadius:8,border:"1px solid rgba(248,113,113,0.4)",
                            background:"rgba(248,113,113,0.08)",color:"#f87171",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                            ✓ Confirm merge
                          </button>
                          <button onClick={()=>{setMergeConfirm(false);}}
                            style={{flex:1,padding:"7px",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",
                              background:"transparent",color:DS.muted,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
                            Cancel
                          </button>
                        </div>
                      </div>
                    );
                  })()}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </Card>
  );
}

// ── Home Window Panel: Boundary Rd Base time-window predictions (mirrors Predict tab logic) ──
function HomeWindowPanel({sightings,weather}){
  const baseLoc=LOCS.find(l=>l.id==="boundary_base")||LOCS[0];
  const now=getMelbNow();
  const currentHour=now.getUTCHours();
  const currentMin=now.getUTCMinutes();
  const nowDecimal=currentHour+(currentMin/60);
  const nowTimeStr=`${String(currentHour).padStart(2,"0")}:${String(currentMin).padStart(2,"0")}`;
  const fc={...weather,season:getSeason(now.toISOString()),thermalWindow:getTW(now.toISOString())};

  // Transit-type windows (same as PredictTab for transit)
  const sb=["SSW","SW","SSE","SE","S"].includes(weather.windDir||"");
  const hot=weather.temp>28;
  const windows=[
    {label:"Dawn–9:30am",timeRange:"First light to 9:30am",startH:6,endH:9.5,behavior:"Too early for transit — eagles on perch or pre-thermal feeding.",focus:"Low passes · Adjacent trees"},
    {label:"9:30–11am",timeRange:"9:30am – 11:00am",startH:9.5,endH:11,behavior:"First thermals building. Eagles leaving roost, crossing overhead.",focus:"Southern sky · Ridge departure direction"},
    {label:"11am–2pm",timeRange:"11:00am – 2:00pm",startH:11,endH:14,behavior:`Peak transit. ${weather.windDir} @ ${weather.windSpeed}km/h — ${sb?"sea breeze pushing birds along ridge.":"birds riding thermals overhead."}`,focus:"Directly overhead · Cloud street direction"},
    {label:"2–4:30pm",timeRange:"2:00pm – 4:30pm",startH:14,endH:16.5,behavior:"Return transits as thermals weaken. Birds cross lower and slower.",focus:"Overhead · Low glide paths"},
    {label:"4:30pm–Dusk",timeRange:"4:30pm to last light",startH:16.5,endH:20,behavior:`Eagles heading back to roost. ${hot?"Still active — warm evening.":"Occasional late transit."}`,focus:"Southward glides toward ridge"},
  ];

  // ── Lock past windows: once a window ends, its prediction is frozen ──
  const todayKey=now.toLocaleDateString("en-AU").replace(/\//g,"-");
  const enriched=windows.map((w,i)=>{
    const isPast=nowDecimal>=w.endH;
    const isFuture=nowDecimal<w.startH;
    const cacheKey=`eagleWin_${todayKey}_${i}`;
    if(isPast){
      // Try to return the locked value from sessionStorage
      try{
        const cached=sessionStorage.getItem(cacheKey);
        if(cached){
          const c=JSON.parse(cached);
          return{...w,...c,locked:true};
        }
      }catch(e){}
    }
    // Compute live prediction
    const p=windowProb(baseLoc,sightings,fc,w.startH,w.endH,null,isFuture?{}:{});
    const reasoning=windowReasoning(baseLoc,sightings,fc,w.startH,w.endH,p);
    const result={...w,probN:p,...probLabel(p),reasoning};
    // If this window just became past OR is current, cache it
    if(!isFuture){
      try{ sessionStorage.setItem(cacheKey,JSON.stringify({probN:p,...probLabel(p),reasoning})); }catch(e){}
    }
    return result;
  });

  const currentWindowIndex=enriched.findIndex(w=>nowDecimal>=w.startH&&nowDecimal<w.endH);
  const nowWindowProb=currentWindowIndex>=0?enriched[currentWindowIndex].probN:0;
  const nowLabel=currentWindowIndex>=0?probLabel(nowWindowProb):null;

  return(
    <Card glow="#fb923c">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div>
          <div style={{fontSize:15,fontWeight:800}}>🏠 Boundary Rd — Today</div>
          <div style={{fontSize:15,color:DS.muted,marginTop:1}}>Transit · Sky watch overhead</div>
        </div>
        {nowLabel&&(
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:18,fontWeight:900,color:nowLabel.color}}>{nowWindowProb}%</div>
            <div style={{fontSize:15,fontWeight:700,color:nowLabel.color,background:`${nowLabel.color}18`,padding:"2px 9px",borderRadius:20}}>{nowLabel.quality}</div>
          </div>
        )}
      </div>
      <div style={{fontSize:14,color:"#2dd4bf",marginBottom:10,padding:"7px 11px",background:"rgba(45,212,191,0.08)",borderRadius:10,border:"1px solid rgba(45,212,191,0.2)",display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:7,height:7,borderRadius:"50%",background:"#2dd4bf",flexShrink:0,animation:"pulse2 2s infinite"}}/>
        <span>Melbourne time: <strong>{nowTimeStr}</strong>{currentWindowIndex>=0?` · Window ${currentWindowIndex+1} of ${enriched.length}`:" · Outside tracked windows"}</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {enriched.map((row,i)=>{
          const isNow=i===currentWindowIndex;
          return(
            <div key={i} style={{padding:"10px 12px",borderRadius:13,borderLeft:`3px solid ${row.color}`,position:"relative",background:isNow?"rgba(45,212,191,0.06)":"rgba(255,255,255,0.02)",border:isNow?"1px solid rgba(248,113,113,0.25)":"1px solid rgba(255,255,255,0.04)"}}>
              {isNow&&(
                <div style={{position:"absolute",top:8,right:9,display:"flex",alignItems:"center",gap:4,background:"rgba(45,212,191,0.18)",padding:"2px 8px",borderRadius:20,border:"1px solid rgba(45,212,191,0.35)"}}>
                  <div style={{width:5,height:5,borderRadius:"50%",background:"#2dd4bf",animation:"pulse2 2s infinite"}}/>
                  <span style={{fontSize:14,fontWeight:700,color:"#2dd4bf",letterSpacing:0.5}}>NOW</span>

  );
}




// ── Quick Log Floating Widget ────────────────────────────────────
function QuickLogWidget({weather, onSave, locs}){
  const [open,setOpen]=useState(false);
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const [gpsing,setGpsing]=useState(false);
  const [ql,setQl]=useState({
    type:"sighting",
    locationId:"boundary_base",
    vantageId:"boundary_base",
    pairStatus:"unknown",
    notes:"",
  });

  // "I'm Here Now" — finds nearest LOCS entry to GPS position
  function gpsLocate(){
    if(!navigator.geolocation){alert("GPS not available");return;}
    setGpsing(true);
    navigator.geolocation.getCurrentPosition(pos=>{
      setGpsing(false);
      const {latitude:lat,longitude:lng}=pos.coords;
      let best=null,bestD=Infinity;
      locs.forEach(l=>{
        const dlat=(l.lat-lat)*111;
        const dlng=(l.lng-lng)*111*Math.cos(lat*Math.PI/180);
        const d=Math.sqrt(dlat*dlat+dlng*dlng);
        if(d<bestD){bestD=d;best=l;}
      });
      if(best&&bestD<5){
        setQl(p=>({...p,vantageId:best.id,locationId:best.id}));
      } else {
        alert("No known location within 5km of your GPS position.");
      }
    },err=>{setGpsing(false);alert("GPS error: "+err.message);},{enableHighAccuracy:true,timeout:8000});
  }

  function quickSave(){
    setSaving(true);
    const now=getMelbNow();
    const ts=`${now.getUTCFullYear()}-${String(now.getUTCMonth()+1).padStart(2,"0")}-${String(now.getUTCDate()).padStart(2,"0")}T${String(now.getUTCHours()).padStart(2,"0")}:${String(now.getUTCMinutes()).padStart(2,"0")}`;
    const loc=locs.find(l=>l.id===ql.locationId);
    const rec={
      id:genId(ts),timestamp:ts,
      vantagePoint:locs.find(l=>l.id===ql.vantageId)?.name||ql.vantageId,
      vantagePointId:ql.vantageId,
      location:loc?.name||ql.locationId,locationId:ql.locationId,
      locationType:loc?.type||"unknown",
      recordType:ql.type,
      behavior:ql.type==="sighting"?"unknown":"n/a",
      birdCount:1,countMin:1,countMax:1,
      pairStatus:ql.pairStatus,
      altitude:"unknown",
      carryingPrey:false,escort:false,
      notes:ql.notes,
      windDir:weather.windDir,windSpeed:weather.windSpeed,
      windGust:weather.windGust||null,
      temp:weather.temp,cloudClass:weather.cloudClass,
      conditions:weather.conditions,
      thermalWindow:getTW(ts),season:getSeason(ts),
      createdAt:new Date().toISOString(),
    };
    onSave(rec);
    setSaving(false);setSaved(true);
    setTimeout(()=>{setSaved(false);setOpen(false);setQl(p=>({...p,notes:"",pairStatus:"unknown"}));},1200);
  }

  const btnBase={border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:700};

  return(
    <>
      {/* FAB button */}
      <button onClick={()=>setOpen(o=>!o)} style={{...btnBase,
        position:"fixed",bottom:24,right:18,zIndex:900,
        width:56,height:56,borderRadius:28,
        background:open?"rgba(248,113,113,0.9)":"linear-gradient(135deg,#a78bfa,#818cf8)",
        boxShadow:"0 4px 20px rgba(0,0,0,0.5)",
        fontSize:24,display:"flex",alignItems:"center",justifyContent:"center",
        transition:"all 0.2s",transform:open?"rotate(45deg)":"rotate(0deg)"}}>
        {saved?"✓":"+"}
      </button>

      {/* Quick-log panel */}
      {open&&(
        <div style={{position:"fixed",bottom:90,right:14,zIndex:901,width:300,
          background:"rgba(20,12,40,0.97)",border:"1px solid rgba(167,139,250,0.25)",
          borderRadius:18,padding:16,boxShadow:"0 8px 40px rgba(0,0,0,0.7)",
          backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)"}}>

          {/* Header */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <div>
              <div style={{fontSize:15,fontWeight:800,color:"#a78bfa"}}>⚡ Quick Log</div>
              <div style={{fontSize:15,color:DS.muted}}>{weather.windDir} {weather.windSpeed}km/h{weather.windGust?` G${weather.windGust}`:""} · {weather.temp}°C</div>
            </div>
            <button onClick={gpsLocate} style={{...btnBase,padding:"5px 9px",borderRadius:9,
              background:gpsing?"rgba(45,212,191,0.15)":"rgba(45,212,191,0.1)",
              border:"1px solid rgba(45,212,191,0.3)",color:"#2dd4bf",fontSize:14}}>
              {gpsing?"📡…":"📍 Here"}
            </button>
          </div>

          {/* Record type */}
          <div style={{display:"flex",gap:5,marginBottom:10}}>
            {["sighting","absence","alarm"].map(t=>(
              <button key={t} onClick={()=>setQl(p=>({...p,type:t}))} style={{...btnBase,flex:1,padding:"7px 4px",borderRadius:9,fontSize:14,
                background:ql.type===t?t==="alarm"?"linear-gradient(135deg,#fb923c,#f87171)":"rgba(167,139,250,0.2)":"rgba(255,255,255,0.05)",

              <div style={{display:"flex",gap:4}}>
                {[{v:"unknown",l:"?",e:"❓"},{v:"single_A",l:"A",e:"🦅"},{v:"single_B",l:"B",e:"🦅"},{v:"pair",l:"Both",e:"🦅🦅"}].map(opt=>(
                  <button key={opt.v} onClick={()=>setQl(p=>({...p,pairStatus:opt.v}))} style={{...btnBase,flex:1,padding:"6px 2px",borderRadius:8,fontSize:15,
                    background:ql.pairStatus===opt.v?"rgba(167,139,250,0.2)":"rgba(255,255,255,0.04)",
                    border:`1px solid ${ql.pairStatus===opt.v?"rgba(167,139,250,0.45)":"rgba(255,255,255,0.07)"}`,
