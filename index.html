            enrichWeather={enrichWeather}
            enrichStatus={enrichStatus}
            needsWeather={needsWeather}
            getSightingRating={getSightingRating}
            supaSave={supaSave}
            setSightings={setSightings}
            fmtTs={fmtTs}
            jumpToId={jumpToId}
            onJumpHandled={()=>setJumpToId(null)}
            fixMidnightTimestamps={fixMidnightTimestamps}
            fixMidnightStatus={fixMidnightStatus}
            runNaiveTimestampFix={runNaiveTimestampFix}
            naiveFixStatus={naiveFixStatus}
            onMapNav={(locId)=>{
              // Resolve name→id if needed
              const resolved=LOCS.find(l=>l.id===locId)||LOCS.find(l=>l.name===locId)||LOCS.find(l=>l.name?.startsWith(locId?.split(",")[0]?.trim()));
              setSelectedLocId(resolved?resolved.id:locId);
              setTab("dashboard");
            }}
          />
        )}

        {tab==="notifications"&&(
          <NotificationsTab sightings={sightings} weather={weather} predictions={predictions} onNavigate={(id)=>{setJumpToId(id);setTab("history");}} onMapNav={(locId)=>{
              // Resolve name→id if needed
              const resolved=LOCS.find(l=>l.id===locId)||LOCS.find(l=>l.name===locId)||LOCS.find(l=>l.name?.startsWith(locId?.split(",")[0]?.trim()));
              setSelectedLocId(resolved?resolved.id:locId);
              setTab("dashboard");
            }}/>
        )}
      </div>

      {exportModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:"0 0 20px 0"}} onClick={()=>setExportModal(false)}>
          <div style={{background:"#1a1035",borderRadius:20,padding:20,width:"100%",maxWidth:500,maxHeight:"75vh",display:"flex",flexDirection:"column",gap:12,border:"1px solid rgba(167,139,250,0.2)"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:14,fontWeight:800}}>📋 Export Data</div>
                <div style={{fontSize:14,color:DS.muted,marginTop:2}}>{sightings.length} records · Copy and save as a .csv file</div>
              </div>
              <button onClick={()=>setExportModal(false)} style={{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:8,padding:"5px 10px",color:DS.sub,cursor:"pointer",fontFamily:"inherit",fontSize:15}}>✕</button>
            </div>
            <textarea readOnly value={exportText} style={{flex:1,minHeight:200,maxHeight:340,background:"rgba(0,0,0,0.4)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,color:"#94a3b8",fontSize:15,fontFamily:"monospace",padding:12,resize:"none",outline:"none"}}>{exportText}</textarea>
            <button onClick={()=>{navigator.clipboard?.writeText(exportText).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);}).catch(()=>{});}} style={{width:"100%",padding:13,background:copied?"rgba(74,222,128,0.15)":"linear-gradient(135deg,#a78bfa,#818cf8)",border:copied?"1px solid rgba(74,222,128,0.3)":"none",borderRadius:14,color:copied?"#4ade80":"#fff",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>
              {copied?"✓ Copied to clipboard!":"Copy all to clipboard"}
            </button>
            <div style={{fontSize:14,color:DS.muted,textAlign:"center"}}>Paste into a .csv file or spreadsheet to save. Re-import anytime using the Import button on the Records tab.</div>
          </div>
        </div>
      )}
      <style>{`
        *{box-sizing:border-box;}
        select option{background:#1a1035;color:#f1f0f7;}
        @keyframes pulse{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
        @keyframes pulse2{0%,100%{opacity:1}50%{opacity:0.4}}
        @keyframes eaglePulse{0%,100%{opacity:1;transform:scale(1) translate(-50%,-120%)}50%{opacity:0.7;transform:scale(1.08) translate(-47%,-125%)}}
        ::-webkit-scrollbar{width:3px;height:3px;}
        ::-webkit-scrollbar-thumb{background:rgba(167,139,250,0.2);border-radius:3px;}
      `}</style>
    </div>
  );
}


const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(ErrorBoundary,null,React.createElement(App)));
</script>
<script>
// Detect if React failed to mount and show diagnostic
setTimeout(function() {
  var r = document.getElementById('root');
  if (!r || !r.hasChildNodes()) {
    var overlay = document.getElementById('error-overlay');
    overlay.style.display = 'block';
    overlay.innerHTML = '<strong style="font-size:16px">⚠️ App failed to mount</strong><br><br>' +
      'Check the RED error box on this page for the exact error.<br>' +
      'If no red box: open DevTools (F12) → Console.<br><br>' +
      '<strong>Common causes:</strong><br>' +
      '• JSX syntax error in a template literal<br>' +
      '• Self-closing textarea element<br>' +
      '• Mismatched JSX tags<br><br>' +
      '<em>Open DevTools → Console tab to see the error.</em>';
  }
}, 4000);
</script>
</body>
</html>
