// ── Seasonal Breakdown Panel ─────────────────────────────────────
function SeasonalPanel({sightings}){
  const SEASONS=["Summer","Autumn","Winter","Spring"];
  const SCOL={"Summer":"#fb923c","Autumn":"#f59e0b","Winter":"#818cf8","Spring":"#4ade80"};
  const sightingRecs=sightings.filter(s=>s.recordType==="sighting"&&s.timestamp);
  if(sightingRecs.length<2) return(
    <div style={{textAlign:"center",padding:"24px 0",color:"rgba(255,255,255,0.3)",fontSize:14}}>
      Log more sightings to build seasonal data (need 2+)
    </div>
  );
  // Count sightings and low-pass events per season
  const counts={},lowPass={};
  SEASONS.forEach(s=>{counts[s]=0;lowPass[s]=0;});
  sightingRecs.forEach(s=>{
    const se=s.season||getSeason(s.timestamp);
    if(counts[se]!==undefined){
      counts[se]++;
      const alt=(s.altitude||"").toLowerCase();
      const bhv=(s.behavior||"").toLowerCase();
      if(alt==="low"||alt==="very low"||bhv.includes("low pass")||bhv==="low_pass")lowPass[se]++;
    }
  });
  const maxCount=Math.max(...SEASONS.map(s=>counts[s]),1);
  const maxLP=Math.max(...SEASONS.map(s=>lowPass[s]),1);
  const total=sightingRecs.length;

  // ── Best conditions for low-pass sightings per season ──
  const bestConds={};
  SEASONS.forEach(se=>{
    const lpRecs=sightingRecs.filter(s=>{
      const thisSe=s.season||getSeason(s.timestamp);
      const alt=(s.altitude||"").toLowerCase();
      const bhv=(s.behavior||"").toLowerCase();
      return thisSe===se&&(alt==="low"||alt==="very low"||bhv.includes("low pass")||bhv==="low_pass");
    });
    if(lpRecs.length===0){bestConds[se]=null;return;}
    // Aggregate weather from predSnapshot or weatherEnriched records
    const winds=[],temps=[],clouds=[];
    lpRecs.forEach(s=>{
      const snap=s.predSnapshot||{};
      const wDir=snap.windDir||s.windDir;
      const wSpd=typeof snap.windSpeed==="number"?snap.windSpeed:(typeof s.windSpeed==="number"?s.windSpeed:null);
      const tmp=typeof snap.temp==="number"?snap.temp:(typeof s.temp==="number"?s.temp:null);
      const cl=snap.cloudClass||s.cloudClass;
      if(wDir)winds.push(wDir);
      if(wSpd!==null)temps.push({t:tmp,w:wSpd,c:cl,dir:wDir});
    });
    // Most common wind direction
    const wdCounts={};winds.forEach(d=>{wdCounts[d]=(wdCounts[d]||0)+1;});
    const topWind=Object.entries(wdCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]||null;
    // Avg speed + temp
    const withData=temps.filter(r=>r.t!==null&&r.w!==null);
    const avgSpeed=withData.length>0?Math.round(withData.reduce((a,r)=>a+r.w,0)/withData.length):null;
    const minSpeed=withData.length>0?Math.min(...withData.map(r=>r.w)):null;
    const maxSpeed=withData.length>0?Math.max(...withData.map(r=>r.w)):null;
    const avgTemp=withData.length>0?Math.round(withData.reduce((a,r)=>a+r.t,0)/withData.length):null;
    const minTemp=withData.length>0?Math.min(...withData.map(r=>r.t)):null;
    const maxTemp=withData.length>0?Math.max(...withData.map(r=>r.t)):null;
    // Most common cloud
    const clCounts={};temps.filter(r=>r.c).forEach(r=>{clCounts[r.c]=(clCounts[r.c]||0)+1;});
    const topCloud=Object.entries(clCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]||null;
    bestConds[se]={topWind,avgSpeed,minSpeed,maxSpeed,avgTemp,minTemp,maxTemp,topCloud,n:lpRecs.length};
  });

  const BarRow=({label,value,max,color,suffix})=>{
    const pct=max>0?Math.round(value/max*100):0;
    return(
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
        <span style={{width:52,fontSize:15,fontWeight:700,color,textAlign:"right",flexShrink:0}}>{label}</span>
        <div style={{flex:1,height:22,background:"rgba(255,255,255,0.04)",borderRadius:5,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${Math.max(value>0?3:0,pct)}%`,
            background:`linear-gradient(90deg,${color}cc,${color}66)`,
            borderRadius:5,transition:"width 0.5s ease",
            display:"flex",alignItems:"center",paddingLeft:6}}>
            {value>0&&<span style={{fontSize:15,fontWeight:800,color:"rgba(0,0,0,0.75)",whiteSpace:"nowrap"}}>{value}{suffix||""}</span>}
          </div>
        </div>
        <span style={{fontSize:15,color:"rgba(255,255,255,0.35)",width:30,flexShrink:0,textAlign:"right"}}>
          {value>0?`${Math.round(value/total*100)}%`:"—"}
        </span>
      </div>
    );
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>

      {/* ── Season summary boxes ── */}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {SEASONS.filter(s=>counts[s]>0).map(s=>{
          const bc=bestConds[s];
          return(
          <div key={s} style={{padding:"14px 16px",background:`${SCOL[s]}0e`,
            border:`1px solid ${SCOL[s]}30`,borderRadius:12}}>
            {/* Season header */}
            <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:6}}>
              <span style={{fontSize:13,fontWeight:800,color:SCOL[s]}}>{s}</span>
              <span style={{fontSize:18,fontWeight:900,color:"#ffffff"}}>{counts[s]}</span>
              <span style={{fontSize:12,color:"rgba(255,255,255,0.5)"}}>sighting{counts[s]!==1?"s":""}</span>
              {lowPass[s]>0&&<span style={{fontSize:12,fontWeight:700,color:SCOL[s],marginLeft:"auto"}}>🦅 {lowPass[s]} low-pass</span>}
            </div>
            {/* Best low-pass conditions */}
            {bc?(
              <div style={{borderTop:`1px solid ${SCOL[s]}22`,paddingTop:8,marginTop:2}}>
                <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.45)",letterSpacing:0.4,marginBottom:5}}>BEST LOW-PASS CONDITIONS ({bc.n} events)</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {bc.topCloud&&<span style={{fontSize:12,background:"rgba(255,255,255,0.08)",borderRadius:6,padding:"3px 8px",color:"rgba(255,255,255,0.8)"}}>{bc.topCloud==="Clear"?"☀️ Clear":bc.topCloud==="Thin"?"🌤 Thin cloud":bc.topCloud==="Broken"?"⛅ Broken cloud":"🌥 "+bc.topCloud}</span>}
                  {bc.topWind&&<span style={{fontSize:12,background:"rgba(255,255,255,0.08)",borderRadius:6,padding:"3px 8px",color:"rgba(255,255,255,0.8)"}}>🧭 {bc.topWind} wind</span>}
                  {bc.avgSpeed!==null&&<span style={{fontSize:12,background:"rgba(255,255,255,0.08)",borderRadius:6,padding:"3px 8px",color:"rgba(255,255,255,0.8)"}}>💨 {bc.minSpeed!==null&&bc.maxSpeed!==null&&bc.minSpeed!==bc.maxSpeed?`${bc.minSpeed}–${bc.maxSpeed}`:`~${bc.avgSpeed}`} km/h</span>}
                  {bc.avgTemp!==null&&<span style={{fontSize:12,background:"rgba(255,255,255,0.08)",borderRadius:6,padding:"3px 8px",color:"rgba(255,255,255,0.8)"}}>🌡 {bc.minTemp!==null&&bc.maxTemp!==null&&bc.minTemp!==bc.maxTemp?`${bc.minTemp}–${bc.maxTemp}`:`~${bc.avgTemp}`}°C</span>}
                </div>
              </div>
            ):(
              <div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginTop:4}}>
                {lowPass[s]===0?"No low-pass events yet — log sightings with altitude Low/Very Low":"No weather data on low-pass records"}
              </div>
            )}
          </div>
          );
        })}
      </div>

      <div style={{height:1,background:"rgba(255,255,255,0.07)",margin:"4px 0"}}/>

      {/* ── Total sightings per season ── */}
      <div>
        <div style={{fontSize:14,fontWeight:700,color:"rgba(255,255,255,0.5)",letterSpacing:0.5,marginBottom:10}}>
          SIGHTINGS PER SEASON
          <span style={{fontWeight:400,marginLeft:6,fontSize:15}}>({total} total)</span>
        </div>
        {SEASONS.map(s=>(
          <BarRow key={s} label={s.slice(0,3).toUpperCase()} value={counts[s]} max={maxCount} color={SCOL[s]}/>
        ))}
        <div style={{fontSize:14,color:"rgba(255,255,255,0.25)",marginTop:4}}>
          % column = share of all sightings
        </div>
      </div>

      {/* ── Low-pass events per season ── */}
      <div>
        <div style={{fontSize:14,fontWeight:700,color:"rgba(255,255,255,0.5)",letterSpacing:0.5,marginBottom:10}}>
          LOW-PASS EVENTS PER SEASON
          <span style={{fontWeight:400,marginLeft:6,fontSize:15}}>(altitude: low/very low or behaviour: low pass)</span>
        </div>
        {SEASONS.map(s=>(
          <BarRow key={s} label={s.slice(0,3).toUpperCase()} value={lowPass[s]} max={Math.max(maxLP,1)} color={SCOL[s]}/>
        ))}
        {SEASONS.every(s=>lowPass[s]===0)&&(
          <div style={{fontSize:15,color:"rgba(255,255,255,0.25)",marginTop:4}}>
            No low-pass events recorded yet. These are logged when altitude is "Low" or "Very Low".
          </div>
        )}
      </div>

    </div>
  );
}

function TimeLineChart({sightings}){
  const seasons=["Summer","Autumn","Winter","Spring"];
  const SCOL={"Summer":"#fb923c","Autumn":"#f59e0b","Winter":"#818cf8","Spring":"#4ade80"};
  const hours=Array.from({length:16},(_,i)=>i+5); // 5am–8pm

  // Build hour totals per season
  const matrix={};
  seasons.forEach(s=>{matrix[s]=Array(24).fill(0);});
  let total=0;
  sightings.filter(s=>s.recordType==="sighting"&&s.timestamp).forEach(s=>{
    const h=Math.floor(getHourDec(s.timestamp));
    const se=s.season||getSeason(s.timestamp);
    if(matrix[se])matrix[se][h]++;
    total++;
  });

  const[activeSeason,setActiveSeason]=useState(null);
  const shownSeasons=activeSeason?[activeSeason]:seasons;

  if(total<3)return(
    <div style={{textAlign:"center",padding:"24px 0",color:DS.muted,fontSize:14}}>
      Log more sightings to build the time chart (need 3+)
    </div>
  );

  // Chart dimensions
  const W=320; const H=140; const PAD={t:10,r:10,b:28,l:28};
  const chartW=W-PAD.l-PAD.r;
  const chartH=H-PAD.t-PAD.b;

  // Max for y scale
  const allVals=shownSeasons.flatMap(se=>hours.map(h=>matrix[se][h]));
  const maxV=Math.max(...allVals,1);

  // Build SVG polyline points for each season
  const pts=(se)=>hours.map((h,i)=>{
    const x=PAD.l+(i/(hours.length-1))*chartW;
    const y=PAD.t+chartH-(matrix[se][h]/maxV)*chartH;
    return [x,y];
  });

  // Y grid lines
  const yTicks=[0,Math.round(maxV/2),maxV].filter((v,i,a)=>a.indexOf(v)===i);

  return(
    <div>
      {/* Season filter pills */}
      <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
        {seasons.map(s=>(
          <button key={s} onClick={()=>setActiveSeason(activeSeason===s?null:s)}
            style={{padding:"3px 10px",borderRadius:20,
              border:`1px solid ${activeSeason===s?SCOL[s]:"rgba(255,255,255,0.1)"}`,
              background:activeSeason===s?`rgba(${s==="Summer"?"251,146,60":s==="Autumn"?"245,158,11":s==="Winter"?"129,140,248":"74,222,128"},0.12)`:"transparent",
              color:activeSeason===s?SCOL[s]:DS.muted,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
            {s}
          </button>
        ))}
        <span style={{fontSize:13,color:DS.muted,marginLeft:"auto",alignSelf:"center"}}>{total} sightings</span>
      </div>

      {/* SVG line chart */}
      <div style={{overflowX:"auto"}}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W,display:"block"}}>
          {/* Y grid lines */}
          {yTicks.map(v=>{
            const y=PAD.t+chartH-(v/maxV)*chartH;
            return(
              <g key={v}>
                <line x1={PAD.l} x2={PAD.l+chartW} y1={y} y2={y} stroke="rgba(255,255,255,0.07)" strokeWidth="1"/>
                <text x={PAD.l-4} y={y+4} textAnchor="end" fontSize="8" fill="rgba(255,255,255,0.3)">{v}</text>
              </g>
            );
          })}
          {/* Lines per season */}
          {shownSeasons.map(se=>{
            const points=pts(se);
            const polyline=points.map(([x,y])=>`${x.toFixed(1)},${y.toFixed(1)}`).join(" ");
            return(
              <g key={se}>
                <polyline points={polyline} fill="none" stroke={SCOL[se]} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" opacity="0.85"/>
                {/* Dots at each hour */}
                {points.map(([x,y],i)=>matrix[se][hours[i]]>0&&(
                  <circle key={i} cx={x} cy={y} r="3" fill={SCOL[se]} opacity="0.9">
                    <title>{se} {hours[i]}:00 — {matrix[se][hours[i]]} sighting{matrix[se][hours[i]]!==1?"s":""}</title>
                  </circle>
                ))}
              </g>
            );
          })}
          {/* X axis hour labels */}
          {hours.map((h,i)=>{
            const x=PAD.l+(i/(hours.length-1))*chartW;
            const show=h%2===0||hours.length<=10;
            return show?(
              <text key={h} x={x} y={H-6} textAnchor="middle" fontSize="8"
                fill={h>=6&&h<=10?"rgba(255,255,255,0.7)":"rgba(255,255,255,0.3)"}
                fontWeight={h>=6&&h<=10?"700":"400"}>
                {h}
              </text>
            ):null;
          })}
          {/* X axis baseline */}
          <line x1={PAD.l} x2={PAD.l+chartW} y1={PAD.t+chartH} y2={PAD.t+chartH} stroke="rgba(255,255,255,0.15)" strokeWidth="1"/>
        </svg>
      </div>

      {/* Legend */}
      <div style={{display:"flex",gap:12,marginTop:6,flexWrap:"wrap"}}>
        {shownSeasons.map(se=>(
          <div key={se} style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:18,height:3,borderRadius:2,background:SCOL[se]}}/>
            <span style={{fontSize:12,color:DS.muted}}>{se}</span>
          </div>
        ))}
      </div>

      {/* Peak hour insight */}
      {(()=>{
        const hourTotals=hours.map(h=>({h,n:seasons.reduce((acc,se)=>acc+(matrix[se][h]||0),0)}));
        const peak=hourTotals.reduce((a,b)=>b.n>a.n?b:a,{h:0,n:0});
        if(peak.n===0)return null;
        return(
          <div style={{marginTop:10,fontSize:13,color:DS.muted}}>
            Peak activity: <strong style={{color:DS.text}}>{peak.h}:00–{peak.h+1}:00</strong> ({peak.n} sighting{peak.n!==1?"s":""})
          </div>
        );
      })()}
    </div>
  );
}

function TimeHeatmap({sightings}){
  const seasons=["Summer","Autumn","Winter","Spring"];
  const SCOL={"Summer":"#fb923c","Autumn":"#f59e0b","Winter":"#818cf8","Spring":"#4ade80"};
  // Build hour×season matrix
  const matrix={};
  seasons.forEach(s=>{matrix[s]=Array(24).fill(0);});
  let total=0;
  sightings.filter(s=>s.recordType==="sighting"&&s.timestamp).forEach(s=>{
    const h=Math.floor(getHourDec(s.timestamp)); // read time directly, timezone-safe
    const se=s.season||getSeason(s.timestamp);
    if(matrix[se])matrix[se][h]++;
    total++;
  });
  if(total<3)return(
    <div style={{textAlign:"center",padding:"24px 0",color:DS.muted,fontSize:14}}>
      Log more sightings to build the heatmap (need 3+)
    </div>
  );
  // Max value for scaling
  const allVals=seasons.flatMap(se=>matrix[se]);
  const maxV=Math.max(...allVals,1);
  // Show hours 5–20 only
  const hours=Array.from({length:16},(_,i)=>i+5);
  const [activeSeason,setActiveSeason]=useState(null);
  const shownSeasons=activeSeason?[activeSeason]:seasons;
  return(
    <div>
      {/* Season filter pills */}
      <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
        {seasons.map(s=>(
          <button key={s} onClick={()=>setActiveSeason(activeSeason===s?null:s)}
            style={{padding:"3px 10px",borderRadius:20,border:`1px solid ${activeSeason===s?SCOL[s]:"rgba(255,255,255,0.1)"}`,
              background:activeSeason===s?`rgba(${s==="Summer"?"251,146,60":s==="Autumn"?"245,158,11":s==="Winter"?"129,140,248":"74,222,128"},0.15)`:"transparent",
              color:activeSeason===s?SCOL[s]:DS.muted,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
            {s}
          </button>
        ))}
        <span style={{fontSize:15,color:DS.muted,marginLeft:"auto",alignSelf:"center"}}>{total} sightings</span>
      </div>
      {/* Chart */}
      <div style={{overflowX:"auto"}}>
        <div style={{minWidth:300,position:"relative"}}>
          {/* Season rows */}
          {shownSeasons.map(se=>(
            <div key={se} style={{display:"flex",alignItems:"center",marginBottom:6,gap:4}}>
              <div style={{width:46,fontSize:14,fontWeight:700,color:SCOL[se],textAlign:"right",flexShrink:0}}>{se.slice(0,3).toUpperCase()}</div>
              <div style={{display:"flex",flex:1,gap:2}}>
                {hours.map(h=>{
                  const v=matrix[se][h];
                  const intensity=v/maxV;
                  const alpha=intensity===0?0.04:0.1+intensity*0.88;
                  const bg=v===0?"rgba(255,255,255,0.03)":`rgba(${se==="Summer"?"251,146,60":se==="Autumn"?"245,158,11":se==="Winter"?"129,140,248":"74,222,128"},${alpha})`;
                  return(
                    <div key={h} title={`${se} ${h}:00 — ${v} sighting${v!==1?"s":""}`}
                      style={{flex:1,height:28,borderRadius:4,background:bg,
                        border:`1px solid rgba(255,255,255,${intensity*0.12})`,
                        display:"flex",alignItems:"center",justifyContent:"center",cursor:"default"}}>
                      {v>0&&<span style={{fontSize:7,fontWeight:800,color:"rgba(255,255,255,0.85)"}}>{v}</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
          {/* Hour labels */}
          <div style={{display:"flex",alignItems:"center",gap:4,marginTop:4}}>
            <div style={{width:50,flexShrink:0}}/>
            <div style={{display:"flex",flex:1,gap:2}}>
              {hours.map(h=>(
                <div key={h} style={{flex:1,textAlign:"center",fontSize:7,color:DS.muted,fontWeight:h===12?700:400,color:h>=10&&h<=15?"rgba(251,146,60,0.7)":DS.muted}}>{h}</div>
              ))}
            </div>
          </div>
          <div style={{textAlign:"center",fontSize:14,color:DS.muted,marginTop:2}}>Hour of day (24h) · darker = more sightings</div>
        </div>
      </div>
      {/* Peak insight */}
      {(()=>{
        const hourTotals=hours.map(h=>({h,n:seasons.reduce((acc,se)=>acc+(matrix[se][h]||0),0)}));
        const peak=hourTotals.reduce((a,b)=>b.n>a.n?b:a,{h:0,n:0});
        return peak.n>0?(
          <div style={{marginTop:10,padding:"8px 12px",background:"rgba(251,146,60,0.07)",border:"1px solid rgba(251,146,60,0.18)",borderRadius:10,fontSize:14,color:"rgba(224,213,247,0.75)"}}>
            📈 Peak hour across all seasons: <strong style={{color:"#fb923c"}}>{peak.h}:00–{peak.h+1}:00</strong> · {peak.n} sightings
          </div>
        ):null;
      })()}
    </div>
  );
}

// ── Wind Direction Rose ──────────────────────────────────────────
function WindRose({sightings}){
  const dirs=["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
  const [filterLoc,setFilterLoc]=useState("all");
  const [filterSeason,setFilterSeason]=useState("all");

  const filtered=sightings.filter(s=>{
    if(s.recordType!=="sighting"||!s.windDir)return false;
    if(filterLoc!=="all"&&s.locationId!==filterLoc)return false;
    if(filterSeason!=="all"&&s.season!==filterSeason)return false;
    return true;
  });

  const counts={};dirs.forEach(d=>{counts[d]=0;});
  filtered.forEach(s=>{if(counts[s.windDir]!==undefined)counts[s.windDir]++;});
  const maxC=Math.max(...Object.values(counts),1);
  const total=filtered.length;

  // Unique locations that have sightings
  const locIds=[...new Set(sightings.filter(s=>s.recordType==="sighting"&&s.locationId).map(s=>s.locationId))];
  const seasons=["Summer","Autumn","Winter","Spring"];

  // SVG rose
  const cx=110,cy=110,R=80;
  const paths=dirs.map((d,i)=>{
    const angle=(i/16)*360-90; // -90 to start at N
    const r=(counts[d]/maxC)*R;
    if(r<1)return null;
    const w=10; // half-width degrees
    const a1=(angle-w)*Math.PI/180;
    const a2=(angle+w)*Math.PI/180;
    const x1=cx+Math.cos(a1)*r, y1=cy+Math.sin(a1)*r;
    const x2=cx+Math.cos(a2)*r, y2=cy+Math.sin(a2)*r;
    const xi=cx+Math.cos(a1)*4, yi=cy+Math.sin(a1)*4;
    const xi2=cx+Math.cos(a2)*4,yi2=cy+Math.sin(a2)*4;
    const pct=Math.round(counts[d]/total*100);
    const intensity=counts[d]/maxC;
    const alpha=0.3+intensity*0.65;
    return{d:d,path:`M${xi},${yi} L${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2} L${xi2},${yi2} Z`,
      fill:`rgba(167,139,250,${alpha})`,count:counts[d],pct,angle};
  }).filter(Boolean);

  // Cardinal label positions
  const cardinals=["N","E","S","W"];
  const cardAngles=[270,0,90,180]; // SVG angles (0=east)

  return(
    <div>
      {/* Filters */}
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
        <select value={filterLoc} onChange={e=>setFilterLoc(e.target.value)}
          style={{padding:"4px 8px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:DS.text,fontSize:14,fontFamily:"inherit",flex:1,minWidth:0}}>
          <option value="all">All locations</option>
          {locIds.map(id=>{const l=LOCS.find(x=>x.id===id);return l?<option key={id} value={id}>{l.name.split(/[,—]/)[0].trim().slice(0,22)}</option>:null;})}
        </select>
        <select value={filterSeason} onChange={e=>setFilterSeason(e.target.value)}
          style={{padding:"4px 8px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:DS.text,fontSize:14,fontFamily:"inherit"}}>
          <option value="all">All seasons</option>
          {seasons.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
      </div>
      {total<3?(
        <div style={{textAlign:"center",padding:"24px 0",color:DS.muted,fontSize:14}}>Log more sightings with wind data (need 3+)</div>
      ):(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
          <svg width={220} height={220} viewBox="0 0 220 220">
            {/* Rings */}
            {[0.25,0.5,0.75,1].map(r=>(
              <circle key={r} cx={cx} cy={cy} r={R*r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={0.8}/>
            ))}
            {/* Spokes */}
            {dirs.map((_,i)=>{
              const a=(i/16)*360*Math.PI/180-Math.PI/2;
              return<line key={i} x1={cx} y1={cy} x2={cx+Math.cos(a)*R} y2={cy+Math.sin(a)*R} stroke="rgba(255,255,255,0.05)" strokeWidth={0.6}/>;
            })}
            {/* Petals */}
            {paths.map(p=>(
              <path key={p.d} d={p.path} fill={p.fill} stroke="rgba(167,139,250,0.2)" strokeWidth={0.5}>
                <title>{p.d}: {p.count} sightings ({p.pct}%)</title>
              </path>
            ))}
            {/* Cardinal labels */}
            {cardinals.map((c,i)=>{
              const a=cardAngles[i]*Math.PI/180;
              const lx=cx+Math.cos(a)*(R+14);
              const ly=cy+Math.sin(a)*(R+14);
              return<text key={c} x={lx} y={ly} textAnchor="middle" dominantBaseline="middle" fontSize={10} fontWeight={700} fill="rgba(224,213,247,0.7)">{c}</text>;
            })}
            {/* Centre count */}
            <text x={cx} y={cy-6} textAnchor="middle" fontSize={14} fontWeight={800} fill="#a78bfa">{total}</text>
            <text x={cx} y={cy+8} textAnchor="middle" fontSize={7} fill={DS.muted}>sightings</text>
          </svg>
          {/* Top wind directions */}
          {(()=>{
            const top=paths.sort((a,b)=>b.count-a.count).slice(0,4);
            return(
              <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center",marginTop:4}}>
                {top.map(p=>(
                  <div key={p.d} style={{padding:"3px 9px",borderRadius:20,background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.2)"}}>
                    <span style={{color:"#a78bfa",fontSize:14,fontWeight:700}}>{p.d}</span>
                    <span style={{color:DS.muted,fontSize:15}}> {p.pct}%</span>
                  </div>
                ))}
              </div>
            );
          })()}
          <div style={{fontSize:15,color:DS.muted,marginTop:6}}>Longer petals = more sightings in that wind direction</div>
        </div>
      )}
    </div>
  );
}

// ── Analysis Tab Container ───────────────────────────────────────
function AnalysisTab({sightings, calibStats, calibMultiplier, accuracyOnly=false}){
  const [subtab,setSubtab]=useState(accuracyOnly?"calibration":"timeoday");
  const [analysisLoc,setAnalysisLoc]=useState("all");

  // Filter sightings by selected location for all analysis
  const filteredSightings=React.useMemo(()=>
    analysisLoc==="all"?sightings:sightings.filter(s=>s.locationId===analysisLoc||s.vantagePointId===analysisLoc)
  ,[sightings,analysisLoc]);

  // ── Prediction Accuracy subtab content ──
  const CalibPanel=()=>{
    // Only live-logged sightings with real-time weather predictions
    const withPred=filteredSightings.filter(s=>
      s.recordType==="sighting"&&
      typeof s.predictedProb==="number"&&s.predictedProb>0&&
      s.source!=="MPE_import"&&
      !(s.source==="ebird"||s.ebirdSubId)&&
      s.predSnapshot?.windSpeed>0
    ).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));

    if(withPred.length===0) return(
      <div style={{textAlign:"center",padding:"28px 16px",color:DS.muted}}>
        <div style={{fontSize:24,marginBottom:8}}>📊</div>
        <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>No live calibration data yet</div>
        <div style={{fontSize:14,lineHeight:1.6,color:DS.muted}}>Calibration uses sightings you log live during a watch session — not bulk imports. This ensures the model&apos;s probability at the exact moment of sighting is compared to a real outcome. was predicting at that moment. Once you have a few records, this panel will show how well the model is performing and auto-adjust future predictions.</div>
      </div>
    );

    const biasColor=calibStats?.overallBias==="under"?"#f97316":calibStats?.overallBias==="over"?"#a78bfa":"#22c55e";
    const biasLabel=calibStats?.overallBias==="under"?"Under-predicting — boosting model":"over"===calibStats?.overallBias?"Over-predicting — dampening model":"Well calibrated ✓";
    const multPct=calibMultiplier?Math.round((calibMultiplier-1)*100):0;
    const multLabel=multPct>0?`+${multPct}% applied`:multPct<0?`${multPct}% applied`:"No adjustment";

    return(
      <div style={{display:"flex",flexDirection:"column",gap:14}}>

        {/* ── Prediction Accuracy Summary (top of section) ── */}
        {(()=>{
          const withPred=sightings.filter(s=>s.recordType==="sighting"&&typeof s.predictedProb==="number"&&s.predictedProb>0&&s.source!=="MPE_import"&&!(s.source==="ebird"||s.ebirdSubId)&&s.predSnapshot?.windSpeed>0);
          if(withPred.length===0)return null;
          // ── True calibration: for each bucket, what fraction of observations were sightings? ──
          // Requires both sightings AND absences with predictedProb to be meaningful.
          const allPred=sightings.filter(s=>
            (s.recordType==="sighting"||s.recordType==="absence")&&
            typeof s.predictedProb==="number"&&s.predictedProb>0
          );
          const absWithPred=allPred.filter(s=>s.recordType==="absence");
          const nSightings=withPred.length;
          const nAbsences=absWithPred.length;
          // Bucket analysis: for each 20% bucket count sightings vs absences
          const BKTS=[{lo:0,hi:20},{lo:20,hi:40},{lo:40,hi:60},{lo:60,hi:80},{lo:80,hi:100}];
          const bktData=BKTS.map(b=>{
            const bS=withPred.filter(s=>s.predictedProb>=b.lo&&s.predictedProb<b.hi).length;
            const bA=absWithPred.filter(s=>s.predictedProb>=b.lo&&s.predictedProb<b.hi).length;
            const tot=bS+bA;
            return{...b,sightings:bS,absences:bA,total:tot,
              hitRate:tot>0?Math.round(bS/tot*100):null};
          });
          // Overall calibration score: weighted average of |predicted - actual| across buckets with data
          // Lower error = better calibration. Convert to 0-100 score.
          const bktsWithData=bktData.filter(b=>b.total>=2);
          let calibScore=null;
          if(bktsWithData.length>=2){
            const avgErr=bktsWithData.reduce((a,b)=>{
              const midpoint=(b.lo+b.hi)/2;
              return a+Math.abs(midpoint-(b.hitRate??midpoint))*b.total;
            },0)/bktsWithData.reduce((a,b)=>a+b.total,0);
            calibScore=Math.max(1,Math.min(99,Math.round(100-avgErr)));
          }
          // Fallback when not enough absences: show mean confidence as a proxy
          const meanConf=Math.round(withPred.reduce((a,s)=>a+s.predictedProb,0)/withPred.length);
          const hasRealCalib=calibScore!==null;
          const displayScore=hasRealCalib?calibScore:null;
          const accCol=displayScore===null?"#a78bfa":displayScore>=75?"#22c55e":displayScore>=55?"#a78bfa":displayScore>=40?"#fb923c":"#f87171";
          const n=nSightings;const absN=nAbsences;
          return(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {/* Summary pill */}
              <div style={{padding:"13px 15px",background:hasRealCalib?`${accCol}0e`:"rgba(255,255,255,0.03)",border:`1px solid ${hasRealCalib?accCol+"30":"rgba(255,255,255,0.07)"}`,borderRadius:14,display:"flex",alignItems:"center",gap:14}}>
                <div style={{flex:1,minWidth:0}}>
                  {hasRealCalib?(
                    <>
                      <div style={{fontSize:14,fontWeight:800,color:"#e0d5f7",marginBottom:3}}>
                        📊 Model Calibration <span style={{color:accCol,fontSize:15}}>{displayScore}%</span>
                      </div>
                      <div style={{fontSize:14,color:"#c4b8e8",lineHeight:1.5,marginBottom:2}}>
                        {displayScore>=75?"Well calibrated — model confidence matches actual detection rate 🎯":displayScore>=55?"Reasonably calibrated — improving with more data":displayScore>=40?"Moderate — predictions are directionally correct but noisy":"Needs more paired sighting + absence data to calibrate"}
                      </div>
                    </>
                  ):(
                    <>
                      <div style={{fontSize:14,fontWeight:800,color:"#e0d5f7",marginBottom:3}}>📊 Confidence Proxy</div>
                      <div style={{fontSize:14,color:"#c4b8e8",lineHeight:1.5,marginBottom:2}}>
                        Model predicted <strong style={{color:"#a78bfa"}}>{meanConf}%</strong> on average when eagles appeared.
                        Log absences during watch sessions to unlock true calibration.
                      </div>
                    </>
                  )}
                  <div style={{fontSize:15,color:"#8a84a3"}}>{n} sighting{n!==1?"s":""} · {absN} absence{absN!==1?"s":""} with predictions</div>
                </div>
                {hasRealCalib&&(
                  <div style={{position:"relative",width:52,height:52,flexShrink:0}}>
                    <svg viewBox="0 0 52 52" width="52" height="52" style={{transform:"rotate(-90deg)"}}>
                      <circle cx="26" cy="26" r="21" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="5"/>
                      <circle cx="26" cy="26" r="21" fill="none" stroke={accCol} strokeWidth="5"
                        strokeDasharray={`${2*Math.PI*21*displayScore/100} ${2*Math.PI*21}`}
                        strokeLinecap="round" style={{transition:"stroke-dasharray 1s ease"}}/>
                    </svg>
                    <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <span style={{fontSize:15,fontWeight:900,color:accCol}}>{displayScore}%</span>
                    </div>
                  </div>
                )}
              </div>
              {/* Bucket breakdown — only show if we have enough data */}
              {bktsWithData.length>=1&&(
                <div>
                  <div style={{fontSize:15,fontWeight:700,color:"rgba(255,255,255,0.4)",letterSpacing:0.5,marginBottom:8}}>DETECTION RATE BY PREDICTED PROBABILITY</div>
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    {bktData.filter(b=>b.total>0).map(b=>{
                      const midpt=(b.lo+b.hi)/2;
                      const hit=b.hitRate??0;
                      const diff=b.hitRate!==null?hit-midpt:0;
                      const bCol=b.hitRate===null?"rgba(255,255,255,0.2)":Math.abs(diff)<15?"#22c55e":diff>0?"#4ade80":"#f97316";
                      return(
                        <div key={b.lo} style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:15,color:"rgba(255,255,255,0.4)",width:46,textAlign:"right",flexShrink:0}}>{b.lo}–{b.hi}%</span>
                          <div style={{flex:1,height:18,background:"rgba(255,255,255,0.04)",borderRadius:4,overflow:"hidden",position:"relative"}}>
                            {b.hitRate!==null&&(
                              <div style={{height:"100%",width:`${b.hitRate}%`,background:`${bCol}88`,borderRadius:4,transition:"width 0.4s"}}/>
                            )}
                            {/* Ideal line at midpoint */}
                            <div style={{position:"absolute",top:0,bottom:0,left:`${midpt}%`,width:1,background:"rgba(255,255,255,0.25)"}}/>
                          </div>
                          <span style={{fontSize:15,width:54,flexShrink:0,color:bCol,fontWeight:700}}>
                            {b.hitRate!==null?`${b.hitRate}% seen`:"—"}
                          </span>
                          <span style={{fontSize:14,color:"rgba(255,255,255,0.25)",width:28,flexShrink:0}}>{b.total}obs</span>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{fontSize:14,color:"rgba(255,255,255,0.2)",marginTop:6,lineHeight:1.5}}>
                    White line = ideal. Bar = actual detection rate. Green = well calibrated. Orange = over-confident.
                  </div>
                </div>
              )}
            </div>
          );
        })()}

        {/* ── Calibration status header ── */}
        <div style={{padding:"10px 12px",background:"rgba(255,255,255,0.03)",borderRadius:10,border:"1px solid rgba(255,255,255,0.07)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <span style={{fontSize:15,fontWeight:700,color:"#e0d5f7"}}>Model Calibration</span>
            <span style={{fontSize:14,padding:"2px 8px",borderRadius:10,background:`${biasColor}22`,color:biasColor,fontWeight:700}}>{multLabel}</span>
          </div>
          <div style={{fontSize:14,color:biasColor,fontWeight:600,marginBottom:4}}>{biasLabel}</div>
          <div style={{fontSize:15,color:DS.muted,lineHeight:1.55}}>{calibStats?.recordCount||withPred.length} sightings with predictions · mean predicted probability was <strong style={{color:"#e0d5f7"}}>{calibStats?.meanPredicted||"—"}%</strong> at time of sighting{calibStats?.overallBias==="under"?` — model was under-confident (ideal: ~55% for confirmed sightings)`:calibStats?.overallBias==="over"?` — model was over-confident on some detections`:` — model confidence aligns well with confirmed detections`}.</div>
        </div>

        {/* ── Probability bucket bar chart ── */}
        {calibStats?.buckets&&(
          <div>
            <div style={{fontSize:14,fontWeight:700,color:DS.sub,marginBottom:8}}>SIGHTINGS BY PREDICTED PROBABILITY</div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {calibStats.buckets.map(b=>(
                <div key={b.label} style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:15,color:DS.muted,width:42,textAlign:"right",flexShrink:0}}>{b.label}</span>
                  <div style={{flex:1,height:18,background:"rgba(255,255,255,0.04)",borderRadius:4,overflow:"hidden"}}>
                    <div style={{
                      height:"100%",
                      width:`${b.count===0?0:Math.max(4,Math.round((b.count/withPred.length)*100))}%`,
                      background:b.lo>=60?"#22c55e":b.lo>=40?"#a78bfa":b.lo>=20?"#fb923c":"rgba(255,255,255,0.2)",
                      borderRadius:4,transition:"width 0.4s ease",
                      display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:5
                    }}>
                      {b.count>0&&<span style={{fontSize:14,fontWeight:800,color:"rgba(0,0,0,0.7)"}}>{b.count}</span>}
                    </div>
                  </div>
                  <span style={{fontSize:15,color:DS.muted,width:28,flexShrink:0}}>{b.count===0?"—":`${Math.round((b.count/withPred.length)*100)}%`}</span>
                </div>
              ))}
            </div>
            <div style={{fontSize:14,color:DS.muted,marginTop:6,lineHeight:1.5}}>Ideal distribution: most sightings in the 60–80%+ buckets means the model predicted well. Many sightings at &lt;40% means the model was under-predicting when eagles actually appeared → auto-boost applied.</div>
          </div>
        )}

        {/* ── Weekly table ── */}
        {calibStats?.weeklyRows?.length>0&&(
          <div>
            <div style={{fontSize:14,fontWeight:700,color:DS.sub,marginBottom:8}}>WEEKLY REVIEW</div>
            <div style={{display:"flex",flexDirection:"column",gap:3}}>
              <div style={{display:"flex",gap:6,paddingBottom:4,borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
                <span style={{flex:2,fontSize:14,color:DS.muted,fontWeight:700}}>WEEK</span>
                <span style={{flex:1,fontSize:14,color:DS.muted,fontWeight:700,textAlign:"center"}}>SIGHTINGS</span>
                <span style={{flex:1,fontSize:14,color:DS.muted,fontWeight:700,textAlign:"center"}}>AVG PRED %</span>
                <span style={{flex:1,fontSize:14,color:DS.muted,fontWeight:700,textAlign:"center"}}>SIGNAL</span>
              </div>
              {calibStats.weeklyRows.map((row,i)=>{
                const sig=row.meanPred>=60?"Good 🟢":row.meanPred>=40?"Fair 🟡":"Low 🟠";
                return(
                  <div key={i} style={{display:"flex",gap:6,padding:"4px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                    <span style={{flex:2,fontSize:15,color:DS.sub}}>{row.label}</span>
                    <span style={{flex:1,fontSize:15,color:"#e0d5f7",fontWeight:700,textAlign:"center"}}>{row.count}</span>
                    <span style={{flex:1,fontSize:15,color:row.meanPred>=60?"#22c55e":row.meanPred>=40?"#a78bfa":"#f97316",fontWeight:700,textAlign:"center"}}>{row.meanPred}%</span>
                    <span style={{flex:1,fontSize:15,textAlign:"center"}}>{sig}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── Per-record list (most recent 20) ── */}
        <div>
          <div style={{fontSize:14,fontWeight:700,color:DS.sub,marginBottom:8}}>INDIVIDUAL RECORDS ({withPred.length} total)</div>
          <div style={{display:"flex",flexDirection:"column",gap:3}}>
            <div style={{display:"flex",gap:6,paddingBottom:4,borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
              <span style={{flex:2,fontSize:14,color:DS.muted,fontWeight:700}}>DATE & LOCATION</span>
              <span style={{flex:1,fontSize:14,color:DS.muted,fontWeight:700,textAlign:"center"}}>BEHAVIOUR</span>
              <span style={{flex:1,fontSize:14,color:DS.muted,fontWeight:700,textAlign:"center"}}>PRED %</span>
              <span style={{flex:1,fontSize:14,color:DS.muted,fontWeight:700,textAlign:"center"}}>WINDOW</span>
            </div>
            {withPred.slice(0,20).map(s=>{
              const p=s.predictedProb;
              const pCol=p>=60?"#22c55e":p>=40?"#a78bfa":p>=20?"#fb923c":"#94a3b8";
              const snap=s.predSnapshot;
              return(
                <div key={s.id} style={{display:"flex",gap:6,padding:"4px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                  <div style={{flex:2}}>
                    <div style={{fontSize:15,color:"#e0d5f7",fontWeight:600}}>{new Date(s.timestamp).toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"2-digit"})}</div>
                    <div style={{fontSize:14,color:DS.muted,marginTop:1}}>{(s.location||s.locationId||"").slice(0,22)}</div>
                  </div>
                  <div style={{flex:1,textAlign:"center"}}>
                    <span style={{fontSize:14,color:DS.sub}}>{(s.behavior||"—").replace(/_/g," ")}</span>
                  </div>
                  <div style={{flex:1,textAlign:"center"}}>
                    <span style={{fontSize:15,fontWeight:800,color:pCol}}>{p}%</span>
                  </div>
                  <div style={{flex:1,textAlign:"center"}}>
                    <span style={{fontSize:14,color:DS.muted}}>{snap?`${snap.winStart}–${snap.winEnd}h`:"—"}</span>
                  </div>
                </div>
              );
            })}
            {withPred.length>20&&<div style={{fontSize:15,color:DS.muted,textAlign:"center",paddingTop:4}}>+ {withPred.length-20} older records</div>}
          </div>
        </div>

      </div>
    );
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* Location filter */}
      {!accuracyOnly&&(
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{fontSize:12,color:DS.muted,flexShrink:0}}>Location:</div>
          <select value={analysisLoc} onChange={e=>setAnalysisLoc(e.target.value)}
            style={{flex:1,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",
              borderRadius:8,padding:"6px 9px",color:DS.text,fontSize:13,fontFamily:"inherit"}}>
            <option value="all">All locations</option>
            {[...LOCS].sort((a,b)=>a.name.localeCompare(b.name)).map(l=>(
              <option key={l.id} value={l.id}>{l.name}</option>
            ))}
          </select>
        </div>
      )}
      {!accuracyOnly&&(
      <div style={{display:"flex",gap:6,padding:"2px",background:"rgba(255,255,255,0.04)",borderRadius:12,border:"1px solid rgba(255,255,255,0.07)"}}>
        {[{id:"timeoday",label:"⏰ Time & Season"},{id:"calibration",label:"📊 Accuracy"}].map(t=>(
          <button key={t.id} onClick={()=>setSubtab(t.id)} style={{flex:1,padding:"8px 6px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:"inherit",
            background:subtab===t.id?"rgba(167,139,250,0.18)":"transparent",
            color:subtab===t.id?"#a78bfa":DS.muted,fontSize:15,fontWeight:subtab===t.id?700:500,transition:"all 0.15s"}}>
            {t.label}
          </button>
        ))}
      </div>
      )}
      <Card>

        {subtab==="timeoday"&&(
          <>
            <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>⏰ Time of Day & Seasonal</div>
            <div style={{fontSize:12,color:DS.muted,marginBottom:12}}>When do sightings cluster through the day and across seasons?</div>
            <TimeLineChart sightings={filteredSightings}/>
            <div style={{height:1,background:"rgba(255,255,255,0.07)",margin:"20px 0"}}/>
            <div style={{fontSize:14,fontWeight:700,marginBottom:8}}>📅 Seasonal Breakdown</div>
            <SeasonalPanel sightings={filteredSightings}/>
          </>
        )}


        {subtab==="calibration"&&(
          <>
            <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>📊 Prediction Accuracy</div>
            <div style={{fontSize:15,color:DS.muted,marginBottom:12}}>How confident was the model when you actually saw an eagle? Used to auto-calibrate future predictions.</div>
            <CalibPanel/>
          </>
        )}
      </Card>
    </div>
  );
}

function HistoryPanel({sightings, del, exportCSV, clearAll, enrichWeather, enrichStatus, needsWeather, getSightingRating, supaSave, setSightings, fmtTs, jumpToId=null, onJumpHandled=null, onMapNav=null, fixMidnightTimestamps=null, fixMidnightStatus="", runNaiveTimestampFix=null, naiveFixStatus=""}){
  const[recSubtab,setRecSubtab]=useState("records");
  const[hSort,setHSort]=useState("date_desc");
  const[hLoc,setHLoc]=useState("all");
  const[hVantage,setHVantage]=useState("all");
  const[hAlt,setHAlt]=useState([]); // multi-select array
  const[hBirds,setHBirds]=useState("all");
  const[hType,setHType]=useState("all");
  const[hFlag,setHFlag]=useState("none");
  const[hOpen,setHOpen]=useState(false);
  const[viewingId,setViewingId]=useState(null);  // view-only panel
  const[editingId,setEditingId]=useState(null);
  const[editDraft,setEditDraft]=useState({});
  // Scroll to expanded panel when record is selected
  React.useEffect(()=>{
    if(!viewingId&&!editingId) return;
    const id=editingId||viewingId;
    setTimeout(()=>{
      const row=document.getElementById("rec-"+id);
      if(row) row.scrollIntoView({behavior:"smooth",block:"nearest"});
      const panel=document.getElementById("rec-panel");
      if(panel) panel.scrollIntoView({behavior:"smooth",block:"nearest"});
    },80);
  },[viewingId,editingId]);

  // Deep-link: when jumpToId is set, scroll to and open that record
  React.useEffect(()=>{
    if(!jumpToId) return;
    setRecSubtab("records");
    setViewingId(jumpToId);
    setEditingId(null);
    setEditDraft({});
    // Scroll to the record
    setTimeout(()=>{
      const el=document.getElementById("rec-"+jumpToId);
      if(el) el.scrollIntoView({behavior:"smooth",block:"center"});
    },150);
    if(onJumpHandled) onJumpHandled();
  },[jumpToId]);

  const saveEdit=(id)=>{
    const u=sightings.map(s=>s.id===id?{...s,...editDraft}:s);
    setSightings(u);
    const updated=u.find(s=>s.id===id);
    if(updated)supaSave(updated).catch(()=>{});
    localStorage.setItem("eagle-sightings-v2",JSON.stringify(u));
    setEditingId(null);setEditDraft({});setViewingId(null);
  };

  // ── Filter + Sort — memoised so it only reruns when data or filters change ──
  const filtered=useMemo(()=>{
    let f=sightings.filter(s=>{
      if(hLoc!=="all"&&(s.locationId||s.location)!==hLoc)return false;
      if(hVantage!=="all"&&(s.vantagePointId||s.vantagePoint)!==hVantage)return false;
      if(hAlt.length>0&&!hAlt.includes(s.altitude||"unknown"))return false;
      if(hType!=="all"&&s.recordType!==hType)return false;
      if(hBirds!=="all"){
        const ct=parseInt(s.birdCount||s.countMin||1,10);
        if(hBirds==="1"&&ct!==1)return false;
        if(hBirds==="2"&&ct!==2)return false;
        if(hBirds==="3+"&&ct<3)return false;
      }
      if(hFlag==="prey"&&!s.carryingPrey)return false;
      if(hFlag==="escort"&&!s.escort)return false;
      if(hFlag==="pred_high"&&(typeof s.predictedProb!=="number"||s.predictedProb<60))return false;
      if(hFlag==="r1"&&getSightingRating(s)!==1)return false;
      return true;
    });
    return f.sort((a,b)=>{
      if(hSort==="date_desc")return(b.timestamp||"").localeCompare(a.timestamp||"");
      if(hSort==="date_asc")return(a.timestamp||"").localeCompare(b.timestamp||"");
      if(hSort==="location")return(a.location||"").localeCompare(b.location||"");
      if(hSort==="birds_desc")return parseInt(b.birdCount||b.countMin||1,10)-parseInt(a.birdCount||a.countMin||1,10);
      return 0;
    });
  },[sightings,hLoc,hVantage,hAlt,hType,hBirds,hFlag,hSort]);

  const activeFilters=[hLoc!=="all",hVantage!=="all",hAlt.length>0,hType!=="all",hBirds!=="all",hFlag!=="none"].filter(Boolean).length;
  const clearFilters=()=>{setHLoc("all");setHVantage("all");setHAlt([]);setHType("all");setHBirds("all");setHFlag("none");setPageLimit(75);};
  // Memoised sorted locations list for the edit dropdown — avoids re-sorting on every keystroke
  const locOptions=useMemo(()=>sortedLocs(),[]);

  // Multi-select altitude toggle
  const toggleAlt=(v)=>setHAlt(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v]);

  const ChipRow=({label,opts,val,set,multi})=>(
    <div style={{marginBottom:8}}>
      <div style={{fontSize:14,fontWeight:700,color:DS.muted,letterSpacing:0.5,marginBottom:4}}>{label}{multi&&<span style={{color:"rgba(167,139,250,0.5)",marginLeft:4,fontSize:7}}>MULTI-SELECT</span>}</div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
        {opts.map(o=>{
          const active=multi?val.includes(o.v):val===o.v;
          return <button key={o.v} onClick={()=>multi?set(o.v):set(active?"all":o.v)}
            style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${active?"rgba(167,139,250,0.5)":"rgba(255,255,255,0.08)"}`,
            background:active?"rgba(167,139,250,0.18)":"rgba(255,255,255,0.04)",
            color:active?"#a78bfa":DS.muted,fontSize:14,fontWeight:active?700:500,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
            {o.l}
          </button>;
        })}
      </div>
    </div>
  );

  const selStyle={width:"100%",padding:"7px 10px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:DS.text,fontSize:15,outline:"none",WebkitAppearance:"none",fontFamily:"inherit"};

  const ratingMap=useMemo(()=>{
    const m={};
    sightings.forEach(s=>{m[s.id]=getSightingRating(s);});
    return m;
  },[sightings]);

  const[pageLimit,setPageLimit]=useState(75);
  const visibleRows=useMemo(()=>filtered.slice(0,pageLimit),[filtered,pageLimit]);

  return(
    <div>
      {/* ── Header bar ── */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{fontSize:15,fontWeight:800,color:"#e0d5f7"}}>
            {filtered.length}{filtered.length!==sightings.length&&<span style={{fontSize:14,color:DS.muted,fontWeight:500}}> / {sightings.length}</span>} <span style={{fontSize:14,fontWeight:500,color:DS.sub}}>records</span>
          </div>
          {activeFilters>0&&<button onClick={clearFilters} style={{fontSize:15,padding:"3px 9px",borderRadius:20,border:"1px solid rgba(248,113,113,0.3)",background:"rgba(248,113,113,0.08)",color:"#f87171",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>✕ {activeFilters}</button>}
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setHOpen(p=>!p)} style={{padding:"7px 12px",background:hOpen||activeFilters>0?"rgba(167,139,250,0.18)":"rgba(255,255,255,0.06)",border:`1px solid ${activeFilters>0?"rgba(167,139,250,0.4)":"rgba(255,255,255,0.1)"}`,borderRadius:10,color:activeFilters>0?"#a78bfa":DS.sub,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
            {activeFilters>0?`🔽 ${activeFilters} active`:"🔽 Filter"}
          </button>
          <button onClick={exportCSV} disabled={!filtered.length} style={{padding:"7px 12px",background:"rgba(74,222,128,0.1)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:10,color:"#4ade80",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Export</button>
          <button onClick={clearAll} disabled={!sightings.length} style={{padding:"7px 12px",background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:10,color:"#f87171",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Clear</button>
        </div>
      </div>

      {/* ── Record Type quick filter ── */}
      <div style={{display:"flex",gap:4,marginBottom:8}}>
        {[{v:"all",l:"All",c:DS.muted},{v:"sighting",l:"🦅 Sightings",c:"#a78bfa"},{v:"absence",l:"— Absences",c:"#64748b"},{v:"alarm",l:"🔔 Alarms",c:"#fb923c"}].map(o=>(
          <button key={o.v} onClick={()=>setHType(hType===o.v?"all":o.v)}
            style={{padding:"4px 10px",borderRadius:20,fontSize:12,cursor:"pointer",fontFamily:"inherit",
              border:`1px solid ${hType===o.v?"rgba(167,139,250,0.45)":"rgba(255,255,255,0.1)"}`,
              background:hType===o.v?"rgba(167,139,250,0.12)":"transparent",
              color:hType===o.v?o.c:DS.muted,fontWeight:hType===o.v?700:400}}>
            {o.l}
          </button>
        ))}
      </div>

      {/* ── Sort row ── */}
      <div style={{display:"flex",gap:4,marginBottom:8,overflowX:"auto",paddingBottom:2}}>
        {[{v:"date_desc",l:"📅 Newest"},{v:"date_asc",l:"📅 Oldest"},{v:"location",l:"📍 A–Z"},{v:"birds_desc",l:"🦅 Most birds"}].map(o=>(
          <button key={o.v} onClick={()=>setHSort(o.v)}
            style={{padding:"5px 11px",borderRadius:20,border:`1px solid ${hSort===o.v?"rgba(167,139,250,0.45)":"rgba(255,255,255,0.08)"}`,
            background:hSort===o.v?"rgba(167,139,250,0.16)":"rgba(255,255,255,0.04)",
            color:hSort===o.v?"#a78bfa":DS.muted,fontSize:14,fontWeight:hSort===o.v?700:500,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",flexShrink:0}}>
            {o.l}
          </button>
        ))}
      </div>

      {/* ── Filter drawer ── */}
      {hOpen&&(
        <div style={{marginBottom:10,padding:"12px 14px",background:"rgba(167,139,250,0.05)",border:"1px solid rgba(167,139,250,0.12)",borderRadius:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:DS.muted,letterSpacing:0.5,marginBottom:4}}>LOCATION</div>
              <select value={hLoc} onChange={e=>setHLoc(e.target.value)} style={selStyle}>
                <option value="all">All locations</option>
                {[...new Set(sightings.map(s=>s.locationId||s.location).filter(Boolean))].map(id=>{
                  const loc=LOCS.find(l=>l.id===id);
                  return {id,name:loc?.name||id};
                }).sort((a,b)=>a.name.localeCompare(b.name)).map(({id,name})=>
                  <option key={id} value={id}>{name}</option>
                )}
              </select>
            </div>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:DS.muted,letterSpacing:0.5,marginBottom:4}}>VANTAGE POINT</div>
              <select value={hVantage} onChange={e=>setHVantage(e.target.value)} style={selStyle}>
                <option value="all">All vantage points</option>
                {[...new Set(sightings.map(s=>s.vantagePointId||s.vantagePoint).filter(Boolean))].map(id=>{
                  const loc=LOCS.find(l=>l.id===id);
                  return {id,name:loc?.name||id};
                }).sort((a,b)=>a.name.localeCompare(b.name)).map(({id,name})=>
                  <option key={id} value={id}>{name}</option>
                )}
              </select>
            </div>
          </div>
          <ChipRow label="TYPE" val={hType} set={setHType} opts={[{v:"sighting",l:"Sightings"},{v:"alarm",l:"Alarms"},{v:"absence",l:"Absences"}]}/>
          <ChipRow label="ALTITUDE" val={hAlt} set={toggleAlt} multi opts={[{v:"low",l:"🟢 Low"},{v:"mid",l:"🟡 Mid"},{v:"high",l:"🔴 High"},{v:"unknown",l:"Unknown"}]}/>
          <ChipRow label="BIRD COUNT" val={hBirds} set={setHBirds} opts={[{v:"1",l:"1 bird"},{v:"2",l:"2 birds"},{v:"3+",l:"3+"}]}/>
          <ChipRow label="FLAGS" val={hFlag} set={setHFlag} opts={[{v:"prey",l:"🦎 Prey"},{v:"escort",l:"🦅 Escort"},{v:"r1",l:"⭐ R1"},{v:"pred_high",l:"📊 Pred≥60%"}]}/>
        </div>
      )}

      {/* Weather enrichment banner */}
      {sightings.filter(s=>s.timestamp&&needsWeather(s)).length>0&&(
        <div style={{marginBottom:10,padding:"11px 14px",background:"rgba(251,191,36,0.07)",border:"1px solid rgba(251,191,36,0.18)",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:"#fbbf24",marginBottom:2}}>🌤 {sightings.filter(s=>s.timestamp&&needsWeather(s)).length} records missing weather data</div>
            <div style={{fontSize:14,color:DS.muted}}>Fetch historical conditions from Open-Meteo for each sighting date</div>
          </div>
          <button onClick={enrichWeather} style={{flexShrink:0,padding:"8px 14px",background:"linear-gradient(135deg,#fbbf24,#f59e0b)",border:"none",borderRadius:11,color:"#0d1220",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>Fill Weather</button>
        </div>
      )}
      {/* Midnight timestamp fix banner */}
      {(()=>{
        const midnightCount=sightings.filter(s=>s.timestamp&&/[T ]00:00(:[0-5]\d)?(\.\d+)?Z?$/.test(s.timestamp.toString())).length;
        if(!midnightCount&&!fixMidnightStatus) return null;
        return(

                {["Record Type","Location","Date · Time","Behaviour","#","Rating","📝","Source"].map(h=>(

                          <div><div style={{fontSize:9,color:DS.muted,fontWeight:700,marginBottom:1}}>RATING</div><div style={{fontSize:12,fontWeight:700,color:rCol}}>{s.recordType==="sighting"?rLbl:"—"}</div></div>
                          <div><div style={{fontSize:9,color:DS.muted,fontWeight:700,marginBottom:1}}>BEHAVIOUR</div><div style={{fontSize:12,color:"#c4b8e8"}}>{bh||"—"}</div></div>
                          <div><div style={{fontSize:9,color:DS.muted,fontWeight:700,marginBottom:1}}>ALTITUDE</div><div style={{fontSize:12,color:DS.text}}>{s.altitude||"—"}</div></div>
                          {s.incomingDir&&<div><div style={{fontSize:9,color:DS.muted,fontWeight:700,marginBottom:1}}>FROM</div><div style={{fontSize:12,color:"#4ade80"}}>↙ {s.incomingDir}</div></div>}
                          {s.outgoingDir&&<div><div style={{fontSize:9,color:DS.muted,fontWeight:700,marginBottom:1}}>TO</div><div style={{fontSize:12,color:"#fb923c"}}>↗ {s.outgoingDir}</div></div>}
                          {s.windDir&&<div><div style={{fontSize:9,color:DS.muted,fontWeight:700,marginBottom:1}}>WEATHER</div><div style={{fontSize:11,color:DS.muted}}>{s.windDir} {s.windSpeed}km/h · {s.temp}°C</div></div>}
                        </div>
                        {(s.carryingPrey||s.escort)&&<div style={{display:"flex",gap:4,marginBottom:6,flexWrap:"wrap"}}>
                          {s.carryingPrey&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:"rgba(251,146,60,0.12)",border:"1px solid rgba(251,146,60,0.3)",color:"#fb923c"}}>🦎 Carrying prey</span>}
                          {s.escort&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.25)",color:"#f87171"}}>🐦 Escort/mobbing</span>}
                        </div>}
                        {s.notes&&<div style={{fontSize:12,color:"#c4b8e8",fontStyle:"italic",lineHeight:1.5,padding:"6px 8px",background:"rgba(255,255,255,0.03)",borderRadius:7}}>"{s.notes}"</div>}
                      </div>
                    );
                  })()}
                  </React.Fragment>
                );
              })}
              {filtered.length>pageLimit&&(
                <button onClick={()=>setPageLimit(p=>p+75)}
                  style={{width:"100%",padding:"9px",marginTop:4,background:"rgba(255,255,255,0.03)",
                    border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:DS.muted,
                    fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
                  ↓ Load more — {pageLimit} of {filtered.length} shown
                </button>
              )}
              </div>
            </div>
          )}


        </div>
      )}
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(error){return{error};}
  render(){
    if(this.state.error){
      return React.createElement('div',{style:{padding:20,color:'#f87171',fontFamily:'monospace',fontSize:14,whiteSpace:'pre-wrap',background:'#1a0505',minHeight:'100vh'}},
        'REACT ERROR:\n' + (this.state.error.message||String(this.state.error)) + '\n\n' + (this.state.error.stack||'')
      );
    }
    return this.props.children;
  }
}
