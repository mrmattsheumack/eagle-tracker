// ── Solar Thermal Card — GoodWe SEMS irradiance → thermal strength ──
function SolarThermalCard({weather}){
  const[solar,setSolar]=React.useState(null);
  const[loading,setLoading]=React.useState(true);
  const[lastFetch,setLastFetch]=React.useState(null);

  async function fetchSolar(){
    try{
      // Use the existing SEMS proxy on eagletracker (or solarhub)
      const r=await fetch("https://solarhubdromana.netlify.app/.netlify/functions/sems",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"live"})
      });
      if(r.ok){
        const d=await r.json();
        if(d&&typeof d.pac==="number"){
          setSolar(d);
          setLastFetch(new Date());
        }
      }
    }catch(e){}
    setLoading(false);
  }

  React.useEffect(()=>{
    fetchSolar();
    const iv=setInterval(fetchSolar,300000); // every 5 min
    return()=>clearInterval(iv);
  },[]);

  if(loading||!solar)return null; // silent if no data

  // Compute thermal strength from solar output
  // 13.2kW system — pac is current output in watts
  const pac=solar.pac||0;
  const maxPac=13200;
  const solarPct=Math.min(100,Math.round((pac/maxPac)*100));

  // Thermal index: combine solar % + temp + cloud
  const temp=weather.temp||18;
  const cloud=weather.cloudClass||"";
  const cloudPenalty=cloud==="Clear"?0:cloud==="Thin"?5:cloud==="Broken"?20:cloud==="Overcast"?40:cloud.includes("Rain")?60:15;
  const tempBonus=temp>=28?15:temp>=24?10:temp>=20?5:0;
  const thermalIndex=Math.min(100,Math.max(0,solarPct-cloudPenalty+tempBonus));

  const level=thermalIndex>=70?"Excellent":thermalIndex>=50?"Good":thermalIndex>=30?"Fair":thermalIndex>=15?"Weak":"Poor";
  const col=thermalIndex>=70?"#4ade80":thermalIndex>=50?"#86efac":thermalIndex>=30?"#facc15":thermalIndex>=15?"#fb923c":"#f87171";
  const eagleNote=thermalIndex>=70?"Peak conditions — eagles likely soaring now":thermalIndex>=50?"Good lift building — eagles active on ridge":thermalIndex>=30?"Moderate thermals — watch from 10am+":thermalIndex>=15?"Weak lift — low passes more likely":"Poor thermals — low activity expected";

  function fmtAge(ts){
    if(!ts)return"";
    const mins=Math.round((Date.now()-ts.getTime())/60000);
    return mins<1?"just now":mins<60?`${mins}m ago`:`${Math.floor(mins/60)}h ago`;
  }

  return(
    <div style={{background:"rgba(251,191,36,0.05)",border:"1px solid rgba(251,191,36,0.18)",borderRadius:14,padding:"11px 14px",marginBottom:2}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <span style={{fontSize:15}}>☀️</span>
          <div>
            <div style={{fontSize:13,fontWeight:800,color:"#fbbf24"}}>Solar Thermal Index</div>
            <div style={{fontSize:11,color:DS.muted}}>Live from 319 Boundary Rd · {pac>0?`${(pac/1000).toFixed(1)}kW generating`:lastFetch?`Updated ${fmtAge(lastFetch)}`:"—"}</div>
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:20,fontWeight:900,color:col,lineHeight:1}}>{thermalIndex}%</div>
          <div style={{fontSize:10,fontWeight:700,color:col}}>{level}</div>
        </div>
      </div>

      {/* Thermal bar */}
      <div style={{height:4,background:"rgba(255,255,255,0.06)",borderRadius:4,overflow:"hidden",marginBottom:7}}>
        <div style={{height:"100%",width:`${thermalIndex}%`,background:`linear-gradient(90deg,${col}88,${col})`,borderRadius:4,transition:"width 1s ease"}}/>
      </div>

      {/* Eagle note */}
      <div style={{fontSize:12,color:DS.sub,fontWeight:600,marginBottom:6}}>🦅 {eagleNote}</div>

      {/* Mini stats */}
      <div style={{display:"flex",gap:5}}>
        {[
          {l:"Solar",v:`${solarPct}%`,c:"#fbbf24"},
          {l:"Temp",v:`${temp}°C`,c:"#fb923c"},
          {l:"Cloud",v:cloud||"—",c:"#a78bfa"},
        ].map(x=>(
          <div key={x.l} style={{flex:1,background:"rgba(0,0,0,0.2)",borderRadius:7,padding:"4px 6px",textAlign:"center"}}>
            <div style={{fontSize:8,color:DS.muted,fontWeight:600,marginBottom:1}}>{x.l.toUpperCase()}</div>
            <div style={{fontSize:12,fontWeight:700,color:x.c}}>{x.v}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function PredictTab({sightings,weather,predictions,alarmBoost,hourly,dailyFx,notifEnabled,notifThreshold,notifLocId,notifPermission,onRequestNotif,onToggleNotif,onSetThreshold,onSetNotifLoc,calibStats,calibMultiplier}){
  const[fDay,setFDay]=useState(0);
  const[fLoc,setFLoc]=useState(()=>notifLocId||"boundary_base");
  const selLoc=LOCS.find(l=>l.id===fLoc)||LOCS[0];
  // Keep notification target in sync with selected predict location
  React.useEffect(()=>{if(onSetNotifLoc)onSetNotifLoc(fLoc);},[fLoc]);
  const dayLabels=["Today","Tomorrow","Day After"];
  // Use real Open-Meteo daily forecast for tomorrow/day-after instead of fake offsets
  const fwx=React.useMemo(()=>{
    if(fDay===0)return weather;
    const df=dailyFx?.[fDay];
    if(!df)return weather; // fallback if data not yet loaded
    return{temp:df.peakTemp,windDir:df.windDir,windSpeed:df.avgWindSpeed,
           cloudClass:df.cloudClass,sunStrength:df.sunStrength,conditions:df.conditions};
  },[fDay,weather,dailyFx]);
  const now=getMelbNow();
  const currentHour=now.getUTCHours();
  const currentMin=now.getUTCMinutes();
  const nowTimeStr=`${String(currentHour).padStart(2,"0")}:${String(currentMin).padStart(2,"0")}`;

  // Get per-window weather from hourly data (mid-window hour)
  function winWx(startH,endH){
    const midH=Math.floor((startH+endH)/2);
    // Active window today + Ecowitt live → use station data directly
    const isCurrentWindow=fDay===0&&nowDecimal>=startH&&nowDecimal<endH;
    if(isCurrentWindow&&weather.source==="ecowitt"){
      return{temp:weather.temp,windDir:weather.windDir,windSpeed:weather.windSpeed,
             windGust:weather.windGust||null,cloudClass:weather.cloudClass,
             conditions:weather.conditions,source:"ecowitt"};
    }
    if(fDay===0&&hourly&&hourly.length>0){
      const h=hourly.find(x=>x.hour===midH)||hourly.find(x=>x.hour>=startH)||null;
      if(h)return{temp:h.temp,windDir:h.windDir,windSpeed:h.windSpeed,cloudClass:h.cloudClass||fwx.cloudClass,conditions:h.conditions||fwx.conditions};
    }
    // Use real hourly data from daily forecast for tomorrow/day-after
    const df=dailyFx?.[fDay];
    if(df&&df.hourlyTemps){
      const t=df.hourlyTemps[midH]??df.peakTemp;
      const ws=df.hourlyWindSpeeds[midH]??df.avgWindSpeed;
      const wd=toWindLabel(df.hourlyWindDirs[midH]??0);
      return{temp:Math.round(t),windDir:wd,windSpeed:Math.round(ws),cloudClass:df.cloudClass||fwx.cloudClass,conditions:df.conditions||fwx.conditions};
    }
    return{temp:fwx.temp,windDir:fwx.windDir,windSpeed:fwx.windSpeed,cloudClass:fwx.cloudClass,conditions:fwx.conditions};
  }

  function genWindows(loc,wx){
    const sb=["SSW","SW","SSE","SE","S"].includes(wx.windDir||"");
    const hot=wx.temp>28;const windy=wx.windSpeed>15;
    // All types use strict 2-hour blocks: 6-8, 8-10, 10-12, 12-14, 14-16, 16-18, 18-20
    const makeLabel=(s,e)=>{
      const fmt=h=>`${String(Math.floor(h)).padStart(2,"0")}:${h%1===0.5?"30":"00"}`;
      if(s===6)return{label:`6–8am`,timeRange:`6:00am – 8:00am`,startH:s,endH:e};
      if(s===8)return{label:`8–10am`,timeRange:`8:00am – 10:00am`,startH:s,endH:e};
      if(s===10)return{label:`10am–12pm`,timeRange:`10:00am – 12:00pm`,startH:s,endH:e};
      if(s===12)return{label:`12–2pm`,timeRange:`12:00pm – 2:00pm`,startH:s,endH:e};
      if(s===14)return{label:`2–4pm`,timeRange:`2:00pm – 4:00pm`,startH:s,endH:e};
      if(s===16)return{label:`4–6pm`,timeRange:`4:00pm – 6:00pm`,startH:s,endH:e};
      return{label:`6–8pm`,timeRange:`6:00pm – 8:00pm`,startH:s,endH:e};
    };
    if(loc.type==="carrion")return[
      {...makeLabel(6,8),behavior:`Dawn pre-thermal feeding at ${loc.name}. Peak activity before sun heats ground.`,focus:"Ground level · Road edges · Low perches"},
      {...makeLabel(8,10),behavior:"Early scavenging continues as birds warm up. Juveniles especially active around kills.",focus:`${loc.name} surrounds · Low flight lines`},
      {...makeLabel(10,12),behavior:"Thermals building — eagles shift from ground feeding to soaring. Activity drops sharply.",focus:"Scan sky above site · Nearby ridge thermals"},
      {...makeLabel(12,14),behavior:"Peak thermal hours. Eagles soaring high — carrion sites quiet. Redirect to ridge.",focus:"Try Arthurs Seat Ridge or Cloud Street instead"},
      {...makeLabel(14,16),behavior:`Thermals still active. ${hot?"Exceptional soaring day — likely very high altitude.":"Moderate lift continuing."}`,focus:"Overhead · High altitude scan"},
      {...makeLabel(16,18),behavior:"Thermals weakening. Eagles may descend to feed again before roosting.",focus:`${loc.name} · Adjacent paddocks · Low perches`},
      {...makeLabel(18,20),behavior:"Dusk feeding opportunity — last chance before roost. Eagles low and direct.",focus:"Ground level · Direct flights to roost"},
    ];
    if(loc.type==="perch")return[
      {...makeLabel(6,8),behavior:"Pre-dawn roost. Eagles on tall eucalypts. May see early scanning flights.",focus:"Tall dead timber · Exposed canopy · Silhouettes"},
      {...makeLabel(8,10),behavior:"Birds warming up — wing-spreading, preening, scanning from high perches.",focus:"Perch trees · Early departure glides toward ridge"},
      {...makeLabel(10,12),behavior:"Eagles likely airborne now on first thermals. Redirect to ridge or thermal sites.",focus:"Sky watch · Arthurs Seat Ridge · Cloud Street"},
      {...makeLabel(12,14),behavior:"Peak thermal hours. This perch likely empty — birds soaring high.",focus:"Thermal sites · Cloud Street corridor"},
      {...makeLabel(14,16),behavior:"Thermals starting to weaken. Eagles may begin descent toward roost.",focus:`${loc.name} surrounds · Return glide paths`},
      {...makeLabel(16,18),behavior:"Eagles descending as thermals collapse. Return flights approaching roost.",focus:`${loc.name} · Descending glide paths · Tree line`},
      {...makeLabel(18,20),behavior:"Evening roost arrival. Pair calls, short display flights, settling in canopy.",focus:"Roost trees · Last light silhouettes"},
    ];
    if(loc.type==="transit")return[
      {...makeLabel(6,8),behavior:"Too early for transit — eagles on roost. Occasional low pass en route to feeding.",focus:"Low passes · Adjacent trees · Roost departure"},
      {...makeLabel(8,10),behavior:"First thermals building. Early leavers crossing overhead, beginning ridge approach.",focus:"Southern sky · Ridge departure direction"},
      {...makeLabel(10,12),behavior:`Thermals strengthening. ${wx.windDir} @ ${wx.windSpeed}km/h — first transit peak.`,focus:"Overhead · Cloud Street direction · Bay backdrop"},
      {...makeLabel(12,14),behavior:`Peak transit. ${hot?"Strong thermals supporting high-altitude crossing.":"Eagles riding building thermals."} ${wx.windDir} flow.`,focus:"Directly overhead · Thermal columns · Glide vectors"},
      {...makeLabel(14,16),behavior:"Return transits beginning as thermals plateau. Birds crossing lower and slower.",focus:"Overhead · Low glide paths · Ridge return"},
      {...makeLabel(16,18),behavior:"Thermals weakening. Eagles heading back toward roost — purposeful gliding.",focus:"Southward glides toward Arthurs Seat · Low passes"},
      {...makeLabel(18,20),behavior:"Final transits. Eagles direct to roost. Occasional late bird crossing.",focus:"Low direct flights · Roost direction"},
    ];
    if(loc.type==="ridge"){const gw=sb&&wx.windSpeed>10;return[
      {...makeLabel(6,8),behavior:"Too early for ridge lift. Eagles may transit low along ridge base.",focus:"Low ridge transits · Roost trees above"},
      {...makeLabel(8,10),behavior:`Wind ${wx.windSpeed}km/h — ${gw?"ridge lift starting to develop.":"still building — marginal lift."}`,focus:`Upwind end · ${loc.name} · Scanning the face`},
      {...makeLabel(10,12),behavior:`${gw?`${wx.windDir} @ ${wx.windSpeed}km/h — ridge lift established. Eagles working the face.`:`Thermals supplementing light ridge lift.`}`,focus:`${loc.name} face · Upwind shoulder`},
      {...makeLabel(12,14),behavior:`${sb?"Sea breeze established — ridge lift at strongest.":"Thermal and ridge lift mixing."} ${hot?"High temps supercharge thermals.":""}`,focus:`${loc.name} face · Bay backdrop · Overhead`},
      {...makeLabel(14,16),behavior:`${sb&&windy?"Wind freshening — birds may hug lower face.":"Thermals weakening but ridge lift persists."}`,focus:"Ridge base · Shadow edges · Face soaring"},
      {...makeLabel(16,18),behavior:"Ridge lift fading as sun angle drops. Final soaring runs.",focus:"Departure glides · Hillview roost direction"},
      {...makeLabel(18,20),behavior:"Ridge wind dying. Eagles gliding directly to evening roost.",focus:"Watch for direct roost flights toward Hillview Ridge"},
    ];}
    return[
      {...makeLabel(6,8),behavior:"Too early for thermals. Eagles cross low en route to feeding or ridge sites.",focus:"Low transits · Tree lines · Pre-dawn silhouettes"},
      {...makeLabel(8,10),behavior:`First thermals bubbling. ${hot?"Hot day — strong early thermals.":"Moderate temps — thermals patchy."}`,focus:`Upwind edge of ${loc.name} · Low circles`},
      {...makeLabel(10,12),behavior:`${hot?"Strong thermals — peak lift developing.":"Thermals building steadily."} ${wx.windSpeed>5?`${wx.windDir} wind drifting birds.`:"Light winds — thermals nearly vertical."}`,focus:"Overhead · Low circles building altitude"},
      {...makeLabel(12,14),behavior:`Peak thermal hours. ${hot?"Eagles reaching 1500m+.":""} Maximum altitude soaring over ${loc.name}.`,focus:"High altitude · Directly overhead"},
      {...makeLabel(14,16),behavior:`Thermals plateau. ${hot?"Exceptional soaring continues.":"Lift beginning to weaken."} Watch for hunting runs.`,focus:"Overhead · Descending circles · Field edges"},
      {...makeLabel(16,18),behavior:"Thermals weakening. Eagles descend, may switch to low hunting or transit to roost.",focus:"Descending circles · Field edges · Low glides"},
      {...makeLabel(18,20),behavior:"Thermals collapsed. Eagles gliding directly to roost at Hillview Ridge.",focus:"Direct roost flights · Glide paths toward ridge"},
    ];
  }

  const frozenWindowProbsRef=React.useRef({}); // {locId_startH_fDay: prob} — locked once window passes

  const fc={...fwx,season:getSeason(now.toISOString()),thermalWindow:getTW(now.toISOString())};
  const windows=genWindows(selLoc,fwx);
  const locInsight=fDay===0?behaviourInsight(sightings,selLoc.id,currentHour):null;
  // ── Eagle position estimate — feeds into PredictionMap as ◆ markers and arrows ──
  const eagleEst=React.useMemo(()=>estimateEaglePositions(sightings,weather,predictions),[sightings,weather,predictions]);
  const nowDecimal=currentHour+(currentMin/60);
  // Weather source for a given window + current location
  const wxSourceForWindow=(startH,endH)=>{
    if(fDay>0)return"open-meteo"; // forecast days always Open-Meteo
    if(weather.source!=="ecowitt")return"open-meteo"; // Ecowitt not connected
    if(!isNearBase(fLoc))return"open-meteo"; // selected location outside 3km
    const nowInWindow=nowDecimal>=startH&&nowDecimal<endH;
    if(nowInWindow)return"ecowitt"; // current window → live Ecowitt
    return"open-meteo"; // past/future windows → Open-Meteo
  };
  // Overall source for the weather header block (uses current conditions fwx)
  const wxHeaderSource=fDay>0?"open-meteo":weather.source==="ecowitt"&&isNearBase(fLoc)?"ecowitt":"open-meteo";
  const enrichedWindows=windows.map((w,wi)=>{
    const isPast=fDay===0&&nowDecimal>=w.endH;
    const isActive=fDay===0&&nowDecimal>=w.startH&&nowDecimal<w.endH;
    let insightBoost=0;
    if(locInsight&&fDay===0){
      const nowInWindow=nowDecimal>=w.startH&&nowDecimal<w.endH;
      const isNextWindow=wi>0&&nowDecimal>=windows[wi-1].startH&&nowDecimal<windows[wi-1].endH;
      if(nowInWindow)insightBoost=locInsight.boost;
      else if(isNextWindow)insightBoost=Math.round(locInsight.boost*0.5);
    }
    // PAST WINDOWS: freeze probability once window closes — never recalculate
    // Keeps the app accountable: what it predicted at the time stays on record
    const freezeKey=`${selLoc.id}_${w.startH}_${fDay}`;
    if(isPast){
      if(frozenWindowProbsRef.current[freezeKey]!==undefined){
        const frozenP=frozenWindowProbsRef.current[freezeKey];
        const windowWx=winWx(w.startH,w.endH);
        const wxLine=windowWeatherLine(windowWx?{...fc,...windowWx}:fc);
        const reasoning=windowReasoning(selLoc,sightings,{...fc,...(windowWx||{})},w.startH,w.endH,frozenP,false);
        const lpP1=Math.min(frozenP,lowPassProb(selLoc,sightings,{...fc,...(windowWx||{})},w.startH,w.endH));
        return{...w,probN:frozenP,lpProb:lpP1,...probLabel(frozenP),reasoning,wxLine,isPast,isActive};
      }
      // First time: compute with window-specific weather and freeze it
      const windowWx=winWx(w.startH,w.endH);
      const effectiveFc={...fc,...(windowWx||{})};
      const p=windowProb(selLoc,sightings,effectiveFc,w.startH,w.endH,0,{noFreshBoost:true});
      frozenWindowProbsRef.current[freezeKey]=p;
      const reasoning=windowReasoning(selLoc,sightings,effectiveFc,w.startH,w.endH,p,false);
      const wxLine=windowWeatherLine(windowWx?{...fc,...windowWx}:fc);
      const lpP=Math.min(p,lowPassProb(selLoc,sightings,effectiveFc,w.startH,w.endH));
      return{...w,probN:p,lpProb:lpP,...probLabel(p),reasoning,wxLine,isPast,isActive};
    }
    // ACTIVE / FUTURE windows: use windowProb — same formula used by form preview and stored predictedProb
    const windowWx=winWx(w.startH,w.endH);
    const effectiveFc={...fc,...(windowWx||{})};
    const p=windowProb(selLoc,sightings,effectiveFc,w.startH,w.endH,insightBoost,undefined);
    const reasoning=windowReasoning(selLoc,sightings,effectiveFc,w.startH,w.endH,p,locInsight&&insightBoost>0?locInsight:null);
    const wxLine=windowWeatherLine(windowWx?{...fc,...windowWx}:fc);
    const lpP=Math.min(p,lowPassProb(selLoc,sightings,effectiveFc,w.startH,w.endH));
    return{...w,probN:p,lpProb:lpP,...probLabel(p),reasoning,wxLine,isPast,isActive};
  });

  const currentWindowIndex=fDay===0?enrichedWindows.findIndex(w=>nowDecimal>=w.startH&&nowDecimal<w.endH):-1;
  // Always use predictions array for headline % — same source as map dots for consistency
  const nowWindowProb=predictions.find(p=>p.id===selLoc.id)?.probability??0;
  const selPred=predictions.find(p=>p.id===selLoc.id);

  const inp={width:"100%",padding:"10px 12px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,color:DS.text,fontSize:14,outline:"none",boxSizing:"border-box",WebkitAppearance:"none",fontFamily:"inherit"};
  const lb={color:DS.sub,fontSize:15,fontWeight:600,marginBottom:5,display:"block"};

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>

      {/* ── AUDIO ALERT FRAMEWORK — top of predict tab ── */}
      <AudioAlertPanel/>

      {/* ── SOLAR THERMAL INDEX ── */}
      <SolarThermalCard weather={fwx}/>

      <Card glow="#fb923c">
        <div style={{fontSize:15,fontWeight:700,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
          Activity Predictor
          {(()=>{const src=fDay>0?"open-meteo":weather.source==="ecowitt"&&isNearBase(fLoc)?"ecowitt":"open-meteo";
            const isEco=src==="ecowitt";
            return(<span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:20,
              background:isEco?"rgba(74,222,128,0.12)":"rgba(99,102,241,0.12)",
              color:isEco?"#4ade80":"#818cf8",
              border:isEco?"1px solid rgba(74,222,128,0.3)":"1px solid rgba(99,102,241,0.3)"}}>
              {isEco?"🌡 Ecowitt — Live":"🌐 Open-Meteo"}
            </span>);
          })()}
        </div>
        <div style={{marginBottom:12}}>
          <label style={lb}>Location</label>
          <select value={fLoc} onChange={e=>setFLoc(e.target.value)} style={inp}>
            {sortedLocs().map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
          </select>
        </div>
        <div style={{marginBottom:12}}>
          <label style={lb}>Day</label>
          <div style={{display:"flex",gap:6}}>
            {dayLabels.map((d,i)=><button key={d} onClick={()=>setFDay(i)} style={{flex:1,padding:"8px 12px",borderRadius:10,border:"none",cursor:"pointer",background:fDay===i?"linear-gradient(135deg,#a78bfa,#818cf8)":"rgba(255,255,255,0.06)",color:fDay===i?"#fff":DS.sub,fontSize:15,fontWeight:700,fontFamily:"inherit"}}>{d}</button>)}
          </div>
        </div>
        {(()=>{
          const sunriseH=getSunriseHour();const sunsetH=getSunsetHour();
          const wxInfo=wxSummary(fwx);
          const wxItems=[
            {l:"Temp",v:`${fwx.temp}°C`,c:"#fb923c"},
            {l:"Wind Dir",v:fwx.windDir,c:"#818cf8"},
            {l:"Wind Speed",v:`${fwx.windSpeed}km/h`,c:"#818cf8"},
            {l:"Cloud",v:fwx.cloudClass,c:"#a78bfa"},
            {l:"Sunrise",v:fmtSunHour(sunriseH),c:"#fbbf24"},
            {l:"Sunset",v:fmtSunHour(sunsetH),c:"#f97316"},
            {l:"Season",v:getSeason(now.toISOString()),c:"#2dd4bf"},
            {l:"Conditions",v:wxInfo.level==="excellent"?"Excellent":wxInfo.level==="good"?"Good":wxInfo.level==="fair"?"Fair":wxInfo.level==="poor"?"Poor":"Bad",
              c:wxInfo.level==="excellent"?"#4ade80":wxInfo.level==="good"?"#86efac":wxInfo.level==="fair"?"#facc15":wxInfo.level==="poor"?"#fb923c":"#f87171"},
          ];
          return(
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5}}>
              {wxItems.map(x=>(
                <div key={x.l} style={{...DS.inner,padding:"7px 5px",textAlign:"center"}}>
                  <div style={{fontSize:7.5,color:DS.muted,fontWeight:600,marginBottom:2}}>{x.l}</div>
                  <div style={{color:x.c,fontSize:14,fontWeight:700}}>{x.v}</div>
                </div>
              ))}
            </div>
          );
        })()}
      </Card>

      <Card>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <span style={{fontSize:16}}>{selLoc.icon}</span>
          <div><div style={{fontSize:15,fontWeight:800}}>{selLoc.name}</div><div style={{fontSize:14,color:DS.muted}}>{HTYPES[selLoc.type]?.label} · {dayLabels[fDay]}</div></div>
        </div>
        <div style={{fontSize:14,color:DS.muted,marginBottom:8,fontStyle:"italic"}}>{selLoc.notes}</div>
        {selPred?.recentNote&&<div style={{fontSize:15,color:"#f87171",fontWeight:700,marginBottom:6,padding:"6px 10px",background:"rgba(248,113,113,0.08)",borderRadius:9,border:"1px solid rgba(248,113,113,0.18)"}}>{selPred.recentNote}</div>}
        {selPred?.alarmNote&&<div style={{fontSize:15,color:"#fb923c",fontWeight:700,marginBottom:6,padding:"6px 10px",background:"rgba(251,146,60,0.08)",borderRadius:9,border:"1px solid rgba(251,146,60,0.18)"}}>{selPred.alarmNote}</div>}
        {(()=>{
          const wxInfo=wxSummary(fwx);
          const sunriseH=getSunriseHour();const sunsetH=getSunsetHour();
          const pb=partnerBoost(selLoc,sightings,0,24);
          return(
            <div style={{marginBottom:10,display:"flex",flexDirection:"column",gap:6}}>
              {/* Time + probability pill — today only */}
              {fDay===0&&<div style={{fontSize:14,color:"#2dd4bf",padding:"7px 11px",background:"rgba(45,212,191,0.08)",borderRadius:10,border:"1px solid rgba(45,212,191,0.2)",display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:"#2dd4bf",flexShrink:0,animation:"pulse2 2s infinite"}}/>
                <span style={{flex:1}}>Melbourne time: <strong>{nowTimeStr}</strong> · Now: <strong style={{color:probLabel(nowWindowProb).color}}>{nowWindowProb}%</strong> · {currentWindowIndex>=0?`Window ${currentWindowIndex+1} of ${enrichedWindows.length}`:"Outside tracked windows"}</span>
              </div>}
              {/* Weather summary — all days */}
              <div style={{fontSize:14,padding:"8px 12px",background:wxInfo.level==="excellent"?"rgba(74,222,128,0.07)":wxInfo.level==="good"?"rgba(74,222,128,0.05)":wxInfo.level==="fair"?"rgba(250,204,21,0.07)":wxInfo.level==="poor"?"rgba(251,146,60,0.07)":"rgba(248,113,113,0.07)",borderRadius:10,border:`1px solid ${wxInfo.level==="excellent"?"rgba(74,222,128,0.2)":wxInfo.level==="good"?"rgba(74,222,128,0.15)":wxInfo.level==="fair"?"rgba(250,204,21,0.2)":wxInfo.level==="poor"?"rgba(251,146,60,0.2)":"rgba(248,113,113,0.2)"}`,color:wxInfo.level==="excellent"?"#4ade80":wxInfo.level==="good"?"#86efac":wxInfo.level==="fair"?"#fde68a":wxInfo.level==="poor"?"#fb923c":"#f87171",lineHeight:1.6,fontWeight:600}}>
                {fDay>0&&<span style={{fontSize:15,fontWeight:800,marginRight:6,opacity:0.75}}>{dayLabels[fDay].toUpperCase()} FORECAST</span>}{wxInfo.summary}
              </div>
              {/* Partner boost — today only */}
              {fDay===0&&pb.boost>0&&!selPred?.recentNote&&<div style={{fontSize:14,padding:"7px 11px",background:"rgba(167,139,250,0.07)",borderRadius:9,border:"1px solid rgba(167,139,250,0.18)",color:"#a78bfa",fontWeight:600}}>{pb.note}</div>}
              {/* ── Recent sighting insight banner — today only ── */}
              {fDay===0&&locInsight&&(()=>{
                const mode=locInsight.mode||"standard";
                const decay=locInsight.minsAgo<=20?1.0:locInsight.minsAgo<=40?1.0-((locInsight.minsAgo-20)/20)*0.5:0.5-((locInsight.minsAgo-40)/20)*0.5;
                const barWidth=Math.max(0,Math.min(100,Math.round(decay*100)));
                // Colour theme by mode

                const accentBg=isLowPass?"rgba(34,197,94,0.10)":isAdvance?"rgba(249,115,22,0.10)":"rgba(251,146,60,0.08)";
                const accentBorder=isLowPass?"rgba(34,197,94,0.30)":isAdvance?"rgba(249,115,22,0.30)":"rgba(251,146,60,0.22)";
                const noteCol=isLowPass?"rgba(134,239,172,0.80)":"rgba(251,191,36,0.75)";
                const modeLabel=isLowPass?"📸 LOW PASS ALERT":isAdvance?"⚡ ADVANCE WARNING":"🔄 RECENT ACTIVITY";
                const modeLabelCol=isLowPass?"#4ade80":isAdvance?"#fb923c":"#fbbf24";
                return(
                  <div style={{padding:"11px 13px",background:accentBg,border:`1px solid ${accentBorder}`,borderRadius:12,marginTop:2}}>
                    {/* Mode label + decay bar */}
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
                      <span style={{fontSize:15,fontWeight:800,color:modeLabelCol,letterSpacing:0.8}}>{modeLabel}</span>
                      <div style={{flex:1,height:2,background:"rgba(255,255,255,0.06)",borderRadius:2,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${barWidth}%`,background:`linear-gradient(90deg,${accentCol},rgba(255,255,255,0.1))`,borderRadius:2}}/>
                      </div>
                      <span style={{fontSize:15,color:"rgba(255,255,255,0.3)",fontWeight:600}}>{locInsight.minsAgo}min ago</span>
                    </div>
                    {/* Line 1 */}
                    <div style={{fontSize:15,color:accentCol,fontWeight:700,lineHeight:1.55,marginBottom:locInsight.todNote?5:0}}>
                      {locInsight.line1}
                    </div>
                    {/* Time-of-day / science note */}
                    {locInsight.todNote&&(
                      <div style={{fontSize:14,color:noteCol,lineHeight:1.55,fontWeight:500,paddingTop:5,borderTop:"1px solid rgba(255,255,255,0.06)",marginTop:4}}>
                        🔬 {locInsight.todNote}
                      </div>
                    )}
                  </div>
                );
              })()}
            </div>
          );
        })()}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {enrichedWindows.map((row,i)=>{
            const isNow=i===currentWindowIndex;
            const lines=row.reasoning?row.reasoning.split("|||"):[];
            const rr=parseInt(row.color.slice(1,3),16);
            const gg=parseInt(row.color.slice(3,5),16);
            const bb=parseInt(row.color.slice(5,7),16);
            const nowProgress=isNow?Math.max(0,Math.min(1,(nowDecimal-row.startH)/(row.endH-row.startH))):null;
            const ww=winWx(row.startH,row.endH);
            // Past windows: dimmed and locked — probability won't change retroactively
            const dimOpacity=row.isPast?0.45:1;
            return(
              <div key={i} style={{padding:"13px 14px",borderRadius:16,position:"relative",
                background:`rgba(${rr},${gg},${bb},${isNow?0.10:row.isPast?0.03:0.06})`,
                border:`1px solid rgba(${rr},${gg},${bb},${isNow?0.35:row.isPast?0.10:0.18})`,
                borderLeft:`3px solid rgba(${rr},${gg},${bb},${row.isPast?0.3:1})`,
                overflow:"hidden",opacity:dimOpacity,
              }}>
                {/* Diagonal inner texture */}
                <div style={{position:"absolute",inset:0,background:`linear-gradient(135deg,rgba(${rr},${gg},${bb},0.05) 0%,transparent 55%)`,pointerEvents:"none",borderRadius:16}}/>
                {/* NOW time-progress line + pill — floats inside card */}
                {isNow&&nowProgress!==null&&(

                      return(
