function ImportPanel({onImport}){
  const[stage,setStage]=useState("idle");
  const[preview,setPreview]=useState([]);
  const[error,setError]=useState("");
  const[busy,setBusy]=useState(false);
  const fileRef=useRef(null);

  function mapRow(raw){
    // Normalise all keys: lowercase, strip whitespace
    const r={};Object.keys(raw).forEach(k=>{r[k.trim().toLowerCase().replace(/\s+/g,"")]=raw[k];});

    // ── Date parsing ──
    const dateStr=(r["date"]||"").toString().trim();
    let datePart="";
    const dp=dateStr.split(/[\/\-]/);
    if(dp.length===3){
      if(dp[0].length===4)datePart=`${dp[0]}-${dp[1].padStart(2,"0")}-${dp[2].padStart(2,"0")}`;
      else datePart=`${dp[2]}-${dp[1].padStart(2,"0")}-${dp[0].padStart(2,"0")}`;
    }

    // ── Time parsing — handles: "1200", "12:00", "9:29", "0.5" (Excel fraction), "2pm" ──
    const timeRaw=r["time"]??r["time(24hr)"]??r["time(hhmm)"]??"";
    let hh=12,mm=0;
    const tRaw=(timeRaw??"").toString().trim();
    if(tRaw&&tRaw!=="0"){
      const asNum=parseFloat(tRaw);
      if(!isNaN(asNum)&&tRaw.indexOf(":")===-1&&asNum>0&&asNum<1){
        // Excel time fraction (e.g. 0.5 = 12:00)
        const totalMins=Math.round(asNum*24*60);hh=Math.floor(totalMins/60)%24;mm=totalMins%60;
      } else if(!isNaN(asNum)&&tRaw.indexOf(":")===-1&&asNum>=100&&asNum<=2359&&!tRaw.includes(".")){
        // 3–4 digit HHMM integer (e.g. 900 = 09:00, 1200 = 12:00, 1545 = 15:45)
        const n=Math.round(asNum);hh=Math.floor(n/100);mm=n%100;
        hh=Math.min(Math.max(hh,0),23);mm=Math.min(Math.max(mm,0),59);
      } else {
        // "9:29", "2pm", "14:30" etc.
        const ampmMatch=tRaw.match(/(\d)\s*(am|pm)\b/i)||tRaw.match(/\b(am|pm)\b/i);
        const ampm=ampmMatch?(ampmMatch[2]||ampmMatch[1]).toLowerCase():"";
        const tClean=tRaw.replace(/\b(am|pm)\b/gi,"").replace(/\s*:\s*/g,":").trim();
        const parts=tClean.split(":").map(p=>parseInt(p.trim(),10)).filter(p=>!isNaN(p));
        hh=parts[0]??12;mm=parts[1]??0;
        if(hh<=12){if(ampm==="pm"&&hh<12)hh+=12;else if(ampm==="am"&&hh===12)hh=0;}
        hh=Math.min(Math.max(hh,0),23);mm=Math.min(Math.max(mm,0),59);
      }
    }
    const ts=datePart?`${datePart}T${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}`:"";

    // ── Location matching — try lat/lng first, then name ──
    const rawLat=parseFloat(r["latitude"]||"");
    const rawLng=parseFloat(r["longitude"]||"");
    const locName=(r["locality"]||r["vantagepoint"]||r["location"]||r["vantage point"]||"").toString().trim();
    let matched=null;
    // 1. Match by coordinates within ~200m
    if(!isNaN(rawLat)&&!isNaN(rawLng)){
      matched=LOCS.reduce((best,l)=>{
        const d=Math.sqrt(Math.pow((l.lat-rawLat)*111000,2)+Math.pow((l.lng-rawLng)*111000*Math.cos(rawLat*Math.PI/180),2));
        return(!best||d<best.d)?{l,d}:best;
      },null);
      matched=matched&&matched.d<300?matched.l:null;
    }
    // 2. Fall back to name match
    if(!matched&&locName){
      const ln=locName.toLowerCase();
      matched=LOCS.find(l=>ln.includes(l.name.toLowerCase().split(" ")[0]))||
               LOCS.find(l=>l.name.toLowerCase().split(" ").some(w=>w.length>4&&ln.includes(w)));
    }
    // 3. Default to boundary base
    matched=matched||LOCS.find(l=>l.id==="boundary_base");

    // ── Behavior / Observation Details ──
    const obsRaw=(r["observationdetails"]||r["observation details"]||r["observations"]||"").toString().trim();
    const bhvRaw=(r["behavior"]||r["behaviour"]||obsRaw||"unknown").toString().toLowerCase().trim();
    // Extract altitude hint
    const altFromBhv=bhvRaw.includes("low")?"low":bhvRaw.includes("mid")?"mid":bhvRaw.includes("high")?"high":null;
    // Behavior classification
    const bhvMap={soaring:"soaring_thermal",gliding:"soaring_ridge",hunting:"hunting",feeding:"feeding",perching:"roosting",roosting:"roosting",transit:"transit",flying:"transit",display:"interaction"};
    const bKey=Object.keys(bhvMap).find(k=>bhvRaw.includes(k))||"unknown";

    // ── Bird count — check dedicated count column first, then parse description ──
    const countCol=r["count"]||r["count "]||r["howmany"]||r["how many"]||r["quantity"]||r["number"]||"";
    let birdCount=1;
    if(countCol&&!isNaN(parseInt(countCol,10))){
      birdCount=Math.max(1,parseInt(countCol,10));
    } else {
      // Fall back to parsing description text: "1 juvenile 2 adults" → 3
      const countSrc=(obsRaw||bhvRaw).toLowerCase();
      const countMatches=[...countSrc.matchAll(/(\d+)\s*(juvenile|adult|bird|eagle|immature|sub.?adult|individual)/gi)];
      if(countMatches.length>0)birdCount=countMatches.reduce((sum,m)=>sum+parseInt(m[1]),0);
      else{const solo=countSrc.match(/^(\d+)\s/);if(solo)birdCount=parseInt(solo[1]);}
      birdCount=Math.max(1,birdCount);
    }

    // ── Notes — preserve everything useful ──
    const rawBhvText=(r["behavior"]||r["behaviour"]||"").toString().trim();
    const noteParts=[
      obsRaw||"",
      rawBhvText&&rawBhvText.toLowerCase()!=="unknown"&&rawBhvText!==obsRaw?`Behavior: ${rawBhvText}`:"",
      r["notes"]||"",
      r["weathersummary"]||"",
      r["flags"]||"",
      r["source"]||"",
      r["distancem"]?`Distance: ${r["distancem"]}m`:"",
      r["county"]?`County: ${r["county"]}`:"",
      r["state"]?`State: ${r["state"]}`:"",
      (!isNaN(rawLat)&&!isNaN(rawLng))?`Coords: ${rawLat}, ${rawLng}`:"",
    ].filter(Boolean);
    const notes=noteParts.join(" | ");

    return{
      id:genId(ts||new Date().toISOString()),
      timestamp:ts||melbISO(),
      location:locName||matched.name,
      locationId:matched.id,
      locationType:matched.type,
      recordType:"sighting",
      behavior:bhvMap[bKey]||"unknown",
      birdCount,countMin:birdCount,countMax:birdCount,
      altitude:altFromBhv||"unknown",
      notes,
      windDir:"SSE",windSpeed:0,temp:20,cloudClass:"Unknown",sunStrength:1,
      thermalWindow:ts?getTW(ts):"Unknown",
      season:ts?getSeason(ts):"Unknown",
      conditions:"Unknown",
      createdAt:new Date().toISOString()
    };
  }

  const parseCSV=(text)=>{
    const lines=text.split("\n").filter(Boolean);
    const headers=lines[0].split(",").map(h=>h.replace(/^"|"$/g,"").trim());
    return lines.slice(1).map(line=>{
      const vals=line.match(/(".*?"|[^,\n]+|(?<=,)(?=,)|(?<=,)$)/g)||line.split(",");
      const obj={};headers.forEach((h,i)=>{obj[h]=(vals[i]||"").toString().replace(/^"|"$/g,"").trim();});
      return obj;
    }).filter(r=>Object.values(r).some(v=>v));
  };

  const loadXLSX=()=>new Promise((resolve,reject)=>{
    if(window.XLSX){resolve();return;}
    if(document.getElementById("xlsx-script")){
      const check=setInterval(()=>{if(window.XLSX){clearInterval(check);resolve();}},100);
      setTimeout(()=>{clearInterval(check);reject(new Error("XLSX load timeout"));},10000);return;
    }
    const s=document.createElement("script");s.id="xlsx-script";
    s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    s.onload=resolve;s.onerror=()=>reject(new Error("Could not load XLSX library"));
    document.head.appendChild(s);
  });

  const parseFile=async(file)=>{
    setError("");setStage("idle");
    const ext=file.name.split(".").pop().toLowerCase();
    try{
      let rows=[];
      if(ext==="csv"||ext==="txt"){rows=parseCSV(await file.text());}
      else if(ext==="xlsx"||ext==="xls"){
        await loadXLSX();
        const buf=await file.arrayBuffer();
        const wb=window.XLSX.read(buf,{type:"array",cellText:true,cellDates:false});
        rows=window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:"",raw:false});
      }else{setError("Please upload a .csv or .xlsx file.");return;}
      setPreview(rows.filter(r=>Object.values(r).some(v=>String(v).trim())).slice(0,300).map(mapRow));
      setStage("preview");
    }catch(e){setError(`Error: ${e.message}`);}
  };

  const doImport=async()=>{setBusy(true);await onImport(preview);setBusy(false);setStage("done");setPreview([]);};

  return(
    <Card style={{marginBottom:13}}>
      <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>📥 Import Sightings</div>
      <div style={{fontSize:14,color:DS.muted,marginBottom:12}}>Columns: Date · Time · Locality · Latitude · Longitude · Observation Details · Behavior · Notes</div>
      {stage==="idle"&&(
        <>
          <div onClick={()=>fileRef.current?.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f)parseFile(f);}} style={{border:"2px dashed rgba(167,139,250,0.3)",borderRadius:14,padding:"24px 16px",textAlign:"center",cursor:"pointer",background:"rgba(167,139,250,0.04)"}}>
            <div style={{fontSize:28,marginBottom:6}}>📂</div>
            <div style={{fontSize:14,fontWeight:700,color:"#a78bfa",marginBottom:3}}>Tap or drag your file here</div>
            <div style={{fontSize:14,color:DS.muted}}>Supports .csv and .xlsx</div>
          </div>
          <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)parseFile(f);e.target.value="";}}/>
          {error&&<div style={{marginTop:10,padding:"9px 12px",background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:10,color:"#f87171",fontSize:15}}>{error}</div>}
        </>
      )}
      {stage==="preview"&&(
        <>
          <div style={{marginBottom:10,padding:"9px 12px",background:"rgba(74,222,128,0.08)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:10}}>
            <div style={{color:"#4ade80",fontSize:14,fontWeight:700}}>✓ {preview.length} rows parsed</div>
            <div style={{color:DS.muted,fontSize:14,marginTop:1}}>Review below then confirm import</div>
          </div>
          <div style={{overflowX:"auto",maxHeight:220,overflowY:"auto",borderRadius:10,border:"1px solid rgba(255,255,255,0.06)",marginBottom:12}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:14}}>
              <thead style={{position:"sticky",top:0,background:"rgba(15,10,30,0.98)"}}>
                <tr>{["Date/Time","Location","Count","Behaviour","Notes"].map(h=><th key={h} style={{textAlign:"left",padding:"7px 10px",color:DS.muted,fontWeight:700,fontSize:15,borderBottom:"1px solid rgba(255,255,255,0.06)",whiteSpace:"nowrap"}}>{h}</th>)}</tr>
              </thead>
              <tbody>
                {preview.map((r,i)=>(
                  <tr key={i} style={{borderBottom:"1px solid rgba(255,255,255,0.03)",background:i%2?"rgba(255,255,255,0.02)":"transparent"}}>
                    <td style={{padding:"6px 10px",color:DS.text,whiteSpace:"nowrap"}}>{r.timestamp?.replace("T"," ")}</td>
                    <td style={{padding:"6px 10px",color:"#a78bfa",whiteSpace:"nowrap"}}>{r.location?.slice(0,20)}</td>
                    <td style={{padding:"6px 10px",color:"#2dd4bf",textAlign:"center"}}>{r.birdCount||r.countMin||1}</td>
                    <td style={{padding:"6px 10px",color:"#fb923c",whiteSpace:"nowrap"}}>{r.behavior?.replace(/_/g," ")}</td>
                    <td style={{padding:"6px 10px",color:DS.muted,maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.notes}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setStage("idle");setPreview([]);}} style={{flex:1,padding:"10px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,color:DS.sub,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
            <button onClick={doImport} disabled={busy} style={{flex:2,padding:"10px",background:"linear-gradient(135deg,#a78bfa,#818cf8)",border:"none",borderRadius:12,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{busy?"Importing...":"✓ Import All Records"}</button>
          </div>
        </>
      )}
      {stage==="done"&&(
        <div style={{textAlign:"center",padding:"16px 0"}}>
          <div style={{fontSize:32,marginBottom:8}}>✅</div>
          <div style={{fontSize:15,fontWeight:700,color:"#4ade80",marginBottom:3}}>Import complete!</div>
          <div style={{fontSize:14,color:DS.muted,marginBottom:12}}>Sightings added — predictions updated.</div>
          <button onClick={()=>setStage("idle")} style={{padding:"8px 20px",background:"rgba(167,139,250,0.12)",border:"1px solid rgba(167,139,250,0.25)",borderRadius:10,color:"#a78bfa",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Import Another File</button>
        </div>
      )}
    </Card>
  );
}


// ── PredictionMap — uses native Leaflet layers so markers are ALWAYS pixel-accurate ──
// L.CircleMarker, L.Polyline and L.Marker all live inside Leaflet's own pane system,
// so they pan and zoom with tiles automatically — no SVG drift possible.
function PredictionMap({predictions, sightings, weather, alarmBoost, calibMult=1, eagleEst=null, mapHeight=360, onLocAdded=null, customLocs=[], setCustomLocs=null, onLocClick=null}){
  const mapRef=React.useRef(null);
  const leafletRef=React.useRef(null);
  const layersRef=React.useRef([]);
  const windLayersRef=React.useRef([]);
  const [mapReady,setMapReady]=React.useState(false);
  const [addMode,setAddMode]=React.useState(false);
  const [pendingPin,setPendingPin]=React.useState(null);
  const pendingMarkerRef=React.useRef(null);
  const [newLocForm,setNewLocForm]=React.useState({name:"",suburb:"",type:"thermal",aspect:"N",notes:""});
  // Legend toggles — each layer can be turned on/off
  const [layers,setLayers]=React.useState({
    wind:true,
    ebird:true,
    directions:true,
    alarm:true,
    historical:true,
    orange:true,
  });
  const toggleLayer=k=>setLayers(p=>({...p,[k]:!p[k]}));

  function dotCol(p){return p>=80?"#f87171":p>=60?"#fb923c":p>=40?"#facc15":p>=20?"#4ade80":"#6366f1";}

  // ── Init map once ──
  React.useEffect(()=>{
    if(!mapRef.current||leafletRef.current)return;
    if(typeof L==="undefined")return;

    const map=L.map(mapRef.current,{
      center:[-38.360,144.950],
      zoom:13,
      zoomControl:false,
      attributionControl:false,
      minZoom:11,maxZoom:20,
    });
    // Fit to prediction locations only (avoids zooming out to cover entire peninsula)
    const predLocs=(predictions||[]).map(p=>LOCS.find(l=>l.id===p.id)).filter(Boolean);
    const fitLocs=predLocs.length>=2?predLocs:LOCS.filter(l=>
      l.lat>-38.37&&l.lat<-38.26&&l.lng>144.93&&l.lng<145.11);
    const allLats=fitLocs.map(l=>l.lat), allLngs=fitLocs.map(l=>l.lng);
    map.fitBounds([[Math.min(...allLats)-0.005,Math.min(...allLngs)-0.008],[Math.max(...allLats)+0.005,Math.max(...allLngs)+0.008]],{padding:[20,20],maxZoom:13});

    // Land base: CartoDB Voyager — warm tan/brown land tones with roads + suburb labels
    L.tileLayer("https://mt{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}",{maxZoom:20,subdomains:"0123",attribution:""}).addTo(map);

    // Ocean tint overlay: a semi-transparent light-blue rectangle over the whole world.
    // We achieve this by adding a custom pane behind tiles that colours water.
    // Better approach: use a CSS filter on the tile layer itself.
    // Actually simplest: CartoDB Voyager already shows oceans in pale blue.
    // We add a very light blue tint pane UNDER land labels for extra definition.

    // Custom locations are loaded via shared storage in a separate useEffect

    leafletRef.current=map;
    setMapReady(true);
    // Force Leaflet to recalculate container size (fixes pin offset bug)
    setTimeout(()=>map.invalidateSize(),100);

    // Click-to-add-location handler
    map.on("click", e=>{
      // Only act when add mode is on (read from a ref to avoid stale closure)
      if(!window._eagleAddMode) return;
      const {lat,lng}=e.latlng;
      // Remove old preview marker
      if(window._eaglePendingMarker){window._eaglePendingMarker.remove();window._eaglePendingMarker=null;}
      // Add a pulsing red pin preview
      const pin=L.marker([lat,lng],{
        icon:L.divIcon({className:"",
          html:`<div style="transform:translate(-50%,-100%);font-size:28px;filter:drop-shadow(0 2px 6px rgba(248,113,113,0.8));animation:none">📍</div>`,
          iconSize:[0,0],iconAnchor:[0,0]})
      }).addTo(map);
      window._eaglePendingMarker=pin;
      // Bubble up to React state via custom event
      map.getContainer().dispatchEvent(new CustomEvent("eagle-pin-drop",{detail:{lat:parseFloat(lat.toFixed(6)),lng:parseFloat(lng.toFixed(6))},bubbles:true}));
    });

    return()=>{map.remove();leafletRef.current=null;};
  },[]);

  // Sync addMode to window global (avoids stale closure in map click handler)
  React.useEffect(()=>{window._eagleAddMode=addMode;},[addMode]);

  // Listen for pin-drop events from the Leaflet click handler
  React.useEffect(()=>{
    const el=mapRef.current;
    if(!el)return;
    const handler=e=>{
      setPendingPin(e.detail);
      setNewLocForm({name:"",suburb:"Mount Martha",type:"thermal",aspect:"N",notes:""});
    };
    el.addEventListener("eagle-pin-drop",handler);
    return()=>el.removeEventListener("eagle-pin-drop",handler);
  },[mapReady]);



  // ── Re-draw all dynamic layers whenever data changes ──
  React.useEffect(()=>{
    const map=leafletRef.current;
    if(!map||typeof L==="undefined")return;

    // Clear previous layers
    layersRef.current.forEach(l=>{try{map.removeLayer(l);}catch(e){}});
    layersRef.current=[];
    windLayersRef.current.forEach(l=>{try{map.removeLayer(l);}catch(e){}});
    windLayersRef.current=[];

    // ── 1. Wind flow arrows ──
    if(layers.wind){
    const windDeg=WIND_MAP[weather.windDir]||0;
    const windRad=windDeg*Math.PI/180;
    const windSp=Math.min(weather.windSpeed||10,50);
    // Arrow length in metres (scales with speed)
    const arrowM=800+windSp*40;
    // Dense grid: 0.025° spacing ≈ 2.8km — gives ~35 arrows across the peninsula
    // Wind arrows: tight grid over cluster area only
    const gridPts=[];
    for(let la=-38.29;la>=-38.42;la-=0.018){
      for(let ln=144.91;ln<=145.01;ln+=0.022){
        gridPts.push([la,ln]);
      }
    }
    gridPts.forEach(([lat,lng])=>{
      // Tip of arrow: displace from base in wind direction (radians)
      const dLat=(arrowM/111320)*Math.cos(windRad);
      const dLng=(arrowM/(111320*Math.cos(lat*Math.PI/180)))*Math.sin(windRad);
      const tip=[lat+dLat,lng+dLng];
      const shaft=L.polyline([[lat,lng],tip],{
        color:"rgba(14,210,165,0.50)",weight:2.2,lineCap:"round",interactive:false,
      });
      shaft.addTo(map);
      windLayersRef.current.push(shaft);

      // Arrowhead: two short lines back from tip at ±25°
      const hLen=arrowM*0.32;
      const ang1=windRad+Math.PI-0.42;
      const ang2=windRad+Math.PI+0.42;
      [[ang1],[ang2]].forEach(([a])=>{
        const hLat=tip[0]+(hLen/111320)*Math.cos(a);
        const hLng=tip[1]+(hLen/(111320*Math.cos(lat*Math.PI/180)))*Math.sin(a);
        const head=L.polyline([tip,[hLat,hLng]],{
          color:"rgba(14,210,165,0.55)",weight:2.2,lineCap:"round",interactive:false,
        });
        head.addTo(map);
        windLayersRef.current.push(head);
      });
    });
    } // end wind

    // ── 2. Probability halos + dots — cluster locations only ──
    // Use windowProb for current time window (matches prediction tab display)
    const nowM=getMelbNow();
    const nowH=nowM.getUTCHours();
    const mapFc={windDir:weather.windDir,windSpeed:weather.windSpeed,windGust:weather.windGust||null,temp:weather.temp,
                 cloudClass:weather.cloudClass||"Unknown",
                 thermalWindow:getTW(nowM.toISOString()),
                 season:getSeason(nowM.toISOString())};
    // Find the current 2-hour window slot
    const windowStarts=[6,8,10,12,14,16,18];
    const curWinStart=windowStarts.filter(h=>h<=nowH).pop()||6;
    const curWinEnd=curWinStart+2;

    predictions.forEach(pred=>{
      const loc=LOCS.find(l=>l.id===pred.id);
      if(!loc)return;
      // pred.probability is already the final calibrated value (same as hotspot panel shows)
      // Use it directly with zero transformation so map and panel are guaranteed identical
      const displayProb=pred.probability;
      const c=displayProb>=80?"#f87171":displayProb>=60?"#fb923c":displayProb>=40?"#facc15":displayProb>=20?"#4ade80":"#6366f1";
      const r=6+displayProb/18; // pixels — reduced for less clutter

      // Outer glow halo
      const halo=L.circleMarker([loc.lat,loc.lng],{
        radius:r*2.2,color:c,weight:1.0,fillOpacity:0,opacity:0.15,interactive:false,
      }).addTo(map);
      // Mid ring
      const ring=L.circleMarker([loc.lat,loc.lng],{
        radius:r*1.5,color:c,weight:0.8,fillOpacity:0,opacity:0.30,interactive:false,
      }).addTo(map);
      // Filled dot — interactive so hover/click events fire
      const dot=L.circleMarker([loc.lat,loc.lng],{
        radius:r,color:c,weight:1.5,fillColor:c,fillOpacity:0.88,opacity:1,interactive:true,
      }).addTo(map);
      // Inner bright core
      const core=L.circleMarker([loc.lat,loc.lng],{
        radius:r*0.42,color:"rgba(255,255,255,0.9)",weight:0,fillColor:"rgba(255,255,255,0.7)",fillOpacity:0.7,interactive:false,
      }).addTo(map);
      layersRef.current.push(halo,ring,dot,core);

      // Label — unique id per location so hover on EITHER dot or label brings it to front
      const shortName=loc.name.split(/[,—]/)[0].trim().split(" ").slice(0,3).join(" ");
      const labelId=`lbl-${loc.id}`;
      const labelHtml=`<div id="${labelId}" style="pointer-events:auto;cursor:pointer;white-space:nowrap;transform:translate(${Math.round(r)+6}px,${-Math.round(r)-14}px);opacity:0.82;transition:opacity 0.15s;text-shadow:0 1px 3px rgba(0,0,0,0.9),0 0 6px rgba(0,0,0,0.7)" onmouseenter="this.style.opacity=1" onmouseleave="this.style.opacity=0.82">
        <div style="font-size:12px;font-weight:900;color:${c};font-family:system-ui,sans-serif;line-height:1.1">${displayProb}%</div>
        <div style="font-size:11px;font-weight:700;color:#ffffff;font-family:system-ui,sans-serif;line-height:1.2;text-shadow:0 1px 3px rgba(0,0,0,0.9)">${shortName}</div>
      </div>`;
      const label=L.marker([loc.lat,loc.lng],{
        icon:L.divIcon({className:"",html:labelHtml,iconSize:[0,0],iconAnchor:[0,0]}),
        interactive:true,
        zIndexOffset:200,
      }).addTo(map);
      const bringFwd=()=>{
        label.setZIndexOffset(1000);
        const el=document.getElementById(labelId);
        if(el&&el.parentElement){el.parentElement.style.zIndex="1000";}
      };
      const sendBack=()=>{
        label.setZIndexOffset(200);
        const el=document.getElementById(labelId);
        if(el&&el.parentElement){el.parentElement.style.zIndex="";}
      };
      dot.on("mouseover",bringFwd);dot.on("mouseout",sendBack);
      dot.on("click",()=>{bringFwd();if(onLocClick)onLocClick(loc.id);});
      label.on("mouseover",bringFwd);label.on("mouseout",sendBack);
      label.on("click",()=>{bringFwd();if(onLocClick)onLocClick(loc.id);});
      layersRef.current.push(label);
    });

    // ── 3. Recent eagle sighting icons ──
    // Only show 🦅 for confirmed sightings (not absence, not alarm), fading over 10 min
    const tenMinsAgo=Date.now()-10*60*1000;
    const recentByLoc={};
    (sightings||[]).forEach(s=>{
      if(s.recordType!=="sighting")return;  // sightings only
      const t=tsToMs(s.timestamp);
      if(t>tenMinsAgo){
        const minsAgo=Math.round((Date.now()-t)/60000);
        if(!recentByLoc[s.locationId]||minsAgo<recentByLoc[s.locationId].minsAgo){
          recentByLoc[s.locationId]={minsAgo,t};
        }
      }
    });
    Object.entries(recentByLoc).forEach(([locId,{minsAgo,t}])=>{
      const loc=LOCS.find(l=>l.id===locId);
      if(!loc)return;
      // Fade from full opacity at 0min to 0 at 10min
      const ageFrac=Math.min(1,(Date.now()-t)/(10*60*1000));
      const opacity=Math.max(0,1-ageFrac).toFixed(2);
      const eagleIcon=L.divIcon({
        className:"",
        html:`<div style="transform:translate(-50%,-120%);text-align:center;pointer-events:none;opacity:${opacity}">
          <div style="font-size:22px;filter:drop-shadow(0 0 8px rgba(251,191,36,0.95));animation:eaglePulse 1.8s ease-in-out infinite">🦅</div>
          <div style="font-size:7.5px;font-weight:800;color:#fbbf24;background:rgba(0,0,0,0.82);padding:1px 6px;border-radius:10px;border:1px solid rgba(251,191,36,0.5);white-space:nowrap;margin-top:2px">${minsAgo===0?"Just now":`${minsAgo}min ago`}</div>
        </div>`,
        iconSize:[0,0],iconAnchor:[0,0],
      });
      const em=L.marker([loc.lat,loc.lng],{icon:eagleIcon,interactive:false,zIndexOffset:800}).addTo(map);
      layersRef.current.push(em);
    });

    // ── 3c. eBird community sighting icons (last 6 hours) ──
    if(layers.ebird){
      const sixHAgo=Date.now()-6*60*60*1000;
      const ebirdByLoc={};
      (sightings||[]).filter(s=>
        s.recordType==="sighting"&&(s.source==="ebird"||s.ebirdSubId)&&tsToMs(s.timestamp)>=sixHAgo
      ).forEach(s=>{
        const lid=s.locationId;
        const t=tsToMs(s.timestamp);
        if(!ebirdByLoc[lid]||t>ebirdByLoc[lid].t) ebirdByLoc[lid]={t,s};
      });
      Object.values(ebirdByLoc).forEach(({t,s})=>{
        const loc=LOCS.find(l=>l.id===s.locationId);
        if(!loc)return;
        const hoursAgo=((Date.now()-t)/3600000).toFixed(1);
        const timeStr=new Date(t).toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit",timeZone:"Australia/Melbourne"});
        const opacity=Math.max(0.3,1-(Date.now()-t)/(6*60*60*1000)).toFixed(2);
        const observer=s.observer||"eBird";
        const ebirdIcon=L.divIcon({
          className:"",
          html:`<div style="transform:translate(-50%,-120%);text-align:center;pointer-events:none;opacity:${opacity}">
            <div style="font-size:24px;filter:drop-shadow(0 0 10px rgba(74,222,128,1)) drop-shadow(0 0 20px rgba(74,222,128,0.5));animation:eaglePulse 1.4s ease-in-out infinite;position:relative">
              🦅<span style="position:absolute;top:-4px;right:-8px;font-size:10px">👁</span>
            </div>
            <div style="font-size:9px;font-weight:700;color:#4ade80;background:rgba(0,0,0,0.85);padding:2px 6px;border-radius:8px;border:1px solid rgba(74,222,128,0.4);white-space:nowrap;margin-top:1px">
              ${timeStr} · ${hoursAgo}h ago
            </div>
          </div>`,
          iconSize:[0,0],iconAnchor:[0,0],
        });
        const em=L.marker([loc.lat,loc.lng],{icon:ebirdIcon,interactive:true,zIndexOffset:790}).addTo(map);
        em.bindTooltip(`eBird: ${observer} · ${timeStr} · ${s.birdCount||1} bird${(s.birdCount||1)!==1?"s":""}`,{sticky:true});
        layersRef.current.push(em);
      });
    }

    // ── 3b. Direction arrows ──
    if(layers.directions){
    const BEAR={N:0,NNE:22.5,NE:45,ENE:67.5,E:90,ESE:112.5,SE:135,SSE:157.5,
                S:180,SSW:202.5,SW:225,WSW:247.5,W:270,WNW:292.5,NW:315,NNW:337.5};
    const sixHoursAgo=Date.now()-6*60*60*1000;
    const dirSightings=(sightings||[]).filter(s=>{
      if(s.recordType!=="sighting")return false;
      const t=tsToMs(s.timestamp);
      if(t<sixHoursAgo)return false;
      return s.incomingDir||s.outgoingDir;
    });
    dirSightings.forEach(s=>{
      const loc=LOCS.find(l=>l.id===(s.locationId||s.vantagePointId));
      if(!loc)return;
      const t=tsToMs(s.timestamp);
      const ageMins=(Date.now()-t)/60000;
      const opac=Math.max(0.25,1-ageMins/360).toFixed(2);
      const arrowLen=0.0055;
      // Incoming arrow (green, pointing TOWARD the location from where eagle came)
      if(s.incomingDir&&BEAR[s.incomingDir]!==undefined){
        const bearIn=(BEAR[s.incomingDir]+180)%360; // reverse: arrow ARRIVES at loc
        const rad=bearIn*Math.PI/180;
        const fromLat=loc.lat-Math.cos(rad)*arrowLen;
        const fromLng=loc.lng-Math.sin(rad)*arrowLen*1.3;
        const inLine=L.polyline([[fromLat,fromLng],[loc.lat,loc.lng]],{
          color:"#4ade80",weight:2.5,opacity:parseFloat(opac),dashArray:"6,3"}).addTo(map);
        const inHead=L.marker([loc.lat,loc.lng],{
          icon:L.divIcon({className:"",html:`<div style="color:#4ade80;font-size:11px;transform:translate(-50%,-50%) rotate(${bearIn}deg);opacity:${opac}">▲</div>`,iconSize:[0,0],iconAnchor:[0,0]}),
          interactive:false,zIndexOffset:100}).addTo(map);
        layersRef.current.push(inLine,inHead);
      }

    });
    } // end directions

        // ── 4. Home base marker ──
    const homeIcon=L.divIcon({
      className:"",
      html:`<div style="transform:translate(-50%,-50%);pointer-events:none">
        <div style="width:26px;height:26px;border-radius:50%;border:2px solid rgba(167,139,250,0.8);display:flex;align-items:center;justify-content:center;background:rgba(20,10,40,0.6);font-size:13px;text-shadow:0 0 6px rgba(167,139,250,0.8)">🏠</div>
      </div>`,
      iconSize:[0,0],iconAnchor:[0,0],
    });
    const home=L.marker([BASE.lat,BASE.lng],{icon:homeIcon,interactive:false,zIndexOffset:500}).addTo(map);
    layersRef.current.push(home);

    // ── 4. Active alarm indicator ──
    if(layers.alarm){
    // Places alarm icon in the logged direction from the vantage point,
    // at a distance matching the logged alarm distance.
    if(alarmBoost&&Date.now()<alarmBoost.expiry){
      const elapsed=(Date.now()-(alarmBoost.expiry-30*60*1000))/1000;
      const fade=Math.max(0.3,1-(elapsed/(30*60)));

      // Origin: vantage point where alarm was logged (fallback to BASE)
      const vpLoc=LOCS.find(l=>l.id===alarmBoost.vantagePointId)||{lat:BASE.lat,lng:BASE.lng};
      const originLat=vpLoc.lat, originLng=vpLoc.lng;

      // Direction: the alarm direction the user selected (N/S/E/W etc)
      const BEARING_MAP={N:0,NNE:22.5,NE:45,ENE:67.5,E:90,ESE:112.5,SE:135,SSE:157.5,
        S:180,SSW:202.5,SW:225,WSW:247.5,W:270,WNW:292.5,NW:315,NNW:337.5};
      const alarmDeg=BEARING_MAP[alarmBoost.dir]||0;
      const alarmRad=alarmDeg*Math.PI/180;

      // Distance based on what the user selected
      const distM=alarmBoost.alarmDist==="immediate"?80:alarmBoost.alarmDist==="nearby"?250:600;
      const dLat=(distM/111320)*Math.cos(alarmRad);
      const dLng=(distM/(111320*Math.cos(originLat*Math.PI/180)))*Math.sin(alarmRad);
      const tip=[originLat+dLat,originLng+dLng];

      // Dashed line from vantage point to alarm location
      const alarmLine=L.polyline([[originLat,originLng],tip],{
        color:`rgba(251,146,60,${fade*0.85})`,weight:2.5,dashArray:"6,4",lineCap:"round",interactive:false,
      }).addTo(map);
      layersRef.current.push(alarmLine);

      // Alarm icon at tip — distinctive bell/alarm shape, NOT an eagle
      const speciesEmoji=alarmBoost.species==="Noisy Miner"?"🐦":alarmBoost.species==="Raven"?"🐦‍⬛":alarmBoost.species==="Cockatoo"?"🦜":alarmBoost.species==="Magpie"?"🐦":"🐦";
      const minsLeft=Math.max(0,Math.round((alarmBoost.expiry-Date.now())/60000));
      const distLabel=alarmBoost.alarmDist==="immediate"?"0–50m":alarmBoost.alarmDist==="nearby"?"50–200m":"200m+";
      const alarmIcon=L.divIcon({
        className:"",
        html:`<div style="transform:translate(-50%,-100%);pointer-events:none;text-align:center">
          <div style="position:relative;display:inline-block">
            <div style="font-size:22px;filter:drop-shadow(0 0 8px rgba(251,146,60,1));animation:alarmPulse 1s ease-in-out infinite">🔔</div>
            <div style="position:absolute;top:-4px;right:-6px;font-size:13px">${speciesEmoji}</div>
          </div>
          <div style="font-size:7.5px;font-weight:800;color:#fb923c;background:rgba(0,0,0,0.88);padding:2px 7px;border-radius:6px;white-space:nowrap;font-family:system-ui;border:1px solid rgba(251,146,60,0.55);margin-top:3px;line-height:1.5">
            ${alarmBoost.species} · ${alarmBoost.dir} · ${distLabel}<br>
            <span style="color:rgba(251,191,36,0.8)">${minsLeft}min remaining</span>
          </div>
        </div>`,
        iconSize:[0,0],iconAnchor:[0,0],
      });
      const alarmMarker=L.marker(tip,{icon:alarmIcon,interactive:false,zIndexOffset:600}).addTo(map);
      layersRef.current.push(alarmMarker);
    }
    } // end alarm

    // ══════════════════════════════════════════════════════════════
    // ══════════════════════════════════════════════════════════════════════
    // ROUTE SYSTEM — 2 active layers:
    // ─ TEAL (solid):   Historical confirmed routes from same-day multi-location sightings
    // ─ ORANGE (dashed): Predicted forward direction from most recent sighting (2h TTL)
    // ══════════════════════════════════════════════════════════════════════
    const BEAR_DEG2={N:0,NNE:22.5,NE:45,ENE:67.5,E:90,ESE:112.5,SE:135,SSE:157.5,
                   S:180,SSW:202.5,SW:225,WSW:247.5,W:270,WNW:292.5,NW:315,NNW:337.5};
    const nowMs=Date.now();
    const nowHr2=getMelbNow().getUTCHours()+getMelbNow().getUTCMinutes()/60;
    const todayStartMs=(()=>{const d=getMelbNow();d.setHours(0,0,0,0);return d.getTime();})();
    const curPhase2=eagleEst?.phase||(nowHr2<6.5?"pre_dawn":nowHr2<8.5?"dawn_depart":nowHr2<10?"morning_hunt":nowHr2<12?"thermal_build":nowHr2<14?"thermal_peak":nowHr2<16?"afternoon_hunt":"dusk_return");

    // ── TEAL: Historical confirmed movement routes ──
    // Derived from 49 same-day multi-location sightings, all validated at WTE flight speeds (1–80 km/h)
    // Shows the most relevant route(s) — those whose time-of-day and season best match right now
    if(layers.historical&&typeof HISTORICAL_ROUTES!=="undefined"){
      const nowHour=getMelbNow().getUTCHours();
      const nowMonth=getMelbNow().getUTCMonth()+1;
      const curSeason=getSeason(getMelbNow().toISOString());
      
      // Score each route for current relevance
      const scored=HISTORICAL_ROUTES.map(route=>{
        // Time-of-day match: does the route span the current hour?
        const times=route.points.map(p=>parseInt(p.time.split(':')[0],10));
        const minH=Math.min(...times), maxH=Math.max(...times);
        const timeMatch=nowHour>=minH&&nowHour<=maxH?3:Math.abs(nowHour-minH)<=2||Math.abs(nowHour-maxH)<=2?1:0;
        // Season match from date
        const routeMonth=parseInt(route.date.split('-')[1],10);
        const seasonDiff=Math.min(Math.abs(routeMonth-nowMonth),12-Math.abs(routeMonth-nowMonth));
        const seasonScore=seasonDiff<=1?3:seasonDiff<=2?2:seasonDiff<=3?1:0;
        // Length bonus: longer routes with more points are more informative
        const lenBonus=route.points.length;
        return{...route,score:timeMatch*2+seasonScore*2+lenBonus};
      });
      
      // Show top 3 most relevant routes
      const topRoutes=scored.sort((a,b)=>b.score-a.score).slice(0,3);
      
      topRoutes.forEach((route,ri)=>{
        const routeLocs=route.points.map(p=>LOCS.find(l=>l.id===p.locId)).filter(Boolean);
        if(routeLocs.length<2)return;
        
        // Colour: primary teal, secondary lighter, tertiary faintest
        const lineCol=ri===0?"rgba(248,113,113,0.75)":ri===1?"rgba(248,113,113,0.45)":"rgba(248,113,113,0.25)";
        const weight=ri===0?3:ri===1?2:1.5;
        
        // Draw the route line
        const rl=L.polyline(routeLocs.map(l=>[l.lat,l.lng]),{
          color:lineCol,weight,lineCap:"round",lineJoin:"round",
          dashArray:ri===0?null:"6,5",
        }).addTo(map);
        layersRef.current.push(rl);
        
        // Direction arrows at midpoints
        for(let ri2=0;ri2<routeLocs.length-1;ri2++){
          const f=routeLocs[ri2],t=routeLocs[ri2+1];
          const dy=t.lat-f.lat,dx=(t.lng-f.lng)*Math.cos(f.lat*Math.PI/180);
          const ab=(Math.atan2(dx,dy)*180/Math.PI+360)%360;
          const am=L.marker([(f.lat+t.lat)/2,(f.lng+t.lng)/2],{
            icon:L.divIcon({className:"",
              html:`<div style="color:${lineCol};font-size:${ri===0?14:11}px;transform:translate(-50%,-50%) rotate(${ab-90}deg)">➤</div>`,
              iconSize:[0,0],iconAnchor:[0,0]}),interactive:false,zIndexOffset:55}).addTo(map);
          layersRef.current.push(am);
        }
        
        // Label on primary route showing date + speed context
        if(ri===0){
          const seg=route.segments[0];
          const mid=routeLocs[Math.floor(routeLocs.length/2)];
          const ll=L.marker([mid.lat+0.003,mid.lng],{
            icon:L.divIcon({className:"",
              html:`<div style="color:rgba(248,113,113,0.9);font-size:9px;font-weight:700;white-space:nowrap;transform:translateX(-50%);background:rgba(0,0,0,0.72);padding:1px 6px;border-radius:4px">${route.date} · ${route.totalKm}km · ${seg.spd}km/h</div>`,
              iconSize:[0,0],iconAnchor:[0,0]}),interactive:false,zIndexOffset:50}).addTo(map);
          layersRef.current.push(ll);
        }
        
        // Small dot at each confirmed sighting point
        routeLocs.forEach(loc=>{
          const d2=L.circleMarker([loc.lat,loc.lng],{
            radius:ri===0?5:3,color:lineCol,weight:2,
            fillColor:ri===0?"rgba(248,113,113,0.5)":"transparent",fillOpacity:1,interactive:false,
          }).addTo(map);
          layersRef.current.push(d2);
        });
      });
    }

    // ── ORANGE: Predicted forward direction (2h TTL from most recent sighting today) ──
    if(layers.orange){
      const twoHAgo=nowMs-2*60*60*1000;
      const latest=(sightings||[])
        .filter(s=>s.recordType==="sighting"&&tsToMs(s.timestamp)>=todayStartMs)
        .sort((a,b)=>tsToMs(b.timestamp)-tsToMs(a.timestamp))[0];
      if(latest&&tsToMs(latest.timestamp)>=twoHAgo){
        const loc=LOCS.find(l=>l.id===(latest.locationId||latest.vantagePointId));
        if(loc){
          const ageH=(nowMs-tsToMs(latest.timestamp))/3600000;
          const orangeOp=Math.max(0,1-ageH/2).toFixed(2);
          const arrowLen=0.012;
          let targetBear=null;
          if(latest.outgoingDir&&BEAR_DEG2[latest.outgoingDir]!==undefined){
            targetBear=BEAR_DEG2[latest.outgoingDir];
          } else {
            const NEXT={pre_dawn:"mccrae_canopy",roost:"mccrae_canopy",dawn_depart:"bracken_ridge",
              morning_hunt:"cloud_street",thermal_build:"chapmans_point",thermal_peak:"bay_lookout",
              afternoon_hunt:"boundary_base",dusk_return:"mccrae_canopy"};
            const nid=NEXT[curPhase2];
            if(nid&&nid!==loc.id){
              const nl=LOCS.find(l=>l.id===nid);
              if(nl){const dy=nl.lat-loc.lat,dx=(nl.lng-loc.lng)*Math.cos(loc.lat*Math.PI/180);targetBear=(Math.atan2(dx,dy)*180/Math.PI+360)%360;}
            }
          }
          if(targetBear!==null){
            const rad=targetBear*Math.PI/180;
            const endLat=loc.lat+Math.cos(rad)*arrowLen;
            const endLng=loc.lng+Math.sin(rad)*arrowLen*1.3;
            const ol=L.polyline([[loc.lat,loc.lng],[endLat,endLng]],{
              color:`rgba(251,146,60,${orangeOp})`,weight:3,dashArray:"12,5",lineCap:"round",interactive:false}).addTo(map);
            const oh=L.marker([endLat,endLng],{
              icon:L.divIcon({className:"",
                html:`<div style="color:rgba(251,146,60,${orangeOp});font-size:15px;transform:translate(-50%,-50%) rotate(${targetBear-90}deg)">➤</div>`,
                iconSize:[0,0],iconAnchor:[0,0]}),interactive:false,zIndexOffset:70}).addTo(map);
            const minsAgo2=Math.round(ageH*60);
            const olbl=L.marker([(loc.lat+endLat)/2+0.004,(loc.lng+endLng)/2],{
              icon:L.divIcon({className:"",
                html:`<div style="color:rgba(251,146,60,${orangeOp});font-size:9px;font-weight:700;white-space:nowrap;transform:translateX(-50%);background:rgba(0,0,0,0.72);padding:1px 6px;border-radius:4px">→ predicted · ${minsAgo2}m ago</div>`,
                iconSize:[0,0],iconAnchor:[0,0]}),interactive:false,zIndexOffset:67}).addTo(map);
            layersRef.current.push(ol,oh,olbl);
          }
        }
      }
    }
    // ── 5. Eagle position estimates (distinct from real sighting icons) ──
    // Uses ◆ diamond markers (not 🦅) to distinguish predicted positions from confirmed sightings
    if(eagleEst&&eagleEst.top&&eagleEst.top.length>0){
      eagleEst.top.slice(0,3).forEach((item,idx)=>{
        const {loc,score}=item;
        if(!loc)return;
        const ringColor=idx===0?"#fbbf24":idx===1?"#a78bfa":"#64748b";
        const ringSize=idx===0?24:idx===1?19:15;
        const labelRank=idx===0?"#1 LIKELY":idx===1?"#2 POSSIBLE":"#3 MAYBE";
        // Pulsing ring — no fill so it doesn't obscure the probability dot
        const ring=L.circleMarker([loc.lat,loc.lng],{radius:ringSize,color:ringColor,weight:1.5,fillOpacity:0,opacity:idx===0?0.45:0.3,interactive:false}).addTo(map); layersRef.current.push(ring);
        // Diamond ◆ icon — clearly distinct from the 🦅 sighting icon
        const sz=idx===0?20:idx===1?16:13;
        const eagleHtml=`<div style="transform:translate(-50%,-50%);font-size:${sz}px;filter:drop-shadow(0 0 6px ${ringColor});pointer-events:none;line-height:1">◆</div>`;
        const eagleMarker=L.marker([loc.lat,loc.lng],{
          icon:L.divIcon({className:"",html:`<div style="color:${ringColor}">${eagleHtml}</div>`,iconSize:[0,0],iconAnchor:[0,0]}),
          interactive:true,zIndexOffset:idx===0?900:400+idx,
        }).addTo(map);
        eagleMarker.bindTooltip(`${labelRank}: ${loc.name.split(/[,—]/)[0].trim()} · ${Math.round(score)}% est.`,{className:"eel-tip",sticky:true});
        // Label
        const shortN=loc.name.split(/[,—]/)[0].trim().split(" ").slice(0,3).join(" ");
        const lHtml=`<div style="transform:translate(${Math.round(ringSize*0.75)+2}px,${-Math.round(ringSize*0.5)-10}px);white-space:nowrap;pointer-events:none;"><div style="background:rgba(0,0,0,0.88);border-radius:4px;padding:1px 6px;border-left:2px solid ${ringColor}"><div style="font-size:9px;font-weight:900;color:${ringColor};font-family:system-ui">${labelRank}</div><div style="font-size:8px;color:rgba(245,240,255,0.85);font-family:system-ui">${shortN}</div></div></div>`;
        const lbl=L.marker([loc.lat,loc.lng],{icon:L.divIcon({className:"",html:lHtml,iconSize:[0,0],iconAnchor:[0,0]}),interactive:false,zIndexOffset:idx===0?800:300+idx}).addTo(map);
        layersRef.current.push(eagleMarker,lbl);
        // Movement arrow
        const mov=eagleEst.movement||null;
        if(idx===0&&mov&&mov.bearing!==null){
          const rad=mov.bearing*Math.PI/180;
          const arrowLen=0.007;
          const endLat=loc.lat+Math.cos(rad)*arrowLen;
          const endLng=loc.lng+Math.sin(rad)*arrowLen*1.3;
          const arrowLine=L.polyline([[loc.lat,loc.lng],[endLat,endLng]],{color:ringColor,weight:2,opacity:0.65,dashArray:"8 4",interactive:false}).addTo(map);
          const ahIcon=L.divIcon({className:"",html:`<div style="color:${ringColor};font-size:12px;transform:translate(-50%,-50%) rotate(${mov.bearing}deg)">▲</div>`,iconSize:[0,0],iconAnchor:[0,0]});
          const arrowHead=L.marker([endLat,endLng],{icon:ahIcon,interactive:false,zIndexOffset:200}).addTo(map);
          layersRef.current.push(arrowLine,arrowHead);
        }
      });
    }

  },[predictions,weather,alarmBoost,eagleEst,sightings,layers]);

  return(
    <div style={{position:"relative",borderRadius:14,overflow:"hidden",border:"1px solid rgba(167,139,250,0.15)",display:"flex",flexDirection:"column"}}>
      <div ref={mapRef} style={{width:"100%",height:mapHeight}}/>

      {/* ── Merged Map Legend — bottom right ── */}
      <div style={{position:"relative",zIndex:10,alignSelf:"flex-end",margin:"6px 8px",
        background:"rgba(6,14,28,0.92)",borderRadius:10,padding:"8px 10px",
        border:"1px solid rgba(255,255,255,0.1)",minWidth:138}}>

        {/* Probability dots key */}
        <div style={{fontSize:8,fontWeight:700,color:"rgba(255,255,255,0.3)",letterSpacing:1,marginBottom:4}}>SIGHTING CHANCE</div>
        <div style={{display:"flex",flexDirection:"column",gap:2,marginBottom:7}}>
          {[["#f87171","80–100%"],["#fb923c","60–79%"],["#facc15","40–59%"],["#4ade80","20–39%"],["#6366f1","<20%"]].map(([c,l])=>(
            <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:c,boxShadow:`0 0 4px ${c}`,flexShrink:0}}/>
              <span style={{fontSize:9,fontWeight:600,color:"rgba(224,213,247,0.6)"}}>{l}</span>
            </div>
          ))}
          {eagleEst&&eagleEst.top&&eagleEst.top.length>0&&(
            <div style={{display:"flex",alignItems:"center",gap:5,marginTop:1}}>
              <span style={{color:"#fbbf24",fontSize:12}}>◆</span>
              <span style={{fontSize:9,color:"rgba(251,191,36,0.7)"}}>AI estimate</span>
            </div>
          )}
        </div>

        {/* Divider */}
        <div style={{height:1,background:"rgba(255,255,255,0.08)",marginBottom:6}}/>

        {/* Toggleable layers */}
        <div style={{fontSize:8,fontWeight:700,color:"rgba(255,255,255,0.3)",letterSpacing:1,marginBottom:4}}>LAYERS — tap to toggle</div>
        {[
          {k:"wind",       col:"rgba(14,210,165,0.85)", dash:false, label:`Wind ${weather.windDir||""} ${weather.windSpeed||""}km/h`},
          {k:"ebird",      col:"#4ade80",               dash:false, label:"eBird sightings (6h)"},
          {k:"directions", col:"#4ade80",               dash:true,  label:"Incoming direction"},
          {k:"alarm",      col:"#fb923c",               dash:true,  label:"Alarm indicator"},
          {k:"historical", col:"rgba(248,113,113,0.85)",dash:false, label:"Historical routes"},
          {k:"orange",     col:"rgba(251,146,60,0.9)",  dash:true,  label:"Predicted heading"},
        ].map(({k,col,dash,label})=>(
          <div key={k} onClick={()=>toggleLayer(k)}
            style={{display:"flex",alignItems:"center",gap:6,padding:"2px 0",cursor:"pointer",
              opacity:layers[k]?1:0.3,transition:"opacity 0.15s"}}>
            <div style={{width:16,height:3,borderRadius:2,flexShrink:0,
              background:layers[k]?col:"rgba(255,255,255,0.15)",
              backgroundImage:dash&&layers[k]?`repeating-linear-gradient(90deg,${col} 0,${col} 4px,transparent 4px,transparent 7px)`:"none",
              transition:"all 0.15s"}}/>
            <span style={{fontSize:9,color:layers[k]?"rgba(255,255,255,0.8)":"rgba(255,255,255,0.25)",
              fontWeight:layers[k]?600:400,userSelect:"none",lineHeight:1.3}}>{label}</span>
          </div>
        ))}

        {/* Active alarm status */}
        {alarmBoost&&Date.now()<alarmBoost.expiry&&(
          <div style={{display:"flex",alignItems:"center",gap:4,marginTop:5,paddingTop:5,borderTop:"1px solid rgba(255,255,255,0.08)"}}>
            <span style={{fontSize:12}}>⚠️</span>
            <span style={{fontSize:8,color:"#fb923c",fontWeight:700}}>{alarmBoost.species} · {alarmBoost.dir}</span>
          </div>
        )}
      </div>

      {/* Compass rose — top right */}
      <div style={{position:"absolute",top:10,right:10,zIndex:900,width:52,height:52,pointerEvents:"none"}}>
        <svg viewBox="0 0 52 52" width="52" height="52">
          <circle cx="26" cy="26" r="25" fill="rgba(6,24,32,0.82)" stroke="rgba(167,139,250,0.3)" strokeWidth="1"/>
          {/* N needle — red */}
          <polygon points="26,4 23,26 26,24 29,26" fill="#f87171" opacity="0.95"/>
          {/* S needle — white */}
          <polygon points="26,48 23,26 26,28 29,26" fill="rgba(255,255,255,0.55)" opacity="0.85"/>
          {/* Cardinal labels */}
          <text x="26" y="13" textAnchor="middle" fontSize="7" fontWeight="800" fill="#f87171" fontFamily="system-ui">N</text>
          <text x="26" y="45" textAnchor="middle" fontSize="6" fontWeight="700" fill="rgba(255,255,255,0.5)" fontFamily="system-ui">S</text>
          <text x="44" y="29" textAnchor="middle" fontSize="6" fontWeight="700" fill="rgba(255,255,255,0.5)" fontFamily="system-ui">E</text>
          <text x="8"  y="29" textAnchor="middle" fontSize="6" fontWeight="700" fill="rgba(255,255,255,0.5)" fontFamily="system-ui">W</text>
          {/* Centre dot */}
          <circle cx="26" cy="26" r="2.5" fill="rgba(167,139,250,0.9)"/>
        </svg>
      </div>

      {/* Zoom controls */}
      <div style={{position:"absolute",top:10,left:10,zIndex:900,display:"flex",flexDirection:"column",gap:4}}>
        {[["+",1],["−",-1],["⌂",0]].map(([lbl,delta])=>(
          <button key={lbl} onClick={()=>{
            if(!leafletRef.current)return;
            if(lbl==="⌂"){leafletRef.current.fitBounds(CLUSTER_BOUNDS,{padding:[20,20]});}
            else leafletRef.current.setZoom(leafletRef.current.getZoom()+delta);
          }} style={{width:30,height:30,borderRadius:8,border:"1px solid rgba(167,139,250,0.3)",background:"rgba(6,24,32,0.92)",color:"#a78bfa",fontSize:lbl==="⌂"?10:17,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
            {lbl}
          </button>
        ))}
      </div>




      {/* ── Add Location button ── */}
      <button onClick={()=>{
        if(addMode){
          setAddMode(false);setPendingPin(null);
          if(window._eaglePendingMarker){window._eaglePendingMarker.remove();window._eaglePendingMarker=null;}
        }else{setAddMode(true);}
      }} style={{
        position:"absolute",top:8,right:10,zIndex:1001,
        padding:"5px 10px",borderRadius:8,
        border:`1px solid ${addMode?"#4ade80":"rgba(167,139,250,0.4)"}`,
        background:addMode?"rgba(74,222,128,0.18)":"rgba(15,10,30,0.88)",
        color:addMode?"#4ade80":"rgba(167,139,250,0.9)",
        fontSize:14,fontWeight:700,cursor:"pointer",
        boxShadow:addMode?"0 0 10px rgba(74,222,128,0.35)":"none",
        whiteSpace:"nowrap",letterSpacing:0.3,
      }}>
        {addMode?"✕ Cancel":"＋ Add Location"}
      </button>
      {addMode&&(
        <div style={{position:"absolute",top:38,right:10,zIndex:1001,
          background:"rgba(74,222,128,0.1)",border:"1px solid rgba(74,222,128,0.3)",
          borderRadius:7,padding:"4px 8px",fontSize:15,color:"#4ade80",fontWeight:600,
          pointerEvents:"none",whiteSpace:"nowrap"}}>
          Tap anywhere on map to drop a pin
        </div>
      )}
      {addMode&&<div style={{position:"absolute",inset:0,zIndex:500,cursor:"crosshair",pointerEvents:"none"}}/>}

      {/* ── Add Location modal ── */}
      {pendingPin&&(
        <div style={{position:"absolute",inset:0,zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",
          background:"rgba(8,4,20,0.7)",backdropFilter:"blur(5px)"}}>
          <div style={{background:"rgba(15,10,30,0.98)",border:"1px solid rgba(167,139,250,0.4)",borderRadius:14,
            padding:20,width:300,maxWidth:"92%",boxShadow:"0 10px 40px rgba(0,0,0,0.8)"}}>
            <div style={{fontSize:15,fontWeight:800,color:"#a78bfa",marginBottom:6}}>📍 New Location</div>
            <div style={{fontSize:15,color:"rgba(167,139,250,0.5)",marginBottom:14,fontFamily:"monospace",letterSpacing:0.5}}>
              {pendingPin.lat.toFixed(6)}, {pendingPin.lng.toFixed(6)}
            </div>
            {[{label:"Location name",key:"name",ph:"e.g. Bruce Road South Paddocks"},
              {label:"Suburb",key:"suburb",ph:"e.g. Mount Martha"}].map(({label,key,ph})=>(
              <div key={key} style={{marginBottom:9}}>
                <div style={{fontSize:15,fontWeight:700,color:"rgba(167,139,250,0.65)",marginBottom:3}}>{label}</div>
                <input value={newLocForm[key]} onChange={e=>setNewLocForm(p=>({...p,[key]:e.target.value}))}
                  placeholder={ph}

// ── Audio Alert Panel — BirdNET Noisy Miner detections from Supabase ──
function AudioAlertPanel(){
  const[alerts,setAlerts]=React.useState([]);
  const[loading,setLoading]=React.useState(true);
  const[lastFetch,setLastFetch]=React.useState(null);
  const[expanded,setExpanded]=React.useState(null);
  const[notifPerm,setNotifPerm]=React.useState(()=>typeof Notification!=="undefined"?Notification.permission:"unsupported");
  const[dismissed,setDismissed]=React.useState(false);
  const lastNotifId=React.useRef(null);
  const prevHighId=React.useRef(null);

  function getAlertLevel(a){
    const meta=a.metadata||{};
    // Use alert_level from metadata if present (new script format)
    const lvl=meta.alert_level||"";
    if(lvl==="high"||meta.combo_trigger)return"high";
    if(lvl==="medium")return"medium";
    if(lvl==="low")return"low";
    // Fallback: derive from duration/count
    const dur=meta.duration_secs||0;
    const count=meta.detection_count||1;
    if(count>=3||dur>=8)return"high";
    if(count>=2||dur>=4)return"medium";
    return"low";
  }

  const LEVELS={
    high:{color:"#f87171",bg:"rgba(248,113,113,0.15)",border:"rgba(248,113,113,0.4)",label:"🔴 HIGH ALERT",desc:"Eagle likely overhead!",bannerBg:"linear-gradient(135deg,rgba(248,113,113,0.25),rgba(239,68,68,0.15))"},
    medium:{color:"#fb923c",bg:"rgba(251,146,60,0.10)",border:"rgba(251,146,60,0.30)",label:"🟠 MEDIUM",desc:"Sustained alarm calling",bannerBg:"linear-gradient(135deg,rgba(251,146,60,0.20),rgba(249,115,22,0.12))"},
    low:{color:"#fbbf24",bg:"rgba(251,191,36,0.07)",border:"rgba(251,191,36,0.22)",label:"🟡 LOW",desc:"Single alarm detected",bannerBg:""},
  };

  function fmtAge(ts){
    if(!ts)return"";
    const mins=Math.round((Date.now()-new Date(ts).getTime())/60000);
    if(mins<1)return"Just now";
    if(mins<60)return`${mins}m ago`;
    return`${Math.floor(mins/60)}h ${mins%60}m ago`;
  }

  function fireNotification(a,level){
    if(notifPerm!=="granted")return;
    const meta=a.metadata||{};
    const sp=a.species_guess||"Noisy Miner";
    const title=level==="high"?"🚨 Eagle Alert — "+sp:(level==="medium"?"🟠 Alarm — "+sp:"🟡 "+sp+" detected");
    const body=level==="high"?"HIGH ALERT: Eagle likely overhead! "+fmtAge(a.created_at):meta.trigger_reason||sp+" alarm";
    try{new Notification(title,{body,icon:"/favicon.ico",tag:"eagle-audio-alert",requireInteraction:level==="high"});}catch(e){}
  }

  async function fetchAlerts(){
    try{
      const r=await fetch(`${SUPA_URL}/rest/v1/candidate_sightings?source=eq.audio_detection&order=created_at.desc&limit=10`,{headers:{...SUPA_HEADERS,"Range":"0-9"}});
      if(r.ok){
        const d=await r.json();
        setAlerts(d||[]);
        setLastFetch(new Date());
        // Check for new HIGH alert to fire push notification
        if(d&&d.length>0){
          const newest=d[0];
          const lvl=getAlertLevel(newest);
          if((lvl==="high"||lvl==="medium")&&newest.id!==lastNotifId.current){
            const age=(Date.now()-new Date(newest.created_at).getTime())/60000;
            if(age<2){// only notify if less than 2 mins old
              fireNotification(newest,lvl);
              lastNotifId.current=newest.id;
            }
          }
          // Auto-show banner for new HIGH
          if(lvl==="high"&&newest.id!==prevHighId.current){
            prevHighId.current=newest.id;
            setDismissed(false);
          }
        }
      }
    }catch(e){}
    setLoading(false);
  }

  React.useEffect(()=>{
    fetchAlerts();
    const iv=setInterval(fetchAlerts,15000);// poll every 15s for faster alerts
    return()=>clearInterval(iv);
  },[]);

  async function requestNotif(){
    if(typeof Notification==="undefined"){setNotifPerm("unsupported");return;}
    const p=await Notification.requestPermission();
    setNotifPerm(p);
  }

  const recentAlerts=alerts.filter(a=>(Date.now()-new Date(a.created_at).getTime())/60000<=120);
  const latestHigh=recentAlerts.find(a=>getAlertLevel(a)==="high");
  const latestHighAge=latestHigh?Math.round((Date.now()-new Date(latestHigh.created_at).getTime())/60000):null;
  const showBanner=latestHigh&&!dismissed&&(latestHighAge||0)<=15;

  if(loading)return(
    <div style={{padding:"10px 14px",background:"rgba(251,146,60,0.05)",border:"1px solid rgba(251,146,60,0.15)",borderRadius:14,marginBottom:2}}>
      <div style={{fontSize:13,color:"rgba(251,146,60,0.5)",fontWeight:600}}>🎤 Loading audio alerts...</div>
    </div>
  );

  return(
    <>
      {/* ── FULL-WIDTH HIGH ALERT BANNER ── */}
      {showBanner&&(
        <div style={{
          position:"relative",
          width:"100%",
          minHeight:"22vh",
          background:"linear-gradient(135deg,rgba(239,68,68,0.3),rgba(220,38,38,0.2))",
          border:"2px solid rgba(248,113,113,0.6)",
          borderRadius:16,
          padding:"18px 16px",
          marginBottom:8,
          display:"flex",
          flexDirection:"column",
          alignItems:"center",
          justifyContent:"center",
          textAlign:"center",
          animation:"alarmPulse 1.5s ease-in-out infinite",
          boxShadow:"0 0 30px rgba(248,113,113,0.3)",
        }}>
          <button onClick={()=>setDismissed(true)} style={{position:"absolute",top:10,right:12,background:"rgba(255,255,255,0.1)",border:"none",borderRadius:8,padding:"4px 10px",color:"rgba(255,255,255,0.6)",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
          <div style={{fontSize:40,marginBottom:6,animation:"eagleFloat 2s ease-in-out infinite"}}>🦅</div>
          <div style={{fontSize:22,fontWeight:900,color:"#f87171",letterSpacing:1,marginBottom:4}}>EAGLE ALERT</div>
          <div style={{fontSize:15,fontWeight:700,color:"#fff",marginBottom:6}}>
            {latestHigh.species_guess||"Noisy Miner"}
          </div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.7)",marginBottom:8}}>
            {(latestHigh.metadata||{}).trigger_reason||"HIGH alarm detected"}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(248,113,113,0.2)",padding:"4px 12px",borderRadius:20,border:"1px solid rgba(248,113,113,0.4)"}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:"#f87171",animation:"pulse2 1s infinite"}}/>
            <span style={{fontSize:12,fontWeight:700,color:"#f87171"}}>{fmtAge(latestHigh.created_at)}</span>
            {latestHigh.confidence&&<span style={{fontSize:12,color:"rgba(255,255,255,0.5)"}}>· {Math.round(latestHigh.confidence*100)}% confidence</span>}
          </div>
        </div>
      )}

      {/* ── MAIN PANEL ── */}
      <div style={{background:recentAlerts.length>0?"rgba(251,146,60,0.06)":"rgba(255,255,255,0.03)",border:`1px solid ${recentAlerts.length>0?"rgba(251,146,60,0.22)":"rgba(255,255,255,0.08)"}`,borderRadius:14,padding:"11px 13px",marginBottom:2}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:recentAlerts.length>0?9:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:15}}>🎤</span>
            <div>
              <div style={{fontSize:13,fontWeight:800,color:recentAlerts.length>0?"#fb923c":DS.sub}}>
                Audio Alerts
                {recentAlerts.filter(a=>getAlertLevel(a)==="high").length>0&&
                  <span style={{marginLeft:6,background:"#f87171",color:"#fff",fontSize:10,fontWeight:800,padding:"1px 6px",borderRadius:20}}>
                    {recentAlerts.filter(a=>getAlertLevel(a)==="high").length} HIGH
                  </span>}
              </div>
              <div style={{fontSize:10,color:DS.muted,marginTop:1}}>
                {recentAlerts.length>0?`${recentAlerts.length} in last 2h`:"Monitoring active"}
                {lastFetch&&<span style={{marginLeft:5,opacity:0.4}}>· {fmtAge(lastFetch)}</span>}
              </div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {notifPerm==="default"&&(
              <button onClick={requestNotif} style={{padding:"3px 8px",borderRadius:7,border:"1px solid rgba(167,139,250,0.3)",background:"rgba(167,139,250,0.08)",color:"#a78bfa",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>🔔 Enable</button>

        {recentAlerts.length>0&&(
